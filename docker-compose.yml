# =============================================================================
# docker-compose.yml — RustAssistant Full Stack (Oryx Server / CUDA)
# =============================================================================
#
# Deployment target: oryx server (bare-metal Linux with NVIDIA GPU)
#
# Port mapping — chosen to avoid conflicts with the FKS stack already running:
#
#   FKS occupied:  80, 443, 3000 (grafana), 3001 (web), 3100 (loki),
#                  5432 (postgres), 6379 (redis), 7000, 8080, 8082, 8200,
#                  9009, 9090, 9091, 9093, 9121, 9187, 9191, 9411, 9959,
#                  5775, 5778, 6333-6334, 8812, 9000, 14250, 14268, 16686,
#                  50051
#
#   RustAssistant:
#     3500  → app  (web UI + API)
#     5433  → postgres
#     6380  → redis
#     11434 → ollama (no conflict)
#
# Usage:
#   # First run — generate secrets:
#   ./scripts/generate-secrets.sh   # creates .env with random passwords
#
#   # Start everything:
#   docker compose up -d
#
#   # Pull models into Ollama (one-time):
#   docker compose exec ollama ollama pull qwen2.5-coder:7b
#
# Required GitHub Secrets (injected by CI/CD):
#   - XAI_API_KEY          — Grok API key
#   - GITHUB_TOKEN         — GitHub PAT for repo sync
#   - DISCORD_WEBHOOK_ACTIONS — Discord notifications
# =============================================================================

services:
    # =========================================================================
    # RustAssistant (API + Web UI)
    # =========================================================================
    rustassistant:
        image: nuniesmith/rustassistant:latest
        container_name: ra-app
        restart: unless-stopped
        ports:
            - "${RA_PORT:-3500}:3500"

        environment:
            # ── Logging ──────────────────────────────────────────
            - RUST_LOG=${RUST_LOG:-info,rustassistant=debug}

            # ── Server ───────────────────────────────────────────
            - HOST=0.0.0.0
            - PORT=3500
            - SERVER_HOST=0.0.0.0
            - SERVER_PORT=3500

            # ── Database ─────────────────────────────────────────
            - DATABASE_URL=postgres://rustassistant:${RA_POSTGRES_PASSWORD:?Set RA_POSTGRES_PASSWORD in .env}@ra-postgres:5432/rustassistant

            # ── Cache / Redis ────────────────────────────────────
            - CACHE_ENABLED=true
            - CACHE_PREFIX=rustassistant
            - REDIS_URL=redis://:${RA_REDIS_PASSWORD:?Set RA_REDIS_PASSWORD in .env}@ra-redis:6379

            # ── AI Providers ─────────────────────────────────────
            - XAI_API_KEY=${XAI_API_KEY:-}
            - XAI_BASE_URL=${XAI_BASE_URL:-https://api.x.ai/v1}
            - REMOTE_MODEL=${REMOTE_MODEL:-grok-2-latest}
            - OLLAMA_BASE_URL=http://ra-ollama:11434
            - LOCAL_MODEL=${LOCAL_MODEL:-qwen2.5-coder:7b}
            - FORCE_REMOTE_MODEL=${FORCE_REMOTE_MODEL:-false}

            # ── GitHub & Repos ───────────────────────────────────
            - GITHUB_TOKEN=${GITHUB_TOKEN:-}
            - GITHUB_OWNER=${GITHUB_OWNER:-nuniesmith}
            - REPO_BASE_PATH=/repos
            - REPOS_DIR=/app/repos
            - WORKSPACE_DIR=/app/data/workspaces
            - REPO_SYNC_INTERVAL_SECS=${REPO_SYNC_INTERVAL_SECS:-300}
            - AUTO_SCAN_ENABLED=${AUTO_SCAN_ENABLED:-true}
            - AUTO_SCAN_INTERVAL=${AUTO_SCAN_INTERVAL:-60}
            - AUTO_SCAN_MAX_CONCURRENT=${AUTO_SCAN_MAX_CONCURRENT:-3}

        volumes:
            - ra_app_data:/app/data
            - ra_app_cache:/app/.rustassistant
            - ${REPOS_BASE_PATH:-/home/jordan/repos}:/repos:ro

        depends_on:
            ra-postgres:
                condition: service_healthy
            ra-redis:
                condition: service_healthy
            ra-ollama:
                condition: service_started
                required: false

        networks:
            - ra-net

        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:3500/health",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

        deploy:
            resources:
                limits:
                    memory: 2G
                    cpus: "3.0"
                reservations:
                    memory: 1G
                    cpus: "1.0"

    # =========================================================================
    # PostgreSQL 16
    # =========================================================================
    ra-postgres:
        image: postgres:16-alpine
        container_name: ra-postgres
        restart: unless-stopped
        environment:
            - POSTGRES_USER=rustassistant
            - POSTGRES_PASSWORD=${RA_POSTGRES_PASSWORD:?Set RA_POSTGRES_PASSWORD in .env}
            - POSTGRES_DB=rustassistant
        ports:
            - "${RA_POSTGRES_PORT:-5433}:5432"
        volumes:
            - ra_postgres_data:/var/lib/postgresql/data
        networks:
            - ra-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rustassistant"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: "1.0"

    # =========================================================================
    # Redis 7 (password-protected, persistent)
    # =========================================================================
    ra-redis:
        image: redis:7-alpine
        container_name: ra-redis
        restart: unless-stopped
        command: >
            redis-server
            --requirepass ${RA_REDIS_PASSWORD:?Set RA_REDIS_PASSWORD in .env}
            --maxmemory 512mb
            --maxmemory-policy allkeys-lru
            --save 60 1
            --appendonly yes
            --appendfsync everysec
        ports:
            - "${RA_REDIS_PORT:-6380}:6379"
        volumes:
            - ra_redis_data:/data
        networks:
            - ra-net
        healthcheck:
            test:
                [
                    "CMD",
                    "redis-cli",
                    "-a",
                    "${RA_REDIS_PASSWORD:-changeme}",
                    "ping",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: "0.5"

    # =========================================================================
    # Ollama — CUDA GPU passthrough (bare-metal Linux)
    # =========================================================================
    ra-ollama:
        image: ollama/ollama:latest
        container_name: ra-ollama
        restart: unless-stopped
        ports:
            - "${RA_OLLAMA_PORT:-11434}:11434"
        volumes:
            - ra_ollama_models:/root/.ollama
        environment:
            - OLLAMA_KEEP_ALIVE=24h
            - OLLAMA_MAX_LOADED_MODELS=3
            - OLLAMA_NUM_GPU=1
            - OLLAMA_FLASH_ATTENTION=1
            - OLLAMA_CONTEXT_LENGTH=16384
            - OLLAMA_NUM_PARALLEL=2
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility
        networks:
            - ra-net

        # Bare-metal Linux NVIDIA GPU passthrough via nvidia-container-toolkit.
        # Requires: nvidia-container-toolkit installed on the host.
        #   sudo apt install -y nvidia-container-toolkit
        #   sudo nvidia-ctk runtime configure --runtime=docker
        #   sudo systemctl restart docker
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: 1
                          capabilities: [gpu]

        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
            interval: 20s
            timeout: 15s
            retries: 10
            start_period: 180s

    # =========================================================================
    # Ollama model puller (one-shot init container)
    # =========================================================================
    ra-ollama-init:
        image: ollama/ollama:latest
        container_name: ra-ollama-init
        restart: "no"
        entrypoint: >
            /bin/sh -c "
              echo '[ra-ollama-init] Waiting for Ollama to be ready...';
              until curl -sf http://ra-ollama:11434/api/tags > /dev/null 2>&1; do sleep 3; done;

              pull_if_missing() {
                local model=$$1;
                echo \"[ra-ollama-init] Checking model: $$model\";
                if curl -sf http://ra-ollama:11434/api/tags | grep -q \"$$model\"; then
                  echo \"[ra-ollama-init] $$model already present — skipping.\";
                else
                  echo \"[ra-ollama-init] Pulling $$model...\";
                  curl -sf -X POST http://ra-ollama:11434/api/pull \
                    -H 'Content-Type: application/json' \
                    -d \"{\\\"model\\\":\\\"$$model\\\",\\\"stream\\\":false}\";
                  echo \"[ra-ollama-init] $$model pull complete.\";
                fi;
              };

              pull_if_missing 'qwen2.5-coder:7b';

              echo '[ra-ollama-init] All models ready!';
            "
        depends_on:
            ra-ollama:
                condition: service_started
        networks:
            - ra-net

# =============================================================================
# Volumes — all prefixed with ra_ to avoid collision with FKS volumes
# =============================================================================
volumes:
    ra_app_data:
        name: ra_app_data
    ra_app_cache:
        name: ra_app_cache
    ra_postgres_data:
        name: ra_postgres_data
    ra_redis_data:
        name: ra_redis_data
    ra_ollama_models:
        name: ra_ollama_models

# =============================================================================
# Network — isolated from the FKS bridge network
# =============================================================================
networks:
    ra-net:
        driver: bridge
        name: rustassistant-net
