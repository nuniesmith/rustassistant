# =============================================================================
# RustAssistant — CI/CD Pipeline (Oryx Server / CUDA)
# =============================================================================
#
# Pipeline stages:
#   1. Test & Lint — cargo fmt, clippy, test
#   2. Build & Push — AMD64 Docker image to Docker Hub
#   3. Deploy — SSH into oryx, generate .env from GitHub Secrets, docker compose up
#
# Required GitHub Secrets:
#   ── Docker Hub ──
#   DOCKER_USERNAME             Docker Hub username
#   DOCKER_TOKEN                Docker Hub access token
#
#   ── Deployment (Oryx) ──
#   ORYX_TAILSCALE_IP           Tailscale IP of the oryx server
#   ORYX_SSH_KEY                SSH private key (ed25519) for the actions user
#   ORYX_SSH_PORT               SSH port (default: 22)
#   ORYX_SSH_USER               SSH username (default: actions)
#
#   ── Tailscale VPN ──
#   TAILSCALE_OAUTH_CLIENT_ID   Tailscale OAuth client ID
#   TAILSCALE_OAUTH_SECRET      Tailscale OAuth secret
#
#   ── Application Secrets (injected into .env on deploy) ──
#   XAI_API_KEY                 xAI Grok API key
#   GITHUB_TOKEN_DEPLOY         GitHub PAT for repo sync (not GITHUB_TOKEN to avoid conflicts)
#   RA_POSTGRES_PASSWORD        (optional — generated if missing)
#   RA_REDIS_PASSWORD           (optional — generated if missing)
#
#   ── Notifications (optional) ──
#   DISCORD_WEBHOOK_ACTIONS     Discord webhook for CI/CD notifications
# =============================================================================

name: CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    CARGO_TERM_COLOR: always
    REGISTRY: docker.io
    IMAGE_NAME: nuniesmith/rustassistant

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    # =========================================================================
    # Stage 1: Test and Lint
    # =========================================================================
    test-and-lint:
        name: 🧪 Test & Lint
        runs-on: ubuntu-latest
        timeout-minutes: 45

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: rustassistant
                    POSTGRES_PASSWORD: changeme
                    POSTGRES_DB: rustassistant_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgresql://rustassistant:changeme@localhost:5432/rustassistant_test
            SQLX_OFFLINE: "true"
            CARGO_HOME: /home/runner/.cargo
            CARGO_INCREMENTAL: "0"

        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 📣 Notify build started
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "🔨 CI/CD Pipeline Started"
                  description: "Building RustAssistant"
                  status: started
                  include-repo-info: "true"

            - name: 🦀 Rust CI (fmt + clippy + build)
              uses: nuniesmith/actions/.github/actions/rust-ci@main
              with:
                  toolchain: stable
                  run-fmt: "true"
                  run-clippy: "true"
                  run-tests: "false"
                  run-build: "true"
                  build-release: "false"
                  coverage: "false"

            - name: 🗄️ Install sqlx-cli and run migrations
              run: |
                  echo "📦 Installing sqlx-cli..."
                  cargo install sqlx-cli --no-default-features --features postgres --locked --quiet || true

                  echo "⏳ Waiting for Postgres to be ready..."
                  until pg_isready -h localhost -p 5432 -U rustassistant; do
                      sleep 1
                  done

                  echo "🗄️ Running migrations against test DB..."
                  DATABASE_URL=postgresql://rustassistant:changeme@localhost:5432/rustassistant_test \
                      sqlx migrate run --source migrations

                  echo "✅ Migrations complete"

            - name: 🧪 Run all tests (Postgres available)
              run: |
                  echo "🧪 Running full test suite with live Postgres..."
                  DATABASE_URL=postgresql://rustassistant:changeme@localhost:5432/rustassistant_test \
                  SQLX_OFFLINE=false \
                  cargo test --verbose
                  echo "✅ All tests passed"

            - name: ✅ Notify tests passed
              if: success()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "✅ Tests & Lint Passed"
                  description: "All tests passed successfully"
                  status: success

            - name: ❌ Notify tests failed
              if: failure()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "❌ Tests Failed"
                  description: "CI tests failed. Check the logs for details."
                  status: failure
                  fields: '[{"name": "Workflow", "value": "[View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}]'

    # =========================================================================
    # Stage 2: Build & Push AMD64 Docker Image
    # =========================================================================
    build-and-push:
        name: 🐳 Build & Push AMD64
        needs: test-and-lint
        runs-on: ubuntu-latest
        timeout-minutes: 30
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest
                      type=sha,prefix=sha-

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: docker/Dockerfile
                  platforms: linux/amd64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      SERVICE_TYPE=web
                      SERVICE_PORT=3500
                  cache-from: type=gha,scope=amd64
                  cache-to: type=gha,mode=max,scope=amd64

            - name: ✅ Notify build complete
              if: success()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "🐳 Docker Image Built"
                  description: "AMD64 image pushed to Docker Hub"
                  status: success
                  fields: '[{"name": "Image", "value": "${{ env.IMAGE_NAME }}:latest", "inline": true}, {"name": "Target", "value": "oryx (CUDA)", "inline": true}]'

            - name: ❌ Notify build failed
              if: failure()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "❌ Docker Build Failed"
                  description: "Failed to build or push Docker image"
                  status: failure

    # =========================================================================
    # Stage 3: Deploy to Oryx Server (CUDA)
    # =========================================================================
    deploy:
        name: 🚀 Deploy to Oryx
        needs: build-and-push
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🔌 Connect to Tailscale
              uses: nuniesmith/actions/.github/actions/tailscale-connect@main
              with:
                  oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
                  target-ip: ${{ secrets.PROD_TAILSCALE_IP }}
                  target-ssh-port: ${{ secrets.PROD_SSH_PORT || '22' }}

            - name: 🔑 Setup SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  ssh-keyscan -p ${{ secrets.PROD_SSH_PORT || '22' }} ${{ secrets.PROD_TAILSCALE_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

            - name: 🚀 Deploy via SSH
              env:
                  ORYX_HOST: ${{ secrets.PROD_TAILSCALE_IP }}
                  ORYX_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
                  ORYX_USER: ${{ secrets.PROD_SSH_USER || 'actions' }}
                  # Secrets to inject into .env on the server
                  SECRET_XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
                  SECRET_GITHUB_TOKEN: ${{ secrets.SECRET_GITHUB_TOKEN }}
                  SECRET_DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  SECRET_GITHUB_OWNER: ${{ secrets.SECRET_GITHUB_OWNER || 'nuniesmith' }}
              run: |
                  set -euo pipefail
                  SCP_CMD="scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P ${ORYX_PORT} -i ~/.ssh/deploy_key"
                  SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${ORYX_PORT} -i ~/.ssh/deploy_key ${ORYX_USER}@${ORYX_HOST}"

                  echo "═══════════════════════════════════════════════════"
                  echo "  Deploying RustAssistant to oryx (CUDA server)"
                  echo "  Image: nuniesmith/rustassistant:latest"
                  echo "  Commit: ${{ github.sha }}"
                  echo "═══════════════════════════════════════════════════"

                  # ── Step 1: Ensure deploy directory exists ─────────────
                  echo ""
                  echo "📁 Step 1: Preparing deploy directory..."
                  $SSH_CMD "mkdir -p ~/rustassistant"
                  echo "✅ Directory ready"

                  # ── Step 2: Upload docker-compose.yml ──────────────────
                  echo ""
                  echo "📤 Step 2: Uploading docker-compose.yml..."
                  $SCP_CMD docker-compose.yml ${ORYX_USER}@${ORYX_HOST}:~/rustassistant/docker-compose.yml
                  echo "✅ docker-compose.yml uploaded"

                  # ── Step 3: Generate & upload .env ─────────────────────
                  echo ""
                  echo "🔑 Step 3: Generating .env from secrets..."

                  # Read existing service-generated passwords from the server so
                  # they survive redeploys.  On first deploy the .env won't exist
                  # yet, so we generate fresh random values and they persist from
                  # that point on.  This avoids the Postgres/Redis password skew
                  # that would occur if we generated new values on every run.
                  EXISTING_PG_PW=$($SSH_CMD \
                      "grep -m1 '^RA_POSTGRES_PASSWORD=' ~/rustassistant/.env 2>/dev/null \
                       | cut -d= -f2-" || true)
                  EXISTING_RD_PW=$($SSH_CMD \
                      "grep -m1 '^RA_REDIS_PASSWORD=' ~/rustassistant/.env 2>/dev/null \
                       | cut -d= -f2-" || true)
                  EXISTING_SESSION=$($SSH_CMD \
                      "grep -m1 '^RA_SESSION_SECRET=' ~/rustassistant/.env 2>/dev/null \
                       | cut -d= -f2-" || true)
                  EXISTING_ENC=$($SSH_CMD \
                      "grep -m1 '^RA_ENCRYPTION_KEY=' ~/rustassistant/.env 2>/dev/null \
                       | cut -d= -f2-" || true)

                  if [ -n "$EXISTING_PG_PW" ]; then
                      PG_PW="$EXISTING_PG_PW"
                      echo "  → Postgres password: reusing existing value"
                  else
                      PG_PW=$(openssl rand -base64 48 | tr -d '/+=\n' | head -c 32)
                      echo "  → Postgres password: generated (first deploy)"
                  fi

                  if [ -n "$EXISTING_RD_PW" ]; then
                      RD_PW="$EXISTING_RD_PW"
                      echo "  → Redis password: reusing existing value"
                  else
                      RD_PW=$(openssl rand -base64 48 | tr -d '/+=\n' | head -c 32)
                      echo "  → Redis password: generated (first deploy)"
                  fi

                  if [ -n "$EXISTING_SESSION" ]; then
                      SESSION_SECRET="$EXISTING_SESSION"
                      echo "  → Session secret: reusing existing value"
                  else
                      SESSION_SECRET=$(openssl rand -hex 32)
                      echo "  → Session secret: generated (first deploy)"
                  fi

                  if [ -n "$EXISTING_ENC" ]; then
                      ENCRYPTION_KEY="$EXISTING_ENC"
                      echo "  → Encryption key: reusing existing value"
                  else
                      ENCRYPTION_KEY=$(openssl rand -hex 32)
                      echo "  → Encryption key: generated (first deploy)"
                  fi

                  # Build .env with printf so no bare "KEY: value" lines appear
                  # at column-0 inside this YAML block scalar (which would cause
                  # the YAML parser to treat them as mapping keys).
                  ENV_FILE=/tmp/rustassistant.env
                  printf '%s\n' \
                      "# RustAssistant .env — generated by CI/CD $(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
                      "# Commit: ${{ github.sha }}" \
                      "" \
                      "RA_PORT=3500" \
                      "RA_POSTGRES_PORT=5433" \
                      "RA_REDIS_PORT=6380" \
                      "RA_OLLAMA_PORT=11434" \
                      "" \
                      "RA_POSTGRES_PASSWORD=${PG_PW}" \
                      "RA_REDIS_PASSWORD=${RD_PW}" \
                      "RA_SESSION_SECRET=${SESSION_SECRET}" \
                      "RA_ENCRYPTION_KEY=${ENCRYPTION_KEY}" \
                      "" \
                      "XAI_API_KEY=${SECRET_XAI_API_KEY}" \
                      "XAI_BASE_URL=https://api.x.ai/v1" \
                      "REMOTE_MODEL=grok-2-latest" \
                      "LOCAL_MODEL=qwen2.5-coder:7b" \
                      "FORCE_REMOTE_MODEL=false" \
                      "" \
                      "GITHUB_TOKEN=${SECRET_GITHUB_TOKEN}" \
                      "GITHUB_OWNER=${SECRET_GITHUB_OWNER:-nuniesmith}" \
                      "" \
                      "REPOS_BASE_PATH=/home/jordan/repos" \
                      "" \
                      "AUTO_SCAN_ENABLED=true" \
                      "AUTO_SCAN_INTERVAL=60" \
                      "AUTO_SCAN_MAX_CONCURRENT=3" \
                      "REPO_SYNC_INTERVAL_SECS=300" \
                      "" \
                      "RUST_LOG=info,rustassistant=debug" \
                      > "${ENV_FILE}"

                  $SCP_CMD "${ENV_FILE}" ${ORYX_USER}@${ORYX_HOST}:~/rustassistant/.env
                  $SSH_CMD "chmod 600 ~/rustassistant/.env"
                  rm -f "${ENV_FILE}"
                  echo "✅ .env uploaded (mode 600)"

                  # ── Step 4: Pull image and restart services ────────────
                  echo ""
                  echo "🐳 Step 4: Pulling image and restarting services..."
                  $SSH_CMD bash -s << 'REMOTE_DEPLOY'
                  set -euo pipefail
                  cd ~/rustassistant

                  # ── GPU preflight ──────────────────────────────────────
                  echo ""
                  echo "🔍 GPU preflight check..."

                  # ── Verify nvidia runtime is registered with Docker ────
                  echo "  Checking nvidia runtime is registered with Docker..."
                  if ! docker info 2>/dev/null | grep -q "nvidia"; then
                      echo "  ❌ nvidia runtime not registered with Docker"
                      echo "  📋 daemon.json:"
                      cat /etc/docker/daemon.json 2>/dev/null || echo "  (not found)"
                      exit 1
                  fi
                  echo "  ✅ nvidia runtime registered with Docker"

                  # ── Check host GPU is visible ──────────────────────────
                  GPU_NAME=$(nvidia-smi --query-gpu=name --format=csv,noheader 2>/dev/null | head -1 || echo "")
                  if [ -n "$GPU_NAME" ]; then
                      echo "  ✅ Host GPU: ${GPU_NAME}"
                  else
                      echo "  ⚠️  nvidia-smi returned no GPU — skipping host check"
                  fi

                  echo "✅ GPU preflight passed"

                  # ── Pull latest app image ──────────────────────────────
                  echo ""
                  echo "Pulling latest image from Docker Hub..."
                  docker compose pull rustassistant

                  echo "Stopping existing services..."
                  docker compose down --remove-orphans 2>/dev/null || true

                  # Force-remove the Ollama container so it is recreated with the
                  # correct runtime (Docker caches the runtime at creation time;
                  # a plain restart does NOT apply a runtime change).
                  docker rm -f ra-ollama 2>/dev/null || true

                  # Start core services only — exclude the one-shot model-puller
                  # so a slow Ollama CUDA init can't abort the whole deploy.
                  # ra-ollama-init is started separately with || true so its exit
                  # code (or a dependency-wait failure) never fails the pipeline.
                  echo "Starting core services (postgres, redis, ollama, app)..."
                  docker compose up -d --remove-orphans \
                      ra-postgres ra-redis ra-ollama rustassistant

                  echo "Starting model-puller (non-blocking)..."
                  docker compose up -d ra-ollama-init || true

                  echo ""
                  echo "Waiting for core services to stabilise (30s)..."
                  sleep 30

                  # ── Verify Ollama is actually using the GPU ────────────
                  echo ""
                  echo "🔍 Verifying Ollama GPU usage..."

                  RUNTIME=$(docker inspect ra-ollama --format '{{.HostConfig.Runtime}}' 2>/dev/null || echo "unknown")
                  echo "  Ollama container runtime: ${RUNTIME}"
                  if [ "${RUNTIME}" != "nvidia" ]; then
                      echo "  ❌ Ollama is NOT using the nvidia runtime (got: ${RUNTIME})"
                      echo "     Check that docker-compose.yml has 'runtime: nvidia' under ra-ollama"
                      echo "  📋 Ollama logs (last 20 lines):"
                      docker compose logs --tail=20 ra-ollama || true
                      exit 1
                  fi
                  echo "  ✅ Ollama container runtime: nvidia"

                  # Check Ollama logs confirm CUDA was detected (give it up to 20s)
                  GPU_DETECTED=0
                  for i in $(seq 1 10); do
                      if docker logs ra-ollama 2>&1 | grep -q "library=CUDA"; then
                          GPU_DETECTED=1
                          break
                      fi
                      sleep 2
                  done

                  if [ "${GPU_DETECTED}" = "1" ]; then
                      VRAM=$(docker logs ra-ollama 2>&1 \
                          | grep "inference compute" \
                          | grep -oP 'total="\K[^"]+' | tail -1 || echo "unknown")
                      echo "  ✅ Ollama detected GPU via CUDA (VRAM: ${VRAM})"
                  else
                      echo "  ❌ Ollama did not detect the GPU — running on CPU"
                      echo "  📋 Ollama startup logs:"
                      docker logs ra-ollama 2>&1 | tail -20 || true
                      exit 1
                  fi

                  echo ""
                  echo "═══════════════════════════════════════════════════"
                  echo "  Container Status"
                  echo "═══════════════════════════════════════════════════"
                  docker compose ps

                  echo ""
                  echo "═══════════════════════════════════════════════════"
                  echo "  Port Bindings"
                  echo "═══════════════════════════════════════════════════"
                  docker compose ps --format '{{.Name}}\t{{.Ports}}' 2>/dev/null \
                      || docker ps --filter "name=ra-" --format "table {{.Names}}\t{{.Ports}}"

                  echo ""
                  echo "═══════════════════════════════════════════════════"
                  echo "  GPU Status"
                  echo "═══════════════════════════════════════════════════"
                  nvidia-smi --query-gpu=name,memory.total,memory.used,utilization.gpu \
                      --format=csv,noheader 2>/dev/null \
                      || echo "(nvidia-smi not available on host)"
                  docker compose exec -T ra-ollama \
                      nvidia-smi --query-gpu=name,memory.total --format=csv,noheader 2>/dev/null \
                      || echo "(GPU not visible inside Ollama container)"

                  echo ""
                  echo "═══════════════════════════════════════════════════"
                  echo "  Disk & Docker Usage"
                  echo "═══════════════════════════════════════════════════"
                  df -h / | tail -1
                  docker system df 2>/dev/null || true

                  docker image prune -f 2>/dev/null || true

                  echo ""
                  echo "✅ RustAssistant deployed successfully!"
                  echo "   Web UI: http://$(hostname -I | awk '{print $1}'):3500/dashboard"
                  REMOTE_DEPLOY

            - name: 🔍 Verify deployment
              env:
                  ORYX_HOST: ${{ secrets.PROD_TAILSCALE_IP }}
                  ORYX_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
                  ORYX_USER: ${{ secrets.PROD_SSH_USER || 'actions' }}
              run: |
                  SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${ORYX_PORT} -i ~/.ssh/deploy_key ${ORYX_USER}@${ORYX_HOST}"

                  echo "🩺 Health check..."
                  for i in 1 2 3 4 5; do
                      STATUS=$($SSH_CMD "curl -sf http://localhost:3500/health 2>/dev/null" || echo "")
                      if [ -n "$STATUS" ]; then
                          echo "✅ Health check passed (attempt $i)"
                          echo "   Response: $STATUS"
                          exit 0
                      fi
                      echo "   Attempt $i/5 — waiting 10s..."
                      sleep 10
                  done

                  echo "⚠️  Health check did not pass after 5 attempts"
                  echo "   Fetching recent logs for diagnosis..."
                  $SSH_CMD "cd ~/rustassistant && docker compose logs --tail=30 rustassistant" || true
                  exit 1

            - name: ✅ Notify deployment success
              if: success()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "🚀 Deployed to Oryx"
                  description: "RustAssistant is live on the oryx CUDA server"
                  status: success
                  fields: '[{"name": "Server", "value": "🖥️ Oryx (CUDA)", "inline": true}, {"name": "Port", "value": "3500", "inline": true}, {"name": "Commit", "value": "${{ github.sha }}", "inline": true}]'

            - name: ❌ Notify deployment failed
              if: failure()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "❌ Deployment Failed"
                  description: "Failed to deploy to oryx server"
                  status: failure
                  fields: '[{"name": "Error", "value": "Check SSH, Tailscale, and container logs", "inline": false}, {"name": "Logs", "value": "[View Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}]'
