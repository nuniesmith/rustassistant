# ============================================================================
# RustAssistant — LLM Audit & TODO Planner Workflow
# ============================================================================
# Manually triggered workflow that clones any target GitHub repo and runs
# LLM-powered analysis on it.  All heavy lifting is done in pure shell via
# direct LLM API calls — no custom Rust CLI required.
#
# Default LLM: grok-4-1-fast-reasoning (xAI Grok 4.1 Fast)
#   Context : 2,000,000 tokens
#   Pricing : $0.20/1M input · $0.50/1M output · $0.05/1M cached
#
# Modes
# ──────
# regular      : Generate cache, repo tree, and a basic holistic LLM review
#                (architecture, quality, security).  Lightweight — one API call.
# full         : Everything regular does, PLUS the full TODO pipeline
#                (todo-analyze → todo-plan).  The "do everything" option.
# todo-full    : Run todo-analyze then todo-plan in sequence — scan every
#                inline TODO/FIXME/HACK/XXX, batch-analyse with Grok, then
#                generate a batched implementation gameplan from todo.md.
# todo-analyze : Scan every TODO/FIXME/HACK/XXX in code, batch-analyse with
#                Grok, compile a prioritised implementation plan.
# todo-plan    : Read the repo's root todo.md, generate a batched gameplan
#                with Grok, commit the plan back to the target repo.
# todo-work    : Execute the gameplan batch-by-batch using Grok to generate
#                code changes, update todo.md with progress (✅/⚠️/❌), and
#                open one Pull Request per batch for review.
#
# Typical flow
# ─────────────
#   full → todo-work (batch 1) → todo-work (batch 2) → …
#   OR: todo-full → todo-work → todo-work → …
#   OR: regular (just a quick health check)
#
# Cache Strategy
# ──────────────
# Each target repo gets a .rustassistant/ directory at its root.  This hidden
# directory is committed into the repo so it persists across runs and works
# even when this workflow is running against many repos simultaneously.
# It contains:
#   .rustassistant/cache.json     — file hashes, last-run metadata, run history
#   .rustassistant/batches/       — per-batch state files (status, PR number, diff)
#   .rustassistant/todo_state.json — snapshot of todo.md item completion state
#
# This design means rustassistant itself never needs to store per-repo state
# centrally — each repo is self-describing.  When rustassistant eventually
# runs 24/7 it can simply clone, read .rustassistant/cache.json to know
# exactly what state the repo is in, and continue from where it left off.
#
# Pull Request Flow
# ─────────────────
# todo-work creates one branch + PR per batch:
#   rustassistant/batch-<N>-<slug>
# Each PR description includes:
#   - Which todo.md items it addresses
#   - What changes were made
#   - Completion status of each item
#   - Link to the workflow run
# todo.md is updated in the SAME commit so the history is always consistent.
#
# Required Secrets (set in nuniesmith/actions)
# ─────────────────────────────────────────────
# XAI_API_KEY       : xAI / Grok  (primary provider for all modes)
# ANTHROPIC_API_KEY : Anthropic / Claude (regular + full modes, optional)
# GOOGLE_API_KEY    : Google / Gemini    (regular + full modes, optional)
# GITHUB_TOKEN       : GitHub token with repo + pull_requests scope
#                      Required for cloning private repos, pushing branches,
#                      and opening pull requests via the GitHub API.
#                      Use the auto-generated ${{ secrets.GITHUB_TOKEN }} or
#                      a fine-grained PAT stored as secrets.GITHUB_TOKEN.
# ============================================================================

name: 🤖 LLM Audit

on:
    workflow_dispatch:
        inputs:
            # ------------------------------------------------------------------
            # Target repository
            # ------------------------------------------------------------------
            target_repo:
                description: "Target repo to audit (owner/repo, e.g. nuniesmith/rustassistant)"
                required: true
                type: string
                default: "nuniesmith/rustassistant"

            target_branch:
                description: "Base branch in the target repo"
                required: false
                type: string
                default: "main"

            # ------------------------------------------------------------------
            # Audit / work mode
            # ------------------------------------------------------------------
            audit_mode:
                description: "Mode (regular=cache+tree+review, full=regular+todo-full, todo-full=analyze→plan→rewrite)"
                required: true
                type: choice
                default: "full"
                options:
                    - regular
                    - full
                    - todo-full
                    - todo-analyze
                    - todo-plan
                    - todo-rewrite
                    - todo-work

            # ------------------------------------------------------------------
            # LLM provider
            # (todo-* modes always use xAI)
            # ------------------------------------------------------------------
            llm_provider:
                description: "LLM Provider (todo-* modes always use xAI/Grok)"
                required: true
                type: choice
                default: "xai"
                options:
                    - xai
                    - anthropic
                    - claude-opus
                    - claude-sonnet
                    - google

            focus_point:
                description: "Focus area for regular/full audits (e.g. 'security', 'performance')"
                required: false
                type: string
                default: ""

            # ------------------------------------------------------------------
            # todo-analyze options
            # ------------------------------------------------------------------
            todo_priority:
                description: "Priority filter for todo-analyze (all | high | medium | low)"
                required: false
                type: choice
                default: "all"
                options:
                    - all
                    - high
                    - medium
                    - low

            todo_batch_size:
                description: "Max TODOs per Grok API call in todo-analyze (default: 15)"
                required: false
                type: string
                default: "15"

            todo_context_lines:
                description: "Lines of context around each TODO in todo-analyze (default: 30)"
                required: false
                type: string
                default: "30"

            # ------------------------------------------------------------------
            # todo-plan options
            # ------------------------------------------------------------------
            todo_plan_batch_count:
                description: "Number of implementation batches Grok should produce (default: 5)"
                required: false
                type: string
                default: "5"

            # ------------------------------------------------------------------
            # todo-work options
            # ------------------------------------------------------------------
            work_batch_number:
                description: "Which batch number to execute in todo-work (0 = auto: next pending)"
                required: false
                type: string
                default: "0"

            work_dry_run:
                description: "Dry-run todo-work: generate changes but do NOT push or open PR"
                required: false
                type: boolean
                default: false

            # ------------------------------------------------------------------
            # General
            # ------------------------------------------------------------------
            commit_results:
                description: "Commit audit reports / cache back to the target repo"
                required: false
                type: boolean
                default: true

permissions:
    contents: write
    actions: read
    pull-requests: write

env:
    REPO_DIR: target-repo
    CACHE_DIR: target-repo/.rustassistant

jobs:
    llm-audit:
        name: >-
            🤖 ${{
              inputs.audit_mode == 'full'          && 'Full Audit'       ||
              inputs.audit_mode == 'todo-full'     && 'TODO Full'        ||
              inputs.audit_mode == 'todo-analyze'  && 'TODO Analyze'     ||
              inputs.audit_mode == 'todo-plan'     && 'TODO Plan'        ||
              inputs.audit_mode == 'todo-rewrite'  && 'TODO Rewrite'     ||
              inputs.audit_mode == 'todo-work'     && 'TODO Work'        ||
              'Regular Audit'
            }} — ${{ inputs.target_repo }} (${{
              (inputs.audit_mode == 'todo-full'    ||
               inputs.audit_mode == 'todo-analyze' ||
               inputs.audit_mode == 'todo-plan'    ||
               inputs.audit_mode == 'todo-rewrite' ||
               inputs.audit_mode == 'todo-work') && 'xai' || inputs.llm_provider
            }})
        runs-on: ubuntu-latest
        timeout-minutes: 180

        steps:
            # ================================================================
            # 1. Checkout actions repo (for shared actions access)
            # ================================================================
            - name: 📥 Checkout actions repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1
                  token: ${{ secrets.GITHUB_TOKEN }}

            # ================================================================
            # 1b. Pull rustassistant from Docker Hub (built by ci-cd.yml)
            # ================================================================
            - name: 🐳 Pull rustassistant image
              id: pull_image
              continue-on-error: true
              run: |
                  IMAGE="docker.io/nuniesmith/rustassistant:latest"
                  echo "## 🐳 Pulling rustassistant" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  if docker pull "$IMAGE" 2>&1 | tail -5; then
                      # Extract the server binary from the image
                      docker create --name ra-extract "$IMAGE" true >/dev/null 2>&1
                      docker cp ra-extract:/usr/local/bin/rustassistant-server ./rustassistant-bin 2>/dev/null
                      docker rm ra-extract >/dev/null 2>&1
                      chmod +x ./rustassistant-bin 2>/dev/null || true

                      if [ -x ./rustassistant-bin ]; then
                          BIN_SIZE=$(du -h ./rustassistant-bin | cut -f1)
                          echo "- Image  : ✅ \`$IMAGE\`" >> $GITHUB_STEP_SUMMARY
                          echo "- Binary : \`./rustassistant-bin\` ($BIN_SIZE)" >> $GITHUB_STEP_SUMMARY
                          echo "ra_available=true" >> $GITHUB_OUTPUT
                      else
                          echo "- Image  : ⚠️ pulled but binary extraction failed" >> $GITHUB_STEP_SUMMARY
                          echo "ra_available=false" >> $GITHUB_OUTPUT
                      fi
                  else
                      echo "- Image  : ⏭️ not available — continuing with Python-only audit" >> $GITHUB_STEP_SUMMARY
                      echo "ra_available=false" >> $GITHUB_OUTPUT
                  fi
                  echo "" >> $GITHUB_STEP_SUMMARY

            # ================================================================
            # 2. Clone the TARGET repo
            # ================================================================
            - name: 📦 Clone target repo — ${{ inputs.target_repo }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TARGET="${{ inputs.target_repo }}"
                  BRANCH="${{ inputs.target_branch }}"

                  echo "## 📦 Cloning \`$TARGET\` @ \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  # ── Skip LFS smudge filter entirely ──────────────────────
                  # Target repos may have large pre-trained models (.onnx, .pt, etc.)
                  # that are tracked by LFS. We don't need to download them — they're
                  # production artifacts, not source code to audit.
                  export GIT_LFS_SKIP_SMUDGE=1
                  git lfs install --skip-repo 2>/dev/null || true

                  if [ -n "$GITHUB_TOKEN" ]; then
                      CLONE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${TARGET}.git"
                      echo "🔐 Using GITHUB_TOKEN authentication" >> $GITHUB_STEP_SUMMARY
                  else
                      CLONE_URL="https://github.com/${TARGET}.git"
                      echo "🌐 No token — public repo only" >> $GITHUB_STEP_SUMMARY
                  fi

                  # Full depth needed so we can branch and push from the clone
                  git clone --branch "$BRANCH" "$CLONE_URL" "${{ env.REPO_DIR }}"

                  # ── Handle LFS-tracked files (skipped via SKIP_SMUDGE) ───
                  # With SKIP_SMUDGE=1, LFS files are checked out as pointer stubs
                  # (tiny text files). Mark them assume-unchanged so git never
                  # considers them dirty during commit/push/rebase.
                  cd "${{ env.REPO_DIR }}"
                  if [ -f .gitattributes ] && grep -q "filter=lfs" .gitattributes 2>/dev/null; then
                      LFS_FILES=$(git lfs ls-files -n 2>/dev/null || true)
                      if [ -n "$LFS_FILES" ]; then
                          echo "$LFS_FILES" | while read -r f; do
                              git update-index --assume-unchanged "$f" 2>/dev/null || true
                          done
                          LFS_COUNT=$(echo "$LFS_FILES" | wc -l)
                          echo "- Git LFS : ⏭️ $LFS_COUNT large files skipped (pre-trained models)" >> $GITHUB_STEP_SUMMARY
                      else
                          echo "- Git LFS : ✅ no LFS objects" >> $GITHUB_STEP_SUMMARY
                      fi
                  fi
                  cd "$GITHUB_WORKSPACE"

                  FILE_COUNT=$(find "${{ env.REPO_DIR }}" -type f \
                      -not -path "*/.git/*" -not -path "*/target/*" | wc -l)
                  RS_COUNT=$(find "${{ env.REPO_DIR }}" -type f -name "*.rs" \
                      -not -path "*/target/*" | wc -l)

                  echo "- Branch : \`$BRANCH\`"          >> $GITHUB_STEP_SUMMARY
                  echo "- Files  : $FILE_COUNT"           >> $GITHUB_STEP_SUMMARY
                  echo "- \`.rs\` files : $RS_COUNT"      >> $GITHUB_STEP_SUMMARY
                  echo ""                                  >> $GITHUB_STEP_SUMMARY

            # ================================================================
            # 3. Initialise / restore .rustassistant cache from target repo
            # ================================================================
            - name: 🗄️ Initialise .rustassistant cache
              run: |
                  CACHE="${{ env.CACHE_DIR }}"
                  REPO="${{ env.REPO_DIR }}"
                  TARGET="${{ inputs.target_repo }}"
                  BRANCH="${{ inputs.target_branch }}"
                  RUN_ID="${{ github.run_id }}"
                  RUN_NUM="${{ github.run_number }}"
                  NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                  mkdir -p "$CACHE/batches"

                  # ── Initialise cache.json if this is the first run ─────────
                  if [ ! -f "$CACHE/cache.json" ]; then
                      echo "📝 No existing cache — creating fresh cache.json" >> $GITHUB_STEP_SUMMARY
                      cat > "$CACHE/cache.json" << CACHE_JSON
                  {
                    "schema_version": "1",
                    "repo": "$TARGET",
                    "base_branch": "$BRANCH",
                    "created_at": "$NOW",
                    "last_run_at": "$NOW",
                    "last_run_id": "$RUN_ID",
                    "last_run_number": $RUN_NUM,
                    "runs": [],
                    "file_hashes": {},
                    "active_batches": [],
                    "completed_batches": [],
                    "failed_batches": []
                  }
                  CACHE_JSON
                  else
                      echo "✅ Existing cache.json found" >> $GITHUB_STEP_SUMMARY
                      # Update last-run metadata
                      python3 - << PYEOF
                  import json, sys
                  path = "$CACHE/cache.json"
                  with open(path) as f:
                      d = json.load(f)
                  d["last_run_at"]     = "$NOW"
                  d["last_run_id"]     = "$RUN_ID"
                  d["last_run_number"] = $RUN_NUM
                  d.setdefault("runs", []).append({
                      "run_id": "$RUN_ID",
                      "run_number": $RUN_NUM,
                      "mode": "${{ inputs.audit_mode }}",
                      "started_at": "$NOW"
                  })
                  # Keep only the last 50 run entries
                  d["runs"] = d["runs"][-50:]
                  with open(path, "w") as f:
                      json.dump(d, f, indent=2)
                  PYEOF
                  fi

                  # ── Build/refresh file hash map ────────────────────────────
                  python3 - << PYEOF
                  import os, json, hashlib

                  cache_path = "$CACHE/cache.json"
                  repo_root  = "$REPO"
                  new_hashes = {}

                  for dirpath, dirnames, filenames in os.walk(repo_root):
                      # Skip hidden dirs and build artifacts
                      dirnames[:] = [d for d in dirnames
                                     if d not in (".git", "target", "node_modules", ".rustassistant")]
                      # Extensions to skip — large binary / pre-trained model files
                      SKIP_EXT = {".onnx", ".pt", ".pth", ".bin", ".h5", ".safetensors",
                                  ".pkl", ".pickle", ".pb", ".tflite", ".mlmodel",
                                  ".ckpt", ".weights", ".npy", ".npz"}
                      for fname in filenames:
                          if os.path.splitext(fname)[1].lower() in SKIP_EXT:
                              continue
                          fpath = os.path.join(dirpath, fname)
                          rel   = os.path.relpath(fpath, repo_root)
                          try:
                              with open(fpath, "rb") as fh:
                                  h = hashlib.sha256(fh.read()).hexdigest()[:16]
                              new_hashes[rel] = h
                          except Exception:
                              pass

                  with open(cache_path) as f:
                      d = json.load(f)

                  old_hashes = d.get("file_hashes", {})
                  changed = [k for k in new_hashes if new_hashes.get(k) != old_hashes.get(k)]
                  added   = [k for k in new_hashes if k not in old_hashes]
                  removed = [k for k in old_hashes if k not in new_hashes]

                  d["file_hashes"]     = new_hashes
                  d["last_file_scan"]  = "$NOW"
                  d["files_changed"]   = changed
                  d["files_added"]     = added
                  d["files_removed"]   = removed

                  with open(cache_path, "w") as f:
                      json.dump(d, f, indent=2)

                  print(f"files_total={len(new_hashes)}")
                  print(f"files_changed={len(changed)}")
                  print(f"files_added={len(added)}")
                  print(f"files_removed={len(removed)}")
                  PYEOF

                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### 🗄️ Cache State" >> $GITHUB_STEP_SUMMARY
                  echo "- Cache path: \`.rustassistant/\`" >> $GITHUB_STEP_SUMMARY
                  TOTAL=$(python3 -c "import json; d=json.load(open('$CACHE/cache.json')); print(len(d.get('file_hashes',{})))" 2>/dev/null || echo "?")
                  CBATCHES=$(python3 -c "import json; d=json.load(open('$CACHE/cache.json')); print(len(d.get('completed_batches',[])))" 2>/dev/null || echo "0")
                  ABATCHES=$(python3 -c "import json; d=json.load(open('$CACHE/cache.json')); print(len(d.get('active_batches',[])))" 2>/dev/null || echo "0")
                  echo "- Files tracked : $TOTAL"       >> $GITHUB_STEP_SUMMARY
                  echo "- Batches done  : $CBATCHES"    >> $GITHUB_STEP_SUMMARY
                  echo "- Batches active: $ABATCHES"    >> $GITHUB_STEP_SUMMARY
                  echo ""                               >> $GITHUB_STEP_SUMMARY

            # ================================================================
            # 4. Validate API keys
            # ================================================================
            - name: 🔍 Validate API keys
              env:
                  HAS_XAI_KEY: ${{ secrets.XAI_API_KEY != '' }}
                  HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
                  HAS_GOOGLE_KEY: ${{ secrets.GOOGLE_API_KEY != '' }}
              run: |
                  PROVIDER="${{ inputs.llm_provider }}"
                  MODE="${{ inputs.audit_mode }}"

                  # All todo-* modes always use xAI
                  if [[ "$MODE" == todo-* ]]; then
                      PROVIDER="xai"
                  fi

                  MISSING=""
                  case "$PROVIDER" in
                      xai)
                          [ "$HAS_XAI_KEY" != "true" ] && MISSING="XAI_API_KEY"
                          ;;
                      anthropic|claude-opus|claude-sonnet)
                          [ "$HAS_ANTHROPIC_KEY" != "true" ] && MISSING="ANTHROPIC_API_KEY"
                          ;;
                      google)
                          [ "$HAS_GOOGLE_KEY" != "true" ] && MISSING="GOOGLE_API_KEY"
                          ;;
                  esac

                  if [ -n "$MISSING" ]; then
                      echo "❌ Missing required secret: $MISSING for provider: $PROVIDER"
                      echo "## ❌ Missing API Key" >> $GITHUB_STEP_SUMMARY
                      echo "Secret \`$MISSING\` is required for provider \`$PROVIDER\`." >> $GITHUB_STEP_SUMMARY
                      exit 1
                  fi

                  echo "✅ API key validated for provider: $PROVIDER"

            # ================================================================
            # 5. Static scan — file list, tree, inline TODOs
            #    (runs for all modes; results used by LLM steps)
            # ================================================================
            - name: 📊 Static scan
              id: static
              run: |
                  REPO="${{ env.REPO_DIR }}"
                  mkdir -p audit-workspace

                  # Source file list (code only — skip binary/model files)
                  find "$REPO" \
                      -type f \
                      \( -name "*.rs" -o -name "*.toml" -o -name "*.proto" -o -name "*.md" \) \
                      -not -path "*/target/*" \
                      -not -path "*/.git/*" \
                      -not -path "*/.rustassistant/*" \
                      -not -path "*/models/*" \
                      > audit-workspace/file-list.txt

                  FILE_COUNT=$(wc -l < audit-workspace/file-list.txt)

                  # Inline TODO/FIXME/HACK/XXX scan (comment-style only)
                  grep -rn \
                      --include="*.rs" --include="*.toml" --include="*.md" \
                      -E "(//|#)\s*(TODO|FIXME|HACK|XXX)" \
                      "$REPO" \
                      --exclude-dir=target \
                      --exclude-dir=.git \
                      --exclude-dir=.rustassistant \
                      > audit-workspace/raw-todos.txt 2>/dev/null || true

                  TODO_COUNT=$(wc -l < audit-workspace/raw-todos.txt)

                  # Directory tree (depth-capped)
                  find "$REPO" \
                      -not -path "*/target/*" \
                      -not -path "*/.git/*" \
                      -not -path "*/.rustassistant/*" \
                      -not -path "*/node_modules/*" \
                      | sed "s|$REPO/||" \
                      | head -400 \
                      > audit-workspace/tree.txt

                  echo "static_file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
                  echo "static_todo_count=$TODO_COUNT"  >> $GITHUB_OUTPUT

                  echo "## 📊 Static Scan" >> $GITHUB_STEP_SUMMARY
                  echo "- Source files : $FILE_COUNT" >> $GITHUB_STEP_SUMMARY
                  echo "- Inline TODOs : $TODO_COUNT" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

            # ================================================================
            # 6. Install Python deps
            # ================================================================
            - name: 🐍 Install Python dependencies
              run: pip install requests --quiet

            # ================================================================
            # 7-A  REGULAR / FULL — holistic LLM audit
            # ================================================================
            - name: 🤖 Run LLM audit (${{ inputs.audit_mode }})
              if: >-
                  inputs.audit_mode == 'regular' ||
                  inputs.audit_mode == 'full'
              id: llm_audit
              env:
                  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
                  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
              run: |
                  echo "## 🤖 LLM Analysis (${{ inputs.audit_mode }})" >> $GITHUB_STEP_SUMMARY

                  PROVIDER="${{ inputs.llm_provider }}"
                  MODE="${{ inputs.audit_mode }}"
                  FOCUS="${{ inputs.focus_point }}"
                  REPO="${{ env.REPO_DIR }}"
                  MAX_BYTES=150000
                  [ "$MODE" = "full" ] && MAX_BYTES=400000

                  # Build source snapshot up to size cap — write to file, not env var
                  SOURCE_SNAP_FILE=/tmp/source_snapshot.txt
                  : > "$SOURCE_SNAP_FILE"
                  BYTES=0
                  while IFS= read -r FILE; do
                      [ ! -f "$FILE" ] && continue
                      SIZE=$(wc -c < "$FILE" 2>/dev/null || echo 0)
                      if [ $((BYTES + SIZE)) -gt $MAX_BYTES ]; then
                          printf '\n\n... (size limit reached) ...' >> "$SOURCE_SNAP_FILE"
                          break
                      fi
                      REL=$(echo "$FILE" | sed "s|$REPO/||")
                      printf '\n\n### FILE: %s\n```\n' "$REL"   >> "$SOURCE_SNAP_FILE"
                      cat "$FILE" 2>/dev/null                    >> "$SOURCE_SNAP_FILE"
                      printf '\n```'                             >> "$SOURCE_SNAP_FILE"
                      BYTES=$((BYTES + SIZE))
                  done < audit-workspace/file-list.txt

                  # Write other large values to temp files
                  cat audit-workspace/tree.txt > /tmp/audit_tree.txt

                  FOCUS_CLAUSE=""
                  [ -n "$FOCUS" ] && FOCUS_CLAUSE="Pay special attention to: $FOCUS."

                  cat > audit-workspace/audit_call.py << 'PYEOF'
                  import os, json, requests, textwrap

                  provider  = os.environ["PROVIDER"]
                  mode      = os.environ["MODE"]
                  focus     = os.environ.get("FOCUS_CLAUSE", "")
                  repo_name = os.environ["REPO_NAME"]

                  with open("/tmp/audit_tree.txt") as _f:
                      tree = _f.read()
                  with open("/tmp/source_snapshot.txt") as _f:
                      source = _f.read()

                  system_prompt = textwrap.dedent(f"""
                      You are a senior software engineer performing a {mode} code audit on
                      the repository '{repo_name}'.
                      Return a single JSON object — no markdown fences, no prose outside JSON.
                      Required top-level keys:
                      {{
                        "summary":          "<executive summary paragraph>",
                        "overall_health":   <0-100>,
                        "priority_actions": ["<action>", ...],
                        "findings": [{{
                          "severity":       "critical|high|medium|low",
                          "category":       "<security|architecture|performance|quality|...>",
                          "title":          "<short title>",
                          "description":    "<detail>",
                          "recommendation": "<what to do>",
                          "files":          ["<path>", ...]
                        }}],
                        "strengths":  ["<strength>", ...],
                        "weaknesses": ["<weakness>", ...],
                        "tech_debt":  ["<item>", ...],
                        "next_steps": ["<step>", ...]
                      }}
                      {focus}
                  """).strip()

                  user_prompt = (
                      f"## Repository tree\n```\n{tree}\n```\n\n"
                      f"## Source files\n{source}"
                  )

                  def call_xai(key):
                      r = requests.post(
                          "https://api.x.ai/v1/chat/completions",
                          headers={"Authorization": f"Bearer {key}", "Content-Type": "application/json"},
                          json={"model": "grok-4-1-fast-reasoning", "messages": [
                              {"role": "system", "content": system_prompt},
                              {"role": "user",   "content": user_prompt}
                          ], "max_tokens": 16384, "temperature": 0.2},
                          timeout=300
                      )
                      r.raise_for_status()
                      return r.json()["choices"][0]["message"]["content"]

                  def call_anthropic(key, model="claude-opus-4-20250514"):
                      r = requests.post(
                          "https://api.anthropic.com/v1/messages",
                          headers={
                              "x-api-key": key,
                              "anthropic-version": "2023-06-01",
                              "Content-Type": "application/json"
                          },
                          json={"model": model, "max_tokens": 8192,
                                "system": system_prompt,
                                "messages": [{"role": "user", "content": user_prompt}]},
                          timeout=300
                      )
                      r.raise_for_status()
                      return r.json()["content"][0]["text"]

                  def call_google(key):
                      model = "gemini-1.5-pro"
                      r = requests.post(
                          f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={key}",
                          json={"contents": [{"parts": [{"text": system_prompt + "\n\n" + user_prompt}]}],
                                "generationConfig": {"maxOutputTokens": 8192, "temperature": 0.2}},
                          timeout=300
                      )
                      r.raise_for_status()
                      return r.json()["candidates"][0]["content"]["parts"][0]["text"]

                  def strip_fences(raw):
                      raw = raw.strip()
                      if raw.startswith("```"):
                          lines = raw.split("\n")
                          raw = "\n".join(lines[1:])
                          if raw.endswith("```"):
                              raw = raw[:-3]
                      return raw.strip()

                  try:
                      if provider == "xai":
                          raw = call_xai(os.environ["XAI_API_KEY"])
                      elif provider == "claude-opus":
                          raw = call_anthropic(os.environ["ANTHROPIC_API_KEY"], "claude-opus-4-20250514")
                      elif provider == "claude-sonnet":
                          raw = call_anthropic(os.environ["ANTHROPIC_API_KEY"], "claude-sonnet-4-20250514")
                      elif provider == "anthropic":
                          raw = call_anthropic(os.environ["ANTHROPIC_API_KEY"])
                      elif provider == "google":
                          raw = call_google(os.environ["GOOGLE_API_KEY"])
                      else:
                          raw = call_xai(os.environ["XAI_API_KEY"])

                      data = json.loads(strip_fences(raw))
                  except Exception as e:
                      data = {
                          "summary": f"Audit failed: {e}",
                          "overall_health": 0,
                          "priority_actions": [],
                          "findings": [],
                          "strengths": [],
                          "weaknesses": [],
                          "tech_debt": [],
                          "next_steps": []
                      }

                  os.makedirs("audit-workspace", exist_ok=True)
                  with open("audit-workspace/llm-analysis.json", "w") as f:
                      json.dump(data, f, indent=2)

                  print(f"overall_health={data.get('overall_health', 0)}")
                  print(f"findings_count={len(data.get('findings', []))}")
                  PYEOF

                  PROVIDER="$PROVIDER" MODE="$MODE" FOCUS_CLAUSE="$FOCUS_CLAUSE" \
                  REPO_NAME="${{ inputs.target_repo }}" \
                  python3 audit-workspace/audit_call.py | tee /tmp/audit_output.txt || true

                  HEALTH=$(grep "overall_health=" /tmp/audit_output.txt | cut -d= -f2 || echo "0")
                  FINDINGS=$(grep "findings_count=" /tmp/audit_output.txt | cut -d= -f2 || echo "0")
                  echo "overall_health=$HEALTH"   >> $GITHUB_OUTPUT
                  echo "findings_count=$FINDINGS" >> $GITHUB_OUTPUT

                  echo "| Metric | Value |"             >> $GITHUB_STEP_SUMMARY
                  echo "|--------|-------|"             >> $GITHUB_STEP_SUMMARY
                  echo "| Health | ${HEALTH}/100 |"     >> $GITHUB_STEP_SUMMARY
                  echo "| Findings | $FINDINGS |"       >> $GITHUB_STEP_SUMMARY
                  echo ""                               >> $GITHUB_STEP_SUMMARY

            # ================================================================
            # 7-B  TODO-ANALYZE — batch Grok analysis of inline code TODOs
            # ================================================================
            - name: 📋 TODO-Analyze
              if: >-
                  inputs.audit_mode == 'todo-analyze' ||
                  inputs.audit_mode == 'todo-full'    ||
                  inputs.audit_mode == 'full'
              id: todo_analyze
              env:
                  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
              run: |
                  echo "## 📋 TODO Batch Analysis (Grok)" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  REPO="${{ env.REPO_DIR }}"
                  CACHE="${{ env.CACHE_DIR }}"

                  # ── Prefer the Rust binary when it was successfully extracted ──
                  if [ -x ./rustassistant-bin ] && [ "${{ steps.pull_image.outputs.ra_available }}" = "true" ]; then
                      echo "🦀 Using rustassistant-bin for TODO analysis" >> $GITHUB_STEP_SUMMARY

                      ./rustassistant-bin todo scan "$REPO" \
                          --json \
                          --output audit-workspace/todo-analysis-report.json \
                          2>&1 | tee /tmp/todo_output.txt || true

                      ANALYZED=$(python3 -c 'import json,sys; d=json.load(open("audit-workspace/todo-analysis-report.json")); print(d.get("analyzed_count", len(d.get("results", []))))' 2>/dev/null || echo "0")
                      TOTAL=$(python3 -c 'import json,sys; d=json.load(open("audit-workspace/todo-analysis-report.json")); print(d.get("total_todos_found", d.get("total_items", 0)))' 2>/dev/null || echo "0")

                      echo "- Runner   : \`rustassistant-bin todo scan\`" >> $GITHUB_STEP_SUMMARY
                      echo "analyzed_count=$ANALYZED" >> $GITHUB_OUTPUT
                      echo "total_todos=$TOTAL"        >> $GITHUB_OUTPUT
                      echo "| TODOs found    | $TOTAL    |" >> $GITHUB_STEP_SUMMARY
                      echo "| TODOs analysed | $ANALYZED |" >> $GITHUB_STEP_SUMMARY
                      echo "" >> $GITHUB_STEP_SUMMARY
                  else
                      echo "🐍 rustassistant-bin unavailable — using Python fallback" >> $GITHUB_STEP_SUMMARY

                  cat > audit-workspace/todo_analyze.py << 'PYEOF'
                  import os, json, re, requests, textwrap

                  xai_key    = os.environ["XAI_API_KEY"]
                  repo_dir   = os.environ["REPO_DIR"]
                  priority_f = os.environ.get("PRIORITY_FILTER", "all").lower()
                  batch_size = int(os.environ.get("BATCH_SIZE", "15"))
                  ctx_lines  = int(os.environ.get("CTX_LINES", "30"))
                  todos_file = "audit-workspace/raw-todos.txt"

                  todos = []
                  with open(todos_file) as f:
                      for line in f:
                          line = line.rstrip()
                          m = re.match(r'^(.+?):(\d+):(.*)$', line)
                          if not m:
                              continue
                          filepath, lineno, text = m.group(1), int(m.group(2)), m.group(3).strip()
                          tl = text.upper()
                          if "FIXME" in tl or "HACK" in tl or "XXX" in tl:
                              prio = "High"
                          elif "TODO" in tl and any(k in tl for k in
                               ("SECURITY","PERF","CRASH","PANIC","UNSAFE","CRITICAL")):
                              prio = "High"
                          elif "TODO" in tl:
                              prio = "Medium"
                          else:
                              prio = "Low"

                          if priority_f != "all" and prio.lower() != priority_f:
                              continue

                          try:
                              with open(filepath) as src:
                                  lines = src.readlines()
                              start   = max(0, lineno - 1 - ctx_lines)
                              end     = min(len(lines), lineno - 1 + ctx_lines + 1)
                              context = "".join(lines[start:end])
                          except Exception:
                              context = text

                          rel = filepath.replace(repo_dir + "/", "").replace(repo_dir + "\\", "")
                          todos.append({"file": rel, "line": lineno, "text": text,
                                        "priority": prio, "context": context})

                  results, errors = [], []

                  for i in range(0, len(todos), batch_size):
                      batch = todos[i:i + batch_size]
                      payload = [{"id": j, "file": t["file"], "line": t["line"],
                                  "priority": t["priority"], "todo_text": t["text"],
                                  "code_context": t["context"][:2000]}
                                 for j, t in enumerate(batch)]

                      system = textwrap.dedent("""
                          You are a senior Rust engineer reviewing TODO/FIXME items.
                          Return a JSON array (same order as input), each element:
                            id, interpretation, estimated_effort, implementation_plan,
                            risk_level, suggested_priority, confidence
                          No prose outside the JSON array.
                      """).strip()

                      try:
                          r = requests.post(
                              "https://api.x.ai/v1/chat/completions",
                              headers={"Authorization": f"Bearer {xai_key}",
                                       "Content-Type": "application/json"},
                              json={"model": "grok-4-1-fast-reasoning", "messages": [
                                  {"role": "system", "content": system},
                                  {"role": "user",   "content": json.dumps(payload, indent=2)}
                              ], "max_tokens": 16384, "temperature": 0.2},
                              timeout=300
                          )
                          r.raise_for_status()
                          raw = r.json()["choices"][0]["message"]["content"].strip()
                          if raw.startswith("```"):
                              raw = "\n".join(raw.split("\n")[1:])
                              if raw.endswith("```"):
                                  raw = raw[:-3]
                          analyses = json.loads(raw)
                      except Exception as e:
                          errors.append(str(e))
                          analyses = [{"id": j, "interpretation": "API error",
                                       "estimated_effort": "unknown",
                                       "implementation_plan": "", "risk_level": "unknown",
                                       "suggested_priority": t["priority"], "confidence": 0}
                                      for j, t in enumerate(batch)]

                      for a in analyses:
                          idx = a.get("id", 0)
                          if idx < len(batch):
                              results.append({**batch[idx], **a})

                      print(f"Batch {i // batch_size + 1}: {len(batch)} TODOs processed")

                  report = {
                      "audit_type":        "todo-analyze",
                      "repo":              os.environ.get("REPO_NAME", ""),
                      "analyzed_count":    len(results),
                      "skipped_count":     len(todos) - len(results),
                      "total_todos_found": len(todos),
                      "errors":            errors,
                      "results":           results,
                      "scan_summary": {
                          "total":           len(todos),
                          "high_priority":   sum(1 for t in todos if t["priority"] == "High"),
                          "medium_priority": sum(1 for t in todos if t["priority"] == "Medium"),
                          "low_priority":    sum(1 for t in todos if t["priority"] == "Low")
                      }
                  }

                  os.makedirs("audit-workspace", exist_ok=True)
                  with open("audit-workspace/todo-analysis-report.json", "w") as f:
                      json.dump(report, f, indent=2)

                  print(f"analyzed_count={len(results)}")
                  print(f"total_todos={len(todos)}")
                  PYEOF

                  REPO_DIR="${{ env.REPO_DIR }}" \
                  PRIORITY_FILTER="${{ inputs.todo_priority }}" \
                  BATCH_SIZE="${{ inputs.todo_batch_size }}" \
                  CTX_LINES="${{ inputs.todo_context_lines }}" \
                  REPO_NAME="${{ inputs.target_repo }}" \
                  python3 audit-workspace/todo_analyze.py | tee /tmp/todo_output.txt || true

                  ANALYZED=$(grep "analyzed_count=" /tmp/todo_output.txt | tail -1 | cut -d= -f2 || echo "0")
                  TOTAL=$(grep "total_todos=" /tmp/todo_output.txt | tail -1 | cut -d= -f2 || echo "0")
                  echo "analyzed_count=$ANALYZED" >> $GITHUB_OUTPUT
                  echo "total_todos=$TOTAL"        >> $GITHUB_OUTPUT

                  echo "- Runner   : \`Python fallback\`"        >> $GITHUB_STEP_SUMMARY
                  echo "| TODOs found    | $TOTAL    |"          >> $GITHUB_STEP_SUMMARY
                  echo "| TODOs analysed | $ANALYZED |"          >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  fi  # end binary/python branch

            # ================================================================
            # 7-C  TODO-PLAN — read todo.md, generate batched gameplan
            # ================================================================
            - name: 🗺️ TODO-Plan — gameplan from todo.md
              if: >-
                  inputs.audit_mode == 'todo-plan'    ||
                  inputs.audit_mode == 'todo-full'    ||
                  inputs.audit_mode == 'todo-rewrite' ||
                  inputs.audit_mode == 'full'
              id: todo_plan
              env:
                  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
              run: |
                  echo "## 🗺️ TODO Plan" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  REPO="${{ env.REPO_DIR }}"
                  CACHE="${{ env.CACHE_DIR }}"
                  BATCH_COUNT="${{ inputs.todo_plan_batch_count }}"
                  TODO_FILE="$REPO/todo.md"

                  if [ ! -f "$TODO_FILE" ]; then
                      TODO_FILE=$(find "$REPO" -maxdepth 2 -iname "todo.md" | head -1 || true)
                  fi

                  # ── Prefer the Rust binary when it was successfully extracted ──
                  if [ -x ./rustassistant-bin ] && [ "${{ steps.pull_image.outputs.ra_available }}" = "true" ]; then
                      echo "🦀 Using rustassistant-bin for TODO plan" >> $GITHUB_STEP_SUMMARY

                      ./rustassistant-bin todo plan "$TODO_FILE" \
                          --context "$REPO" \
                          --output "$CACHE/todo-plan.json" \
                          2>&1 | tee /tmp/plan_output.txt || true

                      # Copy to audit-workspace for artifact upload
                      cp "$CACHE/todo-plan.json" audit-workspace/todo-plan.json 2>/dev/null || true

                      # Extract gameplan markdown and stats using jq (always available on ubuntu-latest)
                      if command -v jq >/dev/null 2>&1 && [ -f "$CACHE/todo-plan.json" ]; then
                          jq -r '.gameplan_markdown // ""' "$CACHE/todo-plan.json" > audit-workspace/GAMEPLAN.md 2>/dev/null || true
                          cp audit-workspace/GAMEPLAN.md "$CACHE/GAMEPLAN.md" 2>/dev/null || true
                          ITEMS=$(jq '(.total_items // ([.batches[]?.items[]?] | length))' "$CACHE/todo-plan.json" 2>/dev/null || echo "0")
                          BATCHES=$(jq '.batches | length' "$CACHE/todo-plan.json" 2>/dev/null || echo "0")
                      else
                          ITEMS="0"
                          BATCHES="0"
                      fi

                      echo "- Runner   : \`rustassistant-bin todo plan\`" >> $GITHUB_STEP_SUMMARY
                      echo "total_items=$ITEMS"   >> $GITHUB_OUTPUT
                      echo "batch_count=$BATCHES" >> $GITHUB_OUTPUT
                      echo "| Items   | $ITEMS   |" >> $GITHUB_STEP_SUMMARY
                      echo "| Batches | $BATCHES |" >> $GITHUB_STEP_SUMMARY
                      echo "" >> $GITHUB_STEP_SUMMARY
                  else
                      echo "🐍 rustassistant-bin unavailable — using Python fallback" >> $GITHUB_STEP_SUMMARY

                  if [ -z "$TODO_FILE" ] || [ ! -f "$TODO_FILE" ]; then
                      echo "❌ No todo.md found in ${{ inputs.target_repo }}" >> $GITHUB_STEP_SUMMARY
                      echo '{"error":"No todo.md found","batches":[]}' > audit-workspace/todo-plan.json
                      exit 0
                  fi

                  # Write large values to temp files instead of env vars
                  cat "$TODO_FILE" > /tmp/todo_content.txt
                  head -100 audit-workspace/raw-todos.txt > /tmp/inline_todos.txt 2>/dev/null || true
                  BATCH_COUNT="${{ inputs.todo_plan_batch_count }}"

                  echo "- todo.md : \`$(echo "$TODO_FILE" | sed "s|$REPO/||")\`" >> $GITHUB_STEP_SUMMARY
                  echo "- Lines   : $(wc -l < "$TODO_FILE")"                     >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  cat > audit-workspace/todo_plan.py << 'PYEOF'
                  import os, json, requests, textwrap

                  xai_key     = os.environ["XAI_API_KEY"]
                  repo_name   = os.environ["REPO_NAME"]
                  batch_count = int(os.environ.get("BATCH_COUNT", "5"))

                  with open("/tmp/todo_content.txt") as _f:
                      todo_text = _f.read()
                  try:
                      with open("/tmp/inline_todos.txt") as _f:
                          inline = _f.read()
                  except FileNotFoundError:
                      inline = ""

                  system = textwrap.dedent(f"""
                      You are a senior engineering lead reviewing the todo.md backlog for '{repo_name}'.

                      Tasks:
                      1. Understand every item in the todo list.
                      2. Group related items into logical implementation batches.
                      3. Order batches by impact / risk / dependency.
                      4. For each batch: explain what to do, why, how, effort, acceptance criteria.
                      5. Produce the full content of a GAMEPLAN.md document.

                      Return a SINGLE JSON object with these exact keys:
                      {{
                        "summary":      "<overview paragraph>",
                        "total_items":  <int>,
                        "batches": [{{
                          "batch_number":          <int starting at 1>,
                          "title":                 "<short slug-friendly title>",
                          "rationale":             "<why this order>",
                          "priority":              "critical|high|medium|low",
                          "estimated_effort":      "<e.g. 1-2 days>",
                          "items":                 ["<todo item text>", ...],
                          "implementation_steps":  ["<step>", ...],
                          "acceptance_criteria":   ["<criterion>", ...],
                          "dependencies":          ["<batch title or external dep>", ...]
                        }}],
                        "deferred":          ["<item not yet actionable>", ...],
                        "risks":             ["<risk>", ...],
                        "gameplan_markdown": "<full GAMEPLAN.md as a string>"
                      }}

                      Produce exactly {batch_count} batches (fewer only if the backlog is smaller).
                      No prose outside the JSON object.
                  """).strip()

                  user = (
                      f"## todo.md\n```markdown\n{todo_text}\n```\n\n"
                      + (f"## Inline code TODOs (first 100)\n```\n{inline}\n```" if inline else "")
                  )

                  try:
                      r = requests.post(
                          "https://api.x.ai/v1/chat/completions",
                          headers={"Authorization": f"Bearer {xai_key}",
                                   "Content-Type": "application/json"},
                          json={"model": "grok-4-1-fast-reasoning", "messages": [
                              {"role": "system", "content": system},
                              {"role": "user",   "content": user}
                          ], "max_tokens": 16384, "temperature": 0.3},
                          timeout=300
                      )
                      r.raise_for_status()
                      raw = r.json()["choices"][0]["message"]["content"].strip()
                      if raw.startswith("```"):
                          raw = "\n".join(raw.split("\n")[1:])
                          if raw.endswith("```"):
                              raw = raw[:-3]
                      data = json.loads(raw)
                  except Exception as e:
                      data = {
                          "summary": f"Plan generation failed: {e}",
                          "total_items": 0, "batches": [],
                          "deferred": [], "risks": [],
                          "gameplan_markdown": f"# Gameplan\n\nGeneration failed: {e}\n"
                      }

                  os.makedirs("audit-workspace", exist_ok=True)
                  with open("audit-workspace/todo-plan.json", "w") as f:
                      json.dump(data, f, indent=2)
                  with open("audit-workspace/GAMEPLAN.md", "w") as f:
                      f.write(data.get("gameplan_markdown", "# No gameplan generated\n"))

                  print(f"total_items={data.get('total_items', 0)}")
                  print(f"batch_count={len(data.get('batches', []))}")
                  PYEOF

                  XAI_API_KEY="$XAI_API_KEY" \
                  REPO_NAME="${{ inputs.target_repo }}" \
                  BATCH_COUNT="$BATCH_COUNT" \
                  python3 audit-workspace/todo_plan.py | tee /tmp/plan_output.txt || true

                  ITEMS=$(grep "total_items="  /tmp/plan_output.txt | cut -d= -f2 || echo "0")
                  BATCHES=$(grep "batch_count=" /tmp/plan_output.txt | cut -d= -f2 || echo "0")
                  echo "total_items=$ITEMS"   >> $GITHUB_OUTPUT
                  echo "batch_count=$BATCHES" >> $GITHUB_OUTPUT

                  # ── Persist gameplan into cache ────────────────────────────
                  cp audit-workspace/todo-plan.json "$CACHE/todo-plan.json" 2>/dev/null || true
                  cp audit-workspace/GAMEPLAN.md    "$CACHE/GAMEPLAN.md"    2>/dev/null || true

                  echo "- Runner   : \`Python fallback\`"  >> $GITHUB_STEP_SUMMARY
                  echo "| Items   | $ITEMS   |"            >> $GITHUB_STEP_SUMMARY
                  echo "| Batches | $BATCHES |"            >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  fi  # end binary/python branch

            # ================================================================
            # 7-D-pre  TODO-REWRITE
            # 7-D-pre  TODO-REWRITE — regenerate todo.md in canonical format
            #       • Reads current todo.md + gameplan + cache state
            #       • Asks Grok to rewrite into clean rustassistant format
            #       • Written back into the target repo before todo-work runs
            # ================================================================
            - name: 📝 TODO-Rewrite — regenerate todo.md
              if: >-
                  inputs.audit_mode == 'todo-rewrite' ||
                  inputs.audit_mode == 'todo-plan'    ||
                  inputs.audit_mode == 'todo-full'    ||
                  inputs.audit_mode == 'todo-work'    ||
                  inputs.audit_mode == 'full'
              id: todo_rewrite
              env:
                  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
              run: |
                  echo "## 📝 TODO Rewrite" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  REPO="${{ env.REPO_DIR }}"
                  CACHE="${{ env.CACHE_DIR }}"
                  TARGET="${{ inputs.target_repo }}"

                  # ── Locate todo.md ────────────────────────────────────────
                  TODO_FILE="$REPO/todo.md"
                  if [ ! -f "$TODO_FILE" ]; then
                      TODO_FILE=$(find "$REPO" -maxdepth 3 -iname "todo.md" | head -1 || true)
                  fi

                  if [ -z "$TODO_FILE" ] || [ ! -f "$TODO_FILE" ]; then
                      echo "ℹ️ No todo.md found — nothing to rewrite" >> $GITHUB_STEP_SUMMARY
                      echo "rewrite_skipped=true" >> $GITHUB_OUTPUT
                      exit 0
                  fi

                  echo "- todo.md : \`$(echo "$TODO_FILE" | sed "s|$REPO/||")\`" >> $GITHUB_STEP_SUMMARY
                  echo "- Lines   : $(wc -l < "$TODO_FILE")"                     >> $GITHUB_STEP_SUMMARY

                  # ── Load supporting context into temp files ───────────────
                  cat "$TODO_FILE" > /tmp/rewrite_todo.txt

                  # Gameplan from this run (todo-plan may have just generated it)
                  GAMEPLAN_SRC=""
                  if [ -f "audit-workspace/todo-plan.json" ]; then
                      GAMEPLAN_SRC="audit-workspace/todo-plan.json"
                  elif [ -f "$CACHE/todo-plan.json" ]; then
                      GAMEPLAN_SRC="$CACHE/todo-plan.json"
                  elif [ -f "$REPO/docs/audit/todo-plan.json" ]; then
                      GAMEPLAN_SRC="$REPO/docs/audit/todo-plan.json"
                  fi

                  if [ -n "$GAMEPLAN_SRC" ]; then
                      python3 -c "
                  import json, sys
                  with open('$GAMEPLAN_SRC') as f:
                      d = json.load(f)
                  # Summarise batches and completed status for context
                  out = []
                  out.append(f\"Summary: {d.get('summary','')}\")
                  for b in d.get('batches', []):
                      out.append(f\"Batch {b['batch_number']} ({b.get('priority','?')}): {b['title']}\")
                      for item in b.get('items', []):
                          out.append(f\"  - {item}\")
                  completed = d.get('deferred', [])
                  if completed:
                      out.append('Deferred:')
                      for item in completed:
                          out.append(f'  - {item}')
                  print('\n'.join(out))
                  " > /tmp/rewrite_gameplan.txt 2>/dev/null || true
                  else
                      : > /tmp/rewrite_gameplan.txt
                  fi

                  # Cache completed-batch list
                  python3 -c "
                  import json, os, glob
                  cache_path = '$CACHE/cache.json'
                  completed = []
                  try:
                      with open(cache_path) as f:
                          cache = json.load(f)
                      completed = cache.get('completed_batches', [])
                  except Exception:
                      pass
                  # Also pick up per-batch json files for richer status
                  summaries = []
                  for p in sorted(glob.glob('$CACHE/batches/batch-*.json')):
                      try:
                          with open(p) as f:
                              bd = json.load(f)
                          summaries.append(f\"Batch {bd.get('batch_number')}: {bd.get('title','')} — {bd.get('status','?')}\")
                          for u in bd.get('todo_updates', []):
                              summaries.append(f\"  {u.get('status','?')}: {u.get('item','')[:80]}\")
                      except Exception:
                          pass
                  print('Completed batches: ' + str(completed))
                  print('\n'.join(summaries))
                  " > /tmp/rewrite_cache_state.txt 2>/dev/null || true

                  cat > audit-workspace/todo_rewrite.py << 'PYEOF'
                  import os, json, requests, textwrap

                  xai_key   = os.environ["XAI_API_KEY"]
                  repo_name = os.environ["REPO_NAME"]
                  todo_path = os.environ["TODO_PATH"]

                  with open("/tmp/rewrite_todo.txt") as _f:
                      current_todo = _f.read()
                  with open("/tmp/rewrite_gameplan.txt") as _f:
                      gameplan_context = _f.read()
                  with open("/tmp/rewrite_cache_state.txt") as _f:
                      cache_state = _f.read()

                  system = textwrap.dedent(f"""
                      You are a senior engineering lead maintaining the todo.md backlog for '{repo_name}'.

                      Your job is to produce a clean, well-structured rewrite of the todo.md file.

                      Rules:
                      1. Preserve every open (uncompleted) item — do not silently drop anything.
                      2. Mark items as ✅ completed (move to Completed section) if the cache state
                         shows they were finished in a previous batch run.
                      3. Remove inline run-annotation noise (⚠️ *[Batch N: ...] — [PR branch]* etc.)
                         that was appended by the workflow. Keep the item text clean.
                      4. Organise open items under: 🔴 High Priority, 🟡 Medium Priority, 🟢 Low Priority.
                      5. Within each priority group, organise by logical theme/category.
                      6. Keep the Completed section clean — only final ✅ entries, no workflow noise.
                      7. Update the "Next Steps" section to reflect current state (completed work done,
                         remaining work prioritised).
                      8. Use the same markdown style as the original: dash-list items, `[ ]` checkboxes
                         for open items, `[x]` for completed items.
                      9. Add a brief repo context header (name, purpose, key facts) if one exists in
                         the original — keep it concise.
                      10. Output ONLY the full rewritten todo.md content as plain markdown.
                          No JSON wrapper, no code fences, no prose outside the document.
                  """).strip()

                  user = textwrap.dedent(f"""
                      ## Current todo.md
                      {current_todo}

                      ## Gameplan context (from last todo-plan run)
                      {gameplan_context[:3000] if gameplan_context.strip() else "(none)"}

                      ## Cache state (completed batches and item statuses)
                      {cache_state[:2000] if cache_state.strip() else "(none — first run)"}
                  """).strip()

                  try:
                      r = requests.post(
                          "https://api.x.ai/v1/chat/completions",
                          headers={"Authorization": f"Bearer {xai_key}",
                                   "Content-Type": "application/json"},
                          json={"model": "grok-4-1-fast-reasoning", "messages": [
                              {"role": "system", "content": system},
                              {"role": "user",   "content": user}
                          ], "max_tokens": 16384, "temperature": 0.2},
                          timeout=300
                      )
                      r.raise_for_status()
                      raw = r.json()["choices"][0]["message"]["content"].strip()
                      # Strip accidental code fences if the model wrapped output
                      if raw.startswith("```"):
                          lines = raw.split("\n")
                          raw = "\n".join(lines[1:])
                          if raw.rstrip().endswith("```"):
                              raw = raw.rstrip()[:-3].rstrip()
                      rewritten = raw
                      status = "ok"
                  except Exception as e:
                      rewritten = current_todo  # fall back to original
                      status = f"error: {e}"

                  os.makedirs("audit-workspace", exist_ok=True)
                  # Save the rewritten content to a workspace file
                  with open("audit-workspace/todo-rewritten.md", "w") as f:
                      f.write(rewritten)
                  # Write directly back into the repo
                  with open(todo_path, "w") as f:
                      f.write(rewritten)

                  print(f"rewrite_status={status}")
                  print(f"lines_in={len(current_todo.splitlines())}")
                  print(f"lines_out={len(rewritten.splitlines())}")
                  PYEOF

                  XAI_API_KEY="$XAI_API_KEY" \
                  REPO_NAME="$TARGET" \
                  TODO_PATH="$TODO_FILE" \
                  python3 audit-workspace/todo_rewrite.py | tee /tmp/rewrite_output.txt || true

                  RSTAT=$(grep "^rewrite_status=" /tmp/rewrite_output.txt | cut -d= -f2- || echo "unknown")
                  LINES_IN=$(grep  "^lines_in="  /tmp/rewrite_output.txt | cut -d= -f2 || echo "?")
                  LINES_OUT=$(grep "^lines_out=" /tmp/rewrite_output.txt | cut -d= -f2 || echo "?")

                  echo "rewrite_status=$RSTAT" >> $GITHUB_OUTPUT

                  if [[ "$RSTAT" == "ok" ]]; then
                      echo "- ✅ todo.md rewritten ($LINES_IN lines → $LINES_OUT lines)" >> $GITHUB_STEP_SUMMARY
                  else
                      echo "- ⚠️ Rewrite encountered an issue: $RSTAT (original preserved)" >> $GITHUB_STEP_SUMMARY
                  fi
                  echo "" >> $GITHUB_STEP_SUMMARY

            # ================================================================
            # 7-E  TODO-WORK — execute one batch from the gameplan
            #       • Grok generates code changes (unified diff)
            #       • todo.md updated with ✅/⚠️/❌ per item
            #       • Changes committed to a branch
            #       • Pull Request opened via GitHub API
            # ================================================================
            - name: 🔨 TODO-Work — execute batch
              if: >-
                  inputs.audit_mode == 'todo-work'
              id: todo_work
              env:
                  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  echo "## 🔨 TODO Work" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  REPO="${{ env.REPO_DIR }}"
                  CACHE="${{ env.CACHE_DIR }}"
                  TARGET="${{ inputs.target_repo }}"
                  BASE_BRANCH="${{ inputs.target_branch }}"
                  DRY_RUN="${{ inputs.work_dry_run }}"
                  REQUESTED_BATCH="${{ inputs.work_batch_number }}"

                  # ── Prefer the Rust binary when it was successfully extracted ──
                  if [ -x ./rustassistant-bin ] && [ "${{ steps.pull_image.outputs.ra_available }}" = "true" ]; then
                      echo "🦀 Using rustassistant-bin for TODO work" >> $GITHUB_STEP_SUMMARY

                      PLAN_FILE="$CACHE/todo-plan.json"
                      if [ ! -f "$PLAN_FILE" ]; then
                          PLAN_FILE="$REPO/docs/audit/todo-plan.json"
                      fi
                      if [ ! -f "$PLAN_FILE" ]; then
                          echo "❌ No todo-plan.json found. Run todo-plan mode first." >> $GITHUB_STEP_SUMMARY
                          echo "::error::No gameplan found. Run todo-plan mode first."
                          exit 1
                      fi

                      TODO_MD="$REPO/todo.md"
                      DRY_RUN_FLAG=""
                      [ "$DRY_RUN" = "true" ] && DRY_RUN_FLAG="--dry-run"

                      BATCH_ARG=""
                      [ -n "$REQUESTED_BATCH" ] && [ "$REQUESTED_BATCH" != "auto" ] && \
                          BATCH_ARG="--batch $REQUESTED_BATCH"

                      ./rustassistant-bin todo work "$PLAN_FILE" \
                          --context "$REPO" \
                          --todo-md "$TODO_MD" \
                          --auto-sync \
                          $BATCH_ARG \
                          $DRY_RUN_FLAG \
                          2>&1 | tee /tmp/work_output.txt || true

                      APPLIED=$(grep -c "^applied:" /tmp/work_output.txt 2>/dev/null || echo "0")
                      FAILED=$(grep -c "^failed:"  /tmp/work_output.txt 2>/dev/null || echo "0")

                      echo "- Runner     : \`rustassistant-bin todo work\`" >> $GITHUB_STEP_SUMMARY
                      echo "- Dry-run    : $DRY_RUN"                        >> $GITHUB_STEP_SUMMARY
                      echo "| Hunks applied | $APPLIED |"                   >> $GITHUB_STEP_SUMMARY
                      echo "| Hunks failed  | $FAILED  |"                   >> $GITHUB_STEP_SUMMARY
                      echo "" >> $GITHUB_STEP_SUMMARY

                      # Skip the Python work block entirely
                      echo "binary_ran=true" >> /tmp/work_ran.txt
                  else
                      echo "🐍 rustassistant-bin unavailable — using Python fallback" >> $GITHUB_STEP_SUMMARY
                      echo "binary_ran=false" >> /tmp/work_ran.txt
                  fi

                  # ── Python fallback (skipped when binary ran successfully) ──
                  if grep -q "binary_ran=false" /tmp/work_ran.txt 2>/dev/null; then

                  # ── Load gameplan from cache ──────────────────────────────
                  PLAN_FILE="$CACHE/todo-plan.json"
                  if [ ! -f "$PLAN_FILE" ]; then
                      # Fall back to a plan checked into the repo
                      PLAN_FILE="$REPO/docs/audit/todo-plan.json"
                  fi
                  if [ ! -f "$PLAN_FILE" ]; then
                      echo "❌ No todo-plan.json found. Run todo-plan mode first." >> $GITHUB_STEP_SUMMARY
                      echo "::error::No gameplan found. Run todo-plan mode first."
                      exit 1
                  fi

                  # ── Determine which batch to run ──────────────────────────
                  BATCH_NUM=$(python3 - << PYEOF
                  import json, sys

                  with open("$PLAN_FILE") as f:
                      plan = json.load(f)

                  cache_file = "$CACHE/cache.json"
                  try:
                      with open(cache_file) as f:
                          cache = json.load(f)
                  except Exception:
                      cache = {}

                  completed = set(cache.get("completed_batches", []))
                  requested = int("$REQUESTED_BATCH")

                  if requested > 0:
                      print(requested)
                      sys.exit(0)

                  # Auto: find first pending batch
                  for b in plan.get("batches", []):
                      num = b["batch_number"]
                      if num not in completed:
                          print(num)
                          sys.exit(0)

                  print(0)  # All batches done
                  PYEOF
                  )

                  if [ "$BATCH_NUM" = "0" ]; then
                      echo "✅ All batches already completed!" >> $GITHUB_STEP_SUMMARY
                      echo "batch_num=0" >> $GITHUB_OUTPUT
                      exit 0
                  fi

                  echo "- Executing batch #$BATCH_NUM" >> $GITHUB_STEP_SUMMARY

                  # ── Extract batch definition ──────────────────────────────
                  python3 - << PYEOF > audit-workspace/current-batch.json
                  import json
                  with open("$PLAN_FILE") as f:
                      plan = json.load(f)
                  batch = next((b for b in plan.get("batches", [])
                                if b["batch_number"] == $BATCH_NUM), None)
                  if batch:
                      print(json.dumps(batch, indent=2))
                  else:
                      print("{}")
                  PYEOF

                  BATCH_TITLE=$(python3 -c \
                      "import json; d=json.load(open('audit-workspace/current-batch.json')); print(d.get('title','batch-$BATCH_NUM'))" \
                      2>/dev/null || echo "batch-$BATCH_NUM")
                  BATCH_SLUG=$(echo "$BATCH_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40)
                  BRANCH_NAME="rustassistant/batch-${BATCH_NUM}-${BATCH_SLUG}"

                  echo "- Branch : \`$BRANCH_NAME\`"   >> $GITHUB_STEP_SUMMARY
                  echo "- Title  : $BATCH_TITLE"         >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  # ── Read todo.md ──────────────────────────────────────────
                  TODO_FILE="$REPO/todo.md"
                  if [ ! -f "$TODO_FILE" ]; then
                      TODO_FILE=$(find "$REPO" -maxdepth 2 -iname "todo.md" | head -1 || true)
                  fi
                  # ── Build source snapshot for this batch — write to file, not env var ──
                  SOURCE_SNAP_FILE=/tmp/work_source_snap.txt
                  : > "$SOURCE_SNAP_FILE"
                  BYTES=0
                  MAX=80000
                  while IFS= read -r FILE; do
                      [ ! -f "$FILE" ] && continue
                      SIZE=$(wc -c < "$FILE" 2>/dev/null || echo 0)
                      [ $((BYTES + SIZE)) -gt $MAX ] && break
                      REL=$(echo "$FILE" | sed "s|$REPO/||")
                      printf '### FILE: %s\n```\n' "$REL" >> "$SOURCE_SNAP_FILE"
                      cat "$FILE" 2>/dev/null              >> "$SOURCE_SNAP_FILE"
                      printf '\n```\n'                     >> "$SOURCE_SNAP_FILE"
                      BYTES=$((BYTES + SIZE))
                  done < audit-workspace/file-list.txt

                  # Write TODO_CONTENT to a temp file
                  if [ -f "$TODO_FILE" ]; then
                      cat "$TODO_FILE" > /tmp/work_todo_content.txt
                  else
                      : > /tmp/work_todo_content.txt
                  fi

                  # ── Ask Grok to implement the batch ──────────────────────
                  cat > audit-workspace/todo_work.py << 'PYEOF'
                  import os, json, requests, textwrap

                  xai_key   = os.environ["XAI_API_KEY"]
                  repo_name = os.environ["REPO_NAME"]

                  with open("audit-workspace/current-batch.json") as _f:
                      batch = json.load(_f)
                  try:
                      with open("/tmp/work_todo_content.txt") as _f:
                          todo_text = _f.read()
                  except FileNotFoundError:
                      todo_text = ""
                  try:
                      with open("/tmp/work_source_snap.txt") as _f:
                          source = _f.read()
                  except FileNotFoundError:
                      source = ""

                  system = textwrap.dedent(f"""
                      You are a senior Rust engineer implementing a batch of TODO items for '{repo_name}'.

                      You must return a SINGLE JSON object with these keys:

                      {{
                        "branch_description": "<what this PR does in 1-2 sentences>",
                        "pr_title":           "<concise PR title>",
                        "pr_body":            "<full PR description markdown>",
                        "file_changes": [{{
                          "path":      "<relative file path>",
                          "action":    "modify|create|delete",
                          "content":   "<FULL new file content for modify/create, empty for delete>"
                        }}],
                        "todo_updates": [{{
                          "item":   "<original todo item text, verbatim>",
                          "status": "completed|partial|blocked",
                          "note":   "<brief note on what was done or why it is partial/blocked>"
                        }}],
                        "summary":       "<what was implemented>",
                        "risks":         ["<risk>", ...],
                        "follow_up":     ["<follow-up item>", ...]
                      }}

                      Rules:
                      - For file_changes, always provide the COMPLETE file content for modify/create.
                        Never provide diffs or partial snippets — the full file will be written verbatim.
                      - Mark todo items as:
                          completed : fully implemented and tested
                          partial   : partially done, note what remains
                          blocked   : cannot proceed, note why
                      - If you cannot safely implement a change, mark it partial/blocked and explain.
                      - No prose outside the JSON object.
                  """).strip()

                  user = textwrap.dedent(f"""
                      ## Batch to implement
                      ```json
                      {json.dumps(batch, indent=2)}
                      ```

                      ## Current todo.md
                      ```markdown
                      {todo_text[:3000]}
                      ```

                      ## Repository source (subset)
                      {source[:60000]}
                  """).strip()

                  try:
                      r = requests.post(
                          "https://api.x.ai/v1/chat/completions",
                          headers={"Authorization": f"Bearer {xai_key}",
                                   "Content-Type": "application/json"},
                          json={"model": "grok-4-1-fast-reasoning", "messages": [
                              {"role": "system", "content": system},
                              {"role": "user",   "content": user}
                          ], "max_tokens": 32768, "temperature": 0.2},
                          timeout=600
                      )
                      r.raise_for_status()
                      raw = r.json()["choices"][0]["message"]["content"].strip()
                      if raw.startswith("```"):
                          raw = "\n".join(raw.split("\n")[1:])
                          if raw.endswith("```"):
                              raw = raw[:-3]
                      result = json.loads(raw.strip())
                  except Exception as e:
                      result = {
                          "branch_description": f"Implementation failed: {e}",
                          "pr_title":    f"[WIP] Batch {batch.get('batch_number')}: {batch.get('title','')}",
                          "pr_body":     f"Implementation failed: {e}",
                          "file_changes": [],
                          "todo_updates": [{"item": item, "status": "blocked",
                                            "note": f"API error: {e}"}
                                           for item in batch.get("items", [])],
                          "summary":   f"Failed: {e}",
                          "risks":     [],
                          "follow_up": []
                      }

                  os.makedirs("audit-workspace", exist_ok=True)
                  with open("audit-workspace/work-result.json", "w") as f:
                      json.dump(result, f, indent=2)

                  print(f"file_changes={len(result.get('file_changes', []))}")
                  print(f"todo_updates={len(result.get('todo_updates', []))}")
                  PYEOF

                  XAI_API_KEY="$XAI_API_KEY" \
                  REPO_NAME="$TARGET" \
                  python3 audit-workspace/todo_work.py | tee /tmp/work_output.txt || true

                  FILE_CHANGES=$(grep "file_changes=" /tmp/work_output.txt | cut -d= -f2 || echo "0")
                  TODO_UPDATES=$(grep "todo_updates="  /tmp/work_output.txt | cut -d= -f2 || echo "0")

                  echo "| File changes | $FILE_CHANGES |"  >> $GITHUB_STEP_SUMMARY
                  echo "| TODO updates | $TODO_UPDATES |"  >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  # ── Create branch and apply file changes ─────────────────
                  cd "$REPO"
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH_NAME"

                  # Apply file changes from Grok's result
                  python3 - << PYEOF
                  import json, os, pathlib

                  with open("../audit-workspace/work-result.json") as f:
                      result = json.load(f)

                  repo_root = os.getcwd()

                  for change in result.get("file_changes", []):
                      path    = change.get("path", "").lstrip("/")
                      action  = change.get("action", "modify")
                      content = change.get("content", "")

                      if not path:
                          continue

                      abs_path = os.path.join(repo_root, path)

                      if action == "delete":
                          if os.path.exists(abs_path):
                              os.remove(abs_path)
                              print(f"  deleted: {path}")
                      else:
                          pathlib.Path(abs_path).parent.mkdir(parents=True, exist_ok=True)
                          with open(abs_path, "w") as fh:
                              fh.write(content)
                          print(f"  {'created' if action == 'create' else 'modified'}: {path}")
                  PYEOF

                  # ── Update todo.md with progress ─────────────────────────
                  cd "$GITHUB_WORKSPACE"
                  python3 - << PYEOF
                  import json, re, os

                  result_path = "audit-workspace/work-result.json"
                  with open(result_path) as f:
                      result = json.load(f)

                  todo_path = "$TODO_FILE"
                  if not os.path.exists(todo_path):
                      print("No todo.md to update")
                      exit(0)

                  with open(todo_path) as f:
                      content = f.read()

                  batch_num   = $BATCH_NUM
                  run_url     = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  branch_name = "$BRANCH_NAME"

                  for update in result.get("todo_updates", []):
                      item   = update.get("item", "").strip()
                      status = update.get("status", "partial")
                      note   = update.get("note", "").strip()

                      if not item:
                          continue

                      emoji = {"completed": "✅", "partial": "⚠️", "blocked": "❌"}.get(status, "⚠️")
                      annotation = f" {emoji} *[Batch {batch_num}: {status}*"
                      if note:
                          annotation += f" — {note}"
                      annotation += f" — [PR branch]({branch_name})]*"

                      # Try to find and annotate the line
                      escaped = re.escape(item[:60])
                      new_content, n = re.subn(
                          rf'({escaped}[^\n]*)',
                          rf'\1{annotation}',
                          content,
                          count=1
                      )
                      if n > 0:
                          content = new_content

                  # Append a run summary section at the bottom
                  run_section = f"""
                  ---
                  ## Batch {batch_num} — {result.get("summary", "")}
                  *Run: [{run_url}]({run_url})*

                  """
                  for update in result.get("todo_updates", []):
                      emoji = {"completed": "✅", "partial": "⚠️", "blocked": "❌"}.get(
                          update.get("status","partial"), "⚠️")
                      run_section += f"- {emoji} `{update.get('item','')[:80]}` — {update.get('note','')}\n"

                  if result.get("follow_up"):
                      run_section += "\n### Follow-up\n"
                      for item in result["follow_up"]:
                          run_section += f"- {item}\n"

                  content += run_section

                  with open(todo_path, "w") as f:
                      f.write(content)

                  print("todo.md updated")
                  PYEOF

                  # ── Update .rustassistant cache state ─────────────────────
                  python3 - << PYEOF
                  import json, os, datetime

                  with open("audit-workspace/work-result.json") as f:
                      result = json.load(f)

                  cache_path  = "$CACHE/cache.json"
                  batch_state = {
                      "batch_number":  $BATCH_NUM,
                      "title":         "$BATCH_TITLE",
                      "branch":        "$BRANCH_NAME",
                      "status":        "completed" if all(
                                           u.get("status") == "completed"
                                           for u in result.get("todo_updates", [{}])
                                       ) else "partial",
                      "completed_at":  datetime.datetime.utcnow().isoformat() + "Z",
                      "run_id":        "${{ github.run_id }}",
                      "run_number":    ${{ github.run_number }},
                      "file_changes":  len(result.get("file_changes", [])),
                      "todo_updates":  result.get("todo_updates", []),
                      "summary":       result.get("summary", ""),
                      "risks":         result.get("risks", []),
                      "follow_up":     result.get("follow_up", [])
                  }

                  # Save per-batch state file
                  os.makedirs("$CACHE/batches", exist_ok=True)
                  with open(f"$CACHE/batches/batch-{$BATCH_NUM}.json", "w") as f:
                      json.dump(batch_state, f, indent=2)

                  # Update main cache
                  try:
                      with open(cache_path) as f:
                          cache = json.load(f)
                  except Exception:
                      cache = {}

                  cache.setdefault("completed_batches", [])
                  cache.setdefault("active_batches", [])
                  if $BATCH_NUM not in cache["completed_batches"]:
                      cache["completed_batches"].append($BATCH_NUM)
                  cache["active_batches"] = [b for b in cache["active_batches"] if b != $BATCH_NUM]
                  cache["last_batch_run"] = batch_state

                  with open(cache_path, "w") as f:
                      json.dump(cache, f, indent=2)

                  print("cache updated")
                  PYEOF

                  # ── Commit everything (code changes + todo.md + cache) ────
                  cd "$REPO"
                  git add -A
                  # Unstage any LFS pointer files — we never want to modify those
                  git diff --staged --name-only 2>/dev/null | grep -E '\.(onnx|pt|pth|bin|h5|safetensors|pkl|pb|tflite|ckpt|weights)$' | while read -r f; do
                      git reset HEAD "$f" 2>/dev/null || true
                  done
                  COMMIT_MSG="🤖 Batch $BATCH_NUM: $BATCH_TITLE [skip ci]"
                  git commit -m "$COMMIT_MSG" || echo "Nothing to commit"

                  # ── Push branch ───────────────────────────────────────────
                  if [ "$DRY_RUN" = "true" ]; then
                      echo "⚠️ Dry-run mode — skipping push and PR creation" >> $GITHUB_STEP_SUMMARY
                      echo "batch_num=$BATCH_NUM"     >> $GITHUB_OUTPUT
                      echo "branch=$BRANCH_NAME"       >> $GITHUB_OUTPUT
                      echo "pr_created=false"          >> $GITHUB_OUTPUT
                      exit 0
                  fi

                  # Skip LFS pre-push hook — LFS files are pointer-only stubs
                  # (marked assume-unchanged at clone time)
                  GIT_LFS_SKIP_PUSH=1 git push origin "$BRANCH_NAME" || {
                      echo "::error::Failed to push branch $BRANCH_NAME"
                      exit 1
                  }

                  # ── Open Pull Request via GitHub API (pure Python — avoids shell escaping) ──
                  cat > audit-workspace/create_pr.py << 'PYEOF'
                  import os, json, requests

                  gh_pat      = os.environ["GITHUB_TOKEN"]
                  target      = os.environ["TARGET_REPO"]
                  branch_name = os.environ["BRANCH_NAME"]
                  base_branch = os.environ["BASE_BRANCH"]
                  batch_num   = int(os.environ["BATCH_NUM"])
                  batch_title = os.environ["BATCH_TITLE"]
                  run_url     = os.environ["RUN_URL"]

                  with open("audit-workspace/work-result.json") as f:
                      result = json.load(f)
                  with open("audit-workspace/current-batch.json") as f:
                      batch = json.load(f)

                  pr_title = result.get("pr_title") or f"🤖 Batch {batch_num}: {batch_title}"

                  body  = result.get("pr_body", "")
                  body += "\n\n---\n"
                  body += f"**Batch:** {batch.get('batch_number')} — {batch.get('title','')}\n"
                  body += f"**Estimated effort:** {batch.get('estimated_effort','')}\n"
                  body += f"**Priority:** {batch.get('priority','')}\n\n"
                  body += "### TODO Item Status\n\n"
                  for u in result.get("todo_updates", []):
                      emoji = {"completed": "✅", "partial": "⚠️", "blocked": "❌"}.get(u.get("status","partial"), "⚠️")
                      body += f"{emoji} `{u.get('item','')[:100]}` — {u.get('note','')}\n"
                  body += "\n### Risks\n"
                  for r in result.get("risks", []):
                      body += f"- {r}\n"
                  body += "\n### Follow-up\n"
                  for f2 in result.get("follow_up", []):
                      body += f"- {f2}\n"
                  body += f"\n---\n*Generated by [RustAssistant]({run_url})*\n"

                  resp = requests.post(
                      f"https://api.github.com/repos/{target}/pulls",
                      headers={
                          "Authorization": f"token {gh_pat}",
                          "Accept": "application/vnd.github+json",
                      },
                      json={
                          "title": pr_title,
                          "body":  body,
                          "head":  branch_name,
                          "base":  base_branch,
                          "draft": False,
                      },
                      timeout=60,
                  )

                  if resp.status_code >= 400:
                      err_msg = resp.json().get("message", resp.text[:200])
                      print(f"pr_error={resp.status_code}: {err_msg}")
                      print("pr_number=?")
                      print("pr_url=")
                      print(f"pr_title={pr_title}")
                  else:
                      pr_number = resp.json().get("number", "?")
                      pr_url    = resp.json().get("html_url", "")
                      print(f"pr_number={pr_number}")
                      print(f"pr_url={pr_url}")
                      print(f"pr_title={pr_title}")
                  PYEOF

                  cd "$GITHUB_WORKSPACE"
                  GITHUB_TOKEN="$GITHUB_TOKEN" \
                  TARGET_REPO="$TARGET" \
                  BRANCH_NAME="$BRANCH_NAME" \
                  BASE_BRANCH="$BASE_BRANCH" \
                  BATCH_NUM="$BATCH_NUM" \
                  BATCH_TITLE="$BATCH_TITLE" \
                  RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                  python3 audit-workspace/create_pr.py | tee /tmp/pr_output.txt || true

                  PR_NUMBER=$(grep "^pr_number=" /tmp/pr_output.txt | cut -d= -f2 || echo "?")
                  PR_URL=$(grep    "^pr_url="    /tmp/pr_output.txt | cut -d= -f2- || echo "")
                  PR_TITLE=$(grep  "^pr_title="  /tmp/pr_output.txt | cut -d= -f2 || echo "🤖 Batch $BATCH_NUM: $BATCH_TITLE")

                  # Update cache with PR number
                  python3 - << PYEOF
                  import json
                  cache_path = "$CACHE/cache.json"
                  with open(cache_path) as f:
                      cache = json.load(f)
                  if cache.get("last_batch_run"):
                      cache["last_batch_run"]["pr_number"] = "$PR_NUMBER"
                      cache["last_batch_run"]["pr_url"]    = "$PR_URL"
                  batch_file = "$CACHE/batches/batch-$BATCH_NUM.json"
                  with open(batch_file) as f:
                      bd = json.load(f)
                  bd["pr_number"] = "$PR_NUMBER"
                  bd["pr_url"]    = "$PR_URL"
                  with open(batch_file, "w") as f:
                      json.dump(bd, f, indent=2)
                  with open(cache_path, "w") as f:
                      json.dump(cache, f, indent=2)
                  PYEOF

                  echo "batch_num=$BATCH_NUM"     >> $GITHUB_OUTPUT
                  echo "branch=$BRANCH_NAME"       >> $GITHUB_OUTPUT
                  echo "pr_number=$PR_NUMBER"       >> $GITHUB_OUTPUT
                  echo "pr_url=$PR_URL"             >> $GITHUB_OUTPUT
                  echo "pr_created=true"            >> $GITHUB_OUTPUT

                  echo "### 🔀 Pull Request" >> $GITHUB_STEP_SUMMARY
                  echo "- PR #$PR_NUMBER: [$PR_TITLE]($PR_URL)" >> $GITHUB_STEP_SUMMARY
                  echo "- Branch: \`$BRANCH_NAME\`"              >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  cd "$GITHUB_WORKSPACE"

                  fi  # end Python fallback (binary/python branch for todo-work)

            # ================================================================
            # 8. Generate Markdown reports
            #    For compound modes (full, todo-full), generate one report per
            #    sub-step that actually ran, so all artifacts are captured.
            # ================================================================
            - name: 📄 Generate reports
              run: |
                  mkdir -p audit-workspace/reports

                  export MODE="${{ inputs.audit_mode }}"
                  RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

                  PROVIDER_DISPLAY="${{ inputs.llm_provider }}"
                  if [[ "$MODE" == todo-* ]] || [[ "$MODE" == "full" ]]; then
                      PROVIDER_DISPLAY="Grok 4.1 Fast (xAI)"
                  else
                      case "$PROVIDER_DISPLAY" in
                          claude-opus)   PROVIDER_DISPLAY="Claude Opus 4 (Anthropic)" ;;
                          claude-sonnet) PROVIDER_DISPLAY="Claude Sonnet 4 (Anthropic)" ;;
                          anthropic)     PROVIDER_DISPLAY="Claude Opus 4 (Anthropic)" ;;
                          xai)           PROVIDER_DISPLAY="Grok 4.1 Fast (xAI)" ;;
                          google)        PROVIDER_DISPLAY="Gemini 1.5 Pro (Google)" ;;
                      esac
                  fi

                  # ── Helper: write a report with common header ──────────────
                  write_header() {
                      local REPORT_FILE="$1"
                      local LABEL="$2"
                      cat > "$REPORT_FILE" << HEADER
                  # 🤖 RustAssistant — $LABEL Report

                  > Auto-generated by [RustAssistant]($RUN_URL)

                  | | |
                  |---|---|
                  | **Repository** | \`${{ inputs.target_repo }}\` |
                  | **Branch** | \`${{ inputs.target_branch }}\` |
                  | **Mode** | \`$MODE\` |
                  | **Provider** | $PROVIDER_DISPLAY |
                  | **Date** | $DATE |
                  | **Run** | [#${{ github.run_number }}]($RUN_URL) |

                  ---

                  HEADER
                  }

                  # ── Determine which reports to generate ─────────────────────
                  # Each report is generated independently so compound modes
                  # (full, todo-full) produce all relevant artifacts.

                  python3 - << 'PYEOF'
                  import json, os, sys

                  mode = os.environ["MODE"]

                  def append_to(path, text):
                      with open(path, "a") as f:
                          f.write(text)

                  # ── LLM audit report (regular, full) ─────────────────────
                  if mode in ("regular", "full"):
                      rf = "audit-workspace/reports/LLM_AUDIT_REPORT.md"
                      src = "audit-workspace/llm-analysis.json"
                      if os.path.exists(src):
                          with open(src) as f:
                              data = json.load(f)
                          append_to(rf, f"## 📋 Summary\n\n{data.get('summary','N/A')}\n\n")
                          append_to(rf, f"**Overall Health:** {data.get('overall_health',0)}/100\n\n---\n\n")
                          if data.get("priority_actions"):
                              append_to(rf, "## 🎯 Priority Actions\n\n")
                              for a in data["priority_actions"]:
                                  append_to(rf, f"1. {a}\n")
                              append_to(rf, "\n---\n\n")
                          if data.get("findings"):
                              append_to(rf, "## 🔍 Findings\n\n")
                              sev_order = ["critical","high","medium","low"]
                              for fd in sorted(data["findings"],
                                               key=lambda x: sev_order.index(x.get("severity","low"))
                                               if x.get("severity","low") in sev_order else 99):
                                  sev = fd.get("severity","?").upper()
                                  append_to(rf, f"### {sev}: {fd.get('title','')}\n\n")
                                  append_to(rf, f"**Category:** {fd.get('category','')}\n\n")
                                  append_to(rf, f"{fd.get('description','')}\n\n")
                                  append_to(rf, f"**Recommendation:** {fd.get('recommendation','')}\n\n")
                                  files = fd.get("files", [])
                                  if files:
                                      append_to(rf, f"**Files:** {', '.join(files)}\n\n")
                                  append_to(rf, "---\n\n")
                          for section, header in [
                              ("strengths",  "## ✅ Strengths\n\n"),
                              ("weaknesses", "## ⚠️ Weaknesses\n\n"),
                              ("tech_debt",  "## 📝 Technical Debt\n\n"),
                              ("next_steps", "## ➡️ Next Steps\n\n"),
                          ]:
                              items = data.get(section, [])
                              if items:
                                  append_to(rf, header)
                                  for i, s in enumerate(items, 1):
                                      prefix = f"{i}. " if section == "next_steps" else "- "
                                      append_to(rf, f"{prefix}{s}\n")
                                  append_to(rf, "\n")
                          append_to(rf, "\n---\n\n*Auto-generated — re-run for updated analysis.*\n")
                          print(f"  ✅ LLM_AUDIT_REPORT.md")
                      else:
                          print(f"  ⏭️  No llm-analysis.json — skipping audit report")

                  # ── TODO analysis report (todo-analyze, todo-full, full) ──
                  if mode in ("todo-analyze", "todo-full", "full"):
                      rf = "audit-workspace/reports/TODO_ANALYSIS_REPORT.md"
                      src = "audit-workspace/todo-analysis-report.json"
                      if os.path.exists(src):
                          with open(src) as f:
                              data = json.load(f)
                          ss = data.get("scan_summary", {})
                          append_to(rf, "## 📊 Scan Summary\n\n")
                          append_to(rf, f"| Metric | Value |\n|--------|-------|\n")
                          append_to(rf, f"| Total TODOs    | {ss.get('total', 0)} |\n")
                          append_to(rf, f"| 🔴 High        | {ss.get('high_priority', 0)} |\n")
                          append_to(rf, f"| 🟡 Medium      | {ss.get('medium_priority', 0)} |\n")
                          append_to(rf, f"| 🟢 Low         | {ss.get('low_priority', 0)} |\n")
                          append_to(rf, f"| Analysed       | {data.get('analyzed_count', 0)} |\n\n---\n\n")
                          append_to(rf, "## 🎯 High-Priority TODOs\n\n")
                          for r in sorted(data.get("results", []),
                                          key=lambda x: x.get("suggested_priority","") != "High"):
                              if r.get("priority") != "High" and \
                                 r.get("suggested_priority","").lower() != "high":
                                  continue
                              append_to(rf, f"### `{r['file']}:{r['line']}`\n\n")
                              append_to(rf, f"**TODO:** {r['text']}\n\n")
                              append_to(rf, f"**Interpretation:** {r.get('interpretation','')}\n\n")
                              append_to(rf, f"**Effort:** {r.get('estimated_effort','?')}  "
                                     f"**Risk:** {r.get('risk_level','?')}  "
                                     f"**Confidence:** {r.get('confidence',0)}\n\n")
                              plan = r.get("implementation_plan","")
                              if plan:
                                  append_to(rf, f"**Plan:**\n\n{plan}\n\n")
                              append_to(rf, "---\n\n")
                          append_to(rf, "## 📋 All TODOs\n\n")
                          for r in data.get("results", []):
                              prio = r.get("priority","?")
                              emoji = {"High":"🔴","Medium":"🟡","Low":"🟢"}.get(prio,"⚪")
                              append_to(rf, f"- {emoji} `{r['file']}:{r['line']}` {r['text']}\n")
                          errs = data.get("errors", [])
                          if errs:
                              append_to(rf, "\n---\n\n## ⚠️ Errors\n\n")
                              for e in errs:
                                  append_to(rf, f"- {e}\n")
                          append_to(rf, "\n---\n\n*Auto-generated — re-run for updated analysis.*\n")
                          print(f"  ✅ TODO_ANALYSIS_REPORT.md")
                      else:
                          print(f"  ⏭️  No todo-analysis-report.json — skipping")

                  # ── Gameplan report (todo-plan, todo-rewrite, todo-full, full) ──
                  if mode in ("todo-plan", "todo-rewrite", "todo-full", "full"):
                      rf = "audit-workspace/reports/GAMEPLAN.md"
                      gp = "audit-workspace/GAMEPLAN.md"
                      if os.path.exists(gp):
                          with open(gp) as f:
                              lines = f.readlines()
                          start = next((i for i, l in enumerate(lines) if not l.startswith("# ")), 0)
                          append_to(rf, "".join(lines[start:]))
                          append_to(rf, "\n---\n\n*Auto-generated — re-run for updated analysis.*\n")
                          print(f"  ✅ GAMEPLAN.md")
                      else:
                          print(f"  ⏭️  No GAMEPLAN.md — skipping")

                  # ── Batch work report (todo-work only) ───────────────────
                  if mode == "todo-work":
                      rf = "audit-workspace/reports/BATCH_WORK_REPORT.md"
                      src = "audit-workspace/work-result.json"
                      bat = "audit-workspace/current-batch.json"
                      if os.path.exists(src):
                          with open(src) as f:
                              result = json.load(f)
                          with open(bat) as f:
                              batch = json.load(f)
                          append_to(rf, f"## Batch {batch.get('batch_number')}: {batch.get('title','')}\n\n")
                          append_to(rf, f"**Priority:** {batch.get('priority','')}  "
                                 f"**Effort:** {batch.get('estimated_effort','')}\n\n")
                          append_to(rf, f"### Summary\n\n{result.get('summary','')}\n\n---\n\n")
                          append_to(rf, "### TODO Item Status\n\n")
                          for u in result.get("todo_updates", []):
                              emoji = {"completed":"✅","partial":"⚠️","blocked":"❌"}.get(
                                  u.get("status","partial"),"⚠️")
                              append_to(rf, f"- {emoji} `{u.get('item','')[:100]}`\n"
                                     f"  - Status: **{u.get('status','')}**\n"
                                     f"  - Note: {u.get('note','')}\n\n")
                          append_to(rf, "### File Changes\n\n")
                          for fc in result.get("file_changes", []):
                              append_to(rf, f"- `{fc.get('action','?')}` `{fc.get('path','?')}`\n")
                          append_to(rf, "\n### Risks\n\n")
                          for r in result.get("risks", []):
                              append_to(rf, f"- {r}\n")
                          append_to(rf, "\n### Follow-up\n\n")
                          for fu in result.get("follow_up", []):
                              append_to(rf, f"- {fu}\n")
                          append_to(rf, "\n---\n\n*Auto-generated — re-run for updated analysis.*\n")
                          print(f"  ✅ BATCH_WORK_REPORT.md")
                      else:
                          print(f"  ⏭️  No work-result.json — skipping")
                  PYEOF

                  # Now write the common header into each report that was generated
                  for RF in audit-workspace/reports/*.md; do
                      [ ! -f "$RF" ] && continue
                      LABEL=$(basename "$RF" .md | sed 's/_/ /g')
                      BODY=$(cat "$RF")
                      write_header "$RF" "$LABEL"
                      echo "$BODY" >> "$RF"
                  done

                  echo "✅ Reports written:" >> $GITHUB_STEP_SUMMARY
                  ls -1 audit-workspace/reports/*.md 2>/dev/null | while read -r f; do
                      echo "  - \`$(basename "$f")\`" >> $GITHUB_STEP_SUMMARY
                  done
                  echo "" >> $GITHUB_STEP_SUMMARY

            # ================================================================
            # 9. Commit reports + updated cache back to target repo
            # ================================================================
            - name: 💾 Commit results to target repo
              if: >-
                  inputs.commit_results == true &&
                  inputs.audit_mode != 'todo-work'
              # Note: todo-work commits on its own branch inside the step above.
              # For todo-rewrite / todo-plan / todo-full / full we commit here,
              # which includes the rewritten todo.md written back by todo_rewrite.py.
              continue-on-error: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # todo-work already committed + pushed on its own branch — skip
                  # The remote URL embedded at clone time already carries the token,
                  # so git push works without any additional credential setup here.
                  MODE="${{ inputs.audit_mode }}"
                  REPO="${{ env.REPO_DIR }}"
                  CACHE="${{ env.CACHE_DIR }}"

                  cd "$REPO"
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  mkdir -p docs/audit

                  # ── Copy ALL generated reports + JSON artifacts to target repo ─
                  # Compound modes (full, todo-full) produce multiple reports —
                  # copy everything that exists.
                  for RF in ../audit-workspace/reports/*.md; do
                      [ -f "$RF" ] && cp "$RF" docs/audit/ || true
                  done
                  # JSON artifacts
                  cp ../audit-workspace/llm-analysis.json             docs/audit/ 2>/dev/null || true
                  cp ../audit-workspace/todo-analysis-report.json     docs/audit/ 2>/dev/null || true
                  cp ../audit-workspace/todo-plan.json                docs/audit/ 2>/dev/null || true
                  # Rewritten todo.md — copy back to workspace artifact dir (the file
                  # was already written in-place to target-repo/todo.md by todo_rewrite.py,
                  # so git will pick it up via `git add -A` below).
                  cp ../audit-workspace/todo-rewritten.md             docs/audit/ 2>/dev/null || true

                  # ── Always update .rustassistant cache ────────────────────
                  # Only stage the directories we care about — never touch LFS files.
                  # Also stage todo.md if the rewrite step modified it.
                  git add docs/audit/ 2>/dev/null || true
                  git add -f .rustassistant/ 2>/dev/null || true
                  git add todo.md 2>/dev/null || true

                  if git diff --staged --quiet; then
                      echo "ℹ️ No changes to commit"
                      exit 0
                  fi

                  PROVIDER_TAG="${{ inputs.llm_provider }}"
                  [[ "$MODE" == todo-* ]] && PROVIDER_TAG="xai"

                  git commit -m "🤖 $MODE report + cache update ($PROVIDER_TAG) [skip ci]"

                  # Push with retry + rebase
                  # GIT_LFS_SKIP_PUSH=1 skips the pre-push hook that fails on
                  # pointer-only checkouts (we never modify LFS content).
                  MAX_RETRIES=3
                  RETRY=0
                  PUSH_OK=false

                  while [ "$RETRY" -lt "$MAX_RETRIES" ]; do
                      echo "  ℹ️ Push attempt $((RETRY + 1))/$MAX_RETRIES..."
                      PUSH_ERR=$(GIT_LFS_SKIP_PUSH=1 git push 2>&1) && {
                          PUSH_OK=true
                          echo "✅ Pushed to ${{ inputs.target_repo }}"
                          break
                      }
                      RETRY=$((RETRY + 1))
                      echo "⚠️ Push attempt $RETRY/$MAX_RETRIES failed:"
                      # Sanitize output to prevent PAT leakage in logs
                      echo "$PUSH_ERR" | sed 's|https://[^@]*@|https://***@|g' | head -5

                      # Fetch + rebase to catch up with remote
                      git fetch origin "${{ inputs.target_branch }}" 2>/dev/null || true
                      git rebase "origin/${{ inputs.target_branch }}" 2>/dev/null || {
                          echo "  ⚠️ Rebase failed — aborting and retrying..."
                          git rebase --abort 2>/dev/null || true
                      }
                      sleep 2
                  done

                  if [ "$PUSH_OK" = "false" ]; then
                      echo "::warning::Push failed after $MAX_RETRIES retries — results in artifacts."
                  fi

            # ================================================================
            # 10. Upload artifacts
            # ================================================================
            - name: 📦 Upload artifacts
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: >-
                      rustassistant-${{ inputs.audit_mode }}-${{
                        (inputs.audit_mode == 'todo-full'    ||
                         inputs.audit_mode == 'todo-analyze' ||
                         inputs.audit_mode == 'todo-plan'    ||
                         inputs.audit_mode == 'todo-rewrite' ||
                         inputs.audit_mode == 'todo-work') && 'xai' || inputs.llm_provider
                      }}-run${{ github.run_number }}
                  path: |
                      audit-workspace/reports/
                      audit-workspace/llm-analysis.json
                      audit-workspace/todo-analysis-report.json
                      audit-workspace/todo-plan.json
                      audit-workspace/GAMEPLAN.md
                      audit-workspace/todo-rewritten.md
                      audit-workspace/work-result.json
                      audit-workspace/current-batch.json
                      audit-workspace/raw-todos.txt
                      audit-workspace/file-list.txt
                      audit-workspace/tree.txt
                  retention-days: 30
                  include-hidden-files: false

            # ================================================================
            # 11. Summary
            # ================================================================
            - name: ✅ Summary
              if: always()
              run: |
                  MODE="${{ inputs.audit_mode }}"
                  RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  REWRITE_STATUS="${{ steps.todo_rewrite.outputs.rewrite_status }}"

                  echo ""                                                    >> $GITHUB_STEP_SUMMARY
                  echo "---"                                                 >> $GITHUB_STEP_SUMMARY
                  echo ""                                                    >> $GITHUB_STEP_SUMMARY
                  echo "## ✅ Complete"                                      >> $GITHUB_STEP_SUMMARY
                  echo ""                                                    >> $GITHUB_STEP_SUMMARY
                  echo "| | |"                                               >> $GITHUB_STEP_SUMMARY
                  echo "|---|---|"                                           >> $GITHUB_STEP_SUMMARY
                  echo "| **Repo**   | \`${{ inputs.target_repo }}\` |"     >> $GITHUB_STEP_SUMMARY
                  echo "| **Branch** | \`${{ inputs.target_branch }}\` |"   >> $GITHUB_STEP_SUMMARY
                  echo "| **Mode**   | \`$MODE\` |"                         >> $GITHUB_STEP_SUMMARY

                  # ── Per-substep summaries (compound modes show multiple) ──
                  # LLM audit health (regular, full)
                  if [[ "$MODE" == "regular" || "$MODE" == "full" ]]; then
                      HEALTH=$(python3 -c "import json; d=json.load(open('audit-workspace/llm-analysis.json')); print(d.get('overall_health',0))" 2>/dev/null || echo "?")
                      echo "| **Health** | ${HEALTH}/100 |"                 >> $GITHUB_STEP_SUMMARY
                      echo "| **Report** | \`docs/audit/LLM_AUDIT_REPORT.md\` |" >> $GITHUB_STEP_SUMMARY
                  fi

                  # TODO analyze (todo-analyze, todo-full, full)
                  if [[ "$MODE" == "todo-analyze" || "$MODE" == "todo-full" || "$MODE" == "full" ]]; then
                      TOTAL=$(python3 -c "import json; d=json.load(open('audit-workspace/todo-analysis-report.json')); print(d.get('total_todos_found',0))" 2>/dev/null || echo "?")
                      A_DONE=$(python3 -c "import json; d=json.load(open('audit-workspace/todo-analysis-report.json')); print(d.get('analyzed_count',0))" 2>/dev/null || echo "?")
                      echo "| **TODOs found**    | $TOTAL |"                >> $GITHUB_STEP_SUMMARY
                      echo "| **TODOs analysed** | $A_DONE |"              >> $GITHUB_STEP_SUMMARY
                      echo "| **Report** | \`docs/audit/TODO_ANALYSIS_REPORT.md\` |" >> $GITHUB_STEP_SUMMARY
                  fi

                  # TODO plan (todo-plan, todo-full, full)
                  if [[ "$MODE" == "todo-plan" || "$MODE" == "todo-full" || "$MODE" == "full" ]]; then
                      BATCHES=$(python3 -c "import json; d=json.load(open('audit-workspace/todo-plan.json')); print(len(d.get('batches',[])))" 2>/dev/null || echo "?")
                      ITEMS=$(python3 -c "import json; d=json.load(open('audit-workspace/todo-plan.json')); print(d.get('total_items',0))" 2>/dev/null || echo "?")
                      echo "| **Plan items**  | $ITEMS |"                   >> $GITHUB_STEP_SUMMARY
                      echo "| **Plan batches** | $BATCHES |"                >> $GITHUB_STEP_SUMMARY
                      echo "| **Report**  | \`docs/audit/GAMEPLAN.md\` |"   >> $GITHUB_STEP_SUMMARY
                  fi

                  # TODO work (todo-work only)
                  if [[ "$MODE" == "todo-work" ]]; then
                      BATCH_NUM=$(python3 -c "import json; d=json.load(open('audit-workspace/current-batch.json')); print(d.get('batch_number','?'))" 2>/dev/null || echo "?")
                      PR_URL=""
                      if [ -f "${{ env.CACHE_DIR }}/batches/batch-${BATCH_NUM}.json" ]; then
                          PR_URL=$(python3 -c "import json; d=json.load(open('${{ env.CACHE_DIR }}/batches/batch-${BATCH_NUM}.json')); print(d.get('pr_url',''))" 2>/dev/null || echo "")
                          PR_NUM=$(python3 -c "import json; d=json.load(open('${{ env.CACHE_DIR }}/batches/batch-${BATCH_NUM}.json')); print(d.get('pr_number','?'))" 2>/dev/null || echo "?")
                      fi
                      echo "| **Batch executed** | #$BATCH_NUM |"           >> $GITHUB_STEP_SUMMARY
                      [ -n "$PR_URL" ] && \
                      echo "| **Pull Request**   | [#$PR_NUM]($PR_URL) |"  >> $GITHUB_STEP_SUMMARY
                      echo "| **Report** | \`docs/audit/BATCH_WORK_REPORT.md\` |" >> $GITHUB_STEP_SUMMARY
                  fi

                  echo ""                                                    >> $GITHUB_STEP_SUMMARY
                  echo "- 📦 [Artifacts — run #${{ github.run_number }}]($RUN_URL)" >> $GITHUB_STEP_SUMMARY
                  COMMIT_STATUS="${{ inputs.commit_results == true && 'enabled' || 'disabled' }}"
                  echo "- 💾 Commit results: $COMMIT_STATUS"                >> $GITHUB_STEP_SUMMARY
                  echo ""                                                    >> $GITHUB_STEP_SUMMARY
                  echo "| **Cache** | \`.rustassistant/\` updated in \`${{ inputs.target_repo }}\` |" >> $GITHUB_STEP_SUMMARY
                  if [[ "$MODE" == "todo-rewrite" || "$MODE" == "todo-plan" || "$MODE" == "todo-full" || "$MODE" == "full" ]]; then
                      if [[ "$REWRITE_STATUS" == "ok" ]]; then
                          echo "| **todo.md** | ✅ Rewritten and committed |" >> $GITHUB_STEP_SUMMARY
                      elif [[ -n "$REWRITE_STATUS" && "$REWRITE_STATUS" != "" ]]; then
                          echo "| **todo.md** | ⚠️ Rewrite issue: $REWRITE_STATUS |" >> $GITHUB_STEP_SUMMARY
                      fi
                  fi
                  echo ""                                                    >> $GITHUB_STEP_SUMMARY
                  echo "### Recommended Next Step"                           >> $GITHUB_STEP_SUMMARY
                  case "$MODE" in
                      full)         echo "Run \`todo-work\` to execute batch 1 from the generated gameplan." >> $GITHUB_STEP_SUMMARY ;;
                      todo-full)    echo "Run \`todo-work\` to execute batch 1 from the generated gameplan." >> $GITHUB_STEP_SUMMARY ;;
                      todo-plan)    echo "Run \`todo-rewrite\` to clean up todo.md, then \`todo-work\` to execute batch 1." >> $GITHUB_STEP_SUMMARY ;;
                      todo-rewrite) echo "todo.md has been rewritten. Run \`todo-work\` to execute the next pending batch." >> $GITHUB_STEP_SUMMARY ;;
                      todo-work)    echo "Review the PR, merge it, then run \`todo-work\` for the next batch (or \`todo-rewrite\` to tidy todo.md first)." >> $GITHUB_STEP_SUMMARY ;;
                      todo-analyze) echo "Run \`todo-plan\` to generate an implementation gameplan from these findings." >> $GITHUB_STEP_SUMMARY ;;
                      regular)      echo "Review the findings. Run \`full\` for a complete audit + gameplan, or \`todo-work\` if a plan already exists." >> $GITHUB_STEP_SUMMARY ;;
                  esac
