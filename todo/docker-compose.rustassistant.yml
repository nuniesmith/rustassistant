# docker-compose.rustassistant.yml
# Full RustAssistant stack: app + Redis + Ollama with CUDA passthrough
# Usage:
#   docker compose -f docker-compose.rustassistant.yml up -d
#   docker compose -f docker-compose.rustassistant.yml exec ollama ollama pull qwen2.5-coder:7b

services:

  # ─── RustAssistant App ─────────────────────────────────────────────────
  rustassistant:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rustassistant
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=sqlite:./data/rustassistant.db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-rustassist}@redis:6379
      - CACHE_ENABLED=true
      - CACHE_PREFIX=rustassistant:

      # xAI / Grok
      - XAI_API_KEY=${XAI_API_KEY}
      - REMOTE_MODEL=grok-2-latest

      # Local Ollama (service name resolves inside compose network)
      - OLLAMA_BASE_URL=http://ollama:11434
      - LOCAL_MODEL=qwen2.5-coder:7b
      - FORCE_REMOTE_MODEL=false

      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER:-nuniesmith}

      # Repo sync
      - REPO_SYNC_INTERVAL_SECS=300
      - REPO_BASE_PATH=/repos

      # Server
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
    volumes:
      - ./data:/app/data
      - ./static:/app/static
      # Mount your repos into the container so repo_sync can walk them
      - ${REPOS_BASE_PATH:-/home/jordan/repos}:/repos:ro
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - rustassistant-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rustassistant-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-rustassist}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rustassistant-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-rustassist}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Ollama (CUDA) ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rustassistant-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_MAX_LOADED_MODELS=2
      # Use GPU layers — set 0 for CPU-only fallback
      - OLLAMA_NUM_GPU=1
    # ── CUDA passthrough ──
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # or count: 1 for single GPU
              capabilities: [gpu]
    networks:
      - rustassistant-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Model Puller (one-shot init) ───────────────────────────────────────
  # Pulls qwen2.5-coder:7b on first startup, then exits.
  ollama-init:
    image: ollama/ollama:latest
    container_name: rustassistant-ollama-init
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for Ollama to be ready...';
        until curl -sf http://ollama:11434/api/tags; do sleep 3; done;
        echo 'Pulling qwen2.5-coder:7b...';
        ollama pull qwen2.5-coder:7b;
        echo 'Model ready.';
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - rustassistant-net

volumes:
  redis-data:
  ollama-models:     # persists downloaded models across restarts

networks:
  rustassistant-net:
    driver: bridge
