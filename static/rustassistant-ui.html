<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RustAssistant — Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --bg-void:    #080a0f;
    --bg-deep:    #0d1017;
    --bg-panel:   #111520;
    --bg-card:    #161b27;
    --bg-hover:   #1c2333;
    --border:     #1e2840;
    --border-lit: #2a3a5c;
    --amber:      #f59e0b;
    --amber-dim:  #92600a;
    --amber-glow: rgba(245,158,11,0.12);
    --cyan:       #06b6d4;
    --cyan-dim:   #0e6b80;
    --cyan-glow:  rgba(6,182,212,0.10);
    --green:      #10b981;
    --green-dim:  #065f46;
    --red:        #ef4444;
    --red-dim:    #7f1d1d;
    --purple:     #a78bfa;
    --text-hi:    #e8edf7;
    --text-mid:   #8899bb;
    --text-lo:    #3d4f6e;
    --font-mono:  'JetBrains Mono', monospace;
    --font-ui:    'Syne', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg-void);
    color: var(--text-hi);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Grid texture on bg */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(30,40,64,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,40,64,0.3) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }

  /* ── Top Bar ── */
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px; height: 48px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-logo {
    font-family: var(--font-ui); font-weight: 800; font-size: 15px;
    color: var(--amber); letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .topbar-logo .crab { font-size: 18px; }
  .topbar-sep { width: 1px; height: 20px; background: var(--border); }
  .topbar-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-mid);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-dot.loading { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .model-badge {
    padding: 3px 10px; border-radius: 3px; font-size: 10px; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase;
  }
  .model-badge.local { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-dim); }
  .model-badge.remote { background: var(--cyan-dim); color: var(--cyan); border: 1px solid var(--cyan-dim); }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section { padding: 12px; border-bottom: 1px solid var(--border); }
  .sidebar-label {
    font-size: 9px; font-weight: 600; letter-spacing: 2px;
    color: var(--text-lo); text-transform: uppercase; margin-bottom: 8px;
  }
  .repo-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 8px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s; border: 1px solid transparent;
    margin-bottom: 2px;
  }
  .repo-item:hover { background: var(--bg-hover); border-color: var(--border-lit); }
  .repo-item.active { background: var(--amber-glow); border-color: var(--amber-dim); }
  .repo-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .repo-name { font-size: 12px; color: var(--text-hi); font-weight: 500; truncate: ellipsis; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .repo-count { font-size: 10px; color: var(--amber); font-weight: 600; }
  .add-repo-btn {
    width: 100%; padding: 6px; border-radius: 4px; border: 1px dashed var(--border-lit);
    background: transparent; color: var(--text-lo); font-family: var(--font-mono); font-size: 11px;
    cursor: pointer; transition: all 0.15s;
  }
  .add-repo-btn:hover { border-color: var(--amber-dim); color: var(--amber); background: var(--amber-glow); }

  .queue-summary { padding: 12px; }
  .queue-ring-row { display: flex; gap: 8px; justify-content: space-around; }
  .queue-ring {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .ring-svg { overflow: visible; }
  .ring-label { font-size: 9px; color: var(--text-lo); letter-spacing: 0.5px; text-transform: uppercase; }
  .ring-value { font-size: 16px; font-weight: 700; line-height: 1; }

  .nav-tabs { display: flex; flex-direction: column; gap: 2px; padding: 8px; }
  .nav-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 4px; cursor: pointer;
    font-size: 12px; color: var(--text-mid);
    border: 1px solid transparent; transition: all 0.15s;
  }
  .nav-tab:hover { background: var(--bg-hover); color: var(--text-hi); }
  .nav-tab.active { background: var(--cyan-glow); color: var(--cyan); border-color: var(--cyan-dim); }
  .nav-tab .tab-icon { font-size: 14px; width: 16px; text-align: center; }
  .nav-tab .tab-badge {
    margin-left: auto; background: var(--amber); color: var(--bg-void);
    font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 10px;
  }

  /* ── Main Content ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Chat ── */
  .chat-pane { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .chat-header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .chat-header-title { font-family: var(--font-ui); font-weight: 700; font-size: 14px; }
  .ctx-pill {
    padding: 3px 10px; border-radius: 3px; font-size: 10px; font-weight: 500;
    background: var(--bg-card); border: 1px solid var(--border-lit); color: var(--text-mid);
    cursor: pointer; transition: all 0.15s;
  }
  .ctx-pill.active { background: var(--cyan-glow); border-color: var(--cyan-dim); color: var(--cyan); }
  .rounds-control {
    margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-mid);
  }
  .round-btn {
    width: 22px; height: 22px; border-radius: 3px;
    border: 1px solid var(--border-lit); background: var(--bg-card);
    color: var(--text-hi); font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .round-btn:hover { border-color: var(--amber-dim); color: var(--amber); }

  .messages {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-lit); border-radius: 2px; }

  .msg { display: flex; gap: 12px; max-width: 900px; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .msg.assistant .msg-avatar { background: var(--cyan-glow); border: 1px solid var(--cyan-dim); color: var(--cyan); }
  .msg.user .msg-avatar { background: var(--amber-glow); border: 1px solid var(--amber-dim); color: var(--amber); }
  .msg-body { display: flex; flex-direction: column; gap: 4px; max-width: 800px; }
  .msg-meta { font-size: 10px; color: var(--text-lo); display: flex; gap: 8px; }
  .msg.user .msg-meta { justify-content: flex-end; }
  .msg-bubble {
    padding: 10px 14px; border-radius: 6px;
    line-height: 1.6; font-size: 13px;
  }
  .msg.assistant .msg-bubble {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-hi);
  }
  .msg.user .msg-bubble {
    background: var(--amber-glow); border: 1px solid var(--amber-dim);
    color: var(--text-hi);
  }
  .msg-bubble pre {
    background: var(--bg-void); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px 12px; margin: 8px 0;
    overflow-x: auto; font-size: 12px; line-height: 1.5;
  }
  .msg-bubble code { color: var(--cyan); font-size: 12px; }
  .msg-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .msg-action-btn {
    padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: 600;
    border: 1px solid var(--border-lit); background: var(--bg-panel);
    color: var(--text-mid); cursor: pointer; font-family: var(--font-mono);
    letter-spacing: 0.3px; transition: all 0.15s; text-transform: uppercase;
  }
  .msg-action-btn:hover { border-color: var(--amber-dim); color: var(--amber); background: var(--amber-glow); }
  .msg-action-btn.green:hover { border-color: var(--green-dim); color: var(--green); background: rgba(16,185,129,0.1); }

  .quality-bar {
    display: flex; align-items: center; gap: 8px; margin-top: 6px;
  }
  .quality-track {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .quality-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.6s ease;
  }
  .quality-label { font-size: 10px; font-weight: 700; width: 32px; text-align: right; }

  .chat-input-area {
    padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .chat-input-row {
    display: flex; gap: 8px; align-items: flex-end;
  }
  .chat-textarea {
    flex: 1; background: var(--bg-card); border: 1px solid var(--border-lit);
    border-radius: 6px; padding: 10px 14px; color: var(--text-hi);
    font-family: var(--font-mono); font-size: 13px; resize: none;
    min-height: 42px; max-height: 160px; line-height: 1.5;
    transition: border-color 0.15s;
    outline: none;
  }
  .chat-textarea:focus { border-color: var(--cyan-dim); box-shadow: 0 0 0 2px rgba(6,182,212,0.08); }
  .chat-textarea::placeholder { color: var(--text-lo); }
  .send-btn {
    padding: 10px 18px; border-radius: 6px;
    background: var(--cyan); border: none; color: var(--bg-void);
    font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s;
    white-space: nowrap;
  }
  .send-btn:hover { background: #0dd4f0; box-shadow: 0 0 16px var(--cyan-glow); }
  .send-btn:disabled { background: var(--bg-card); color: var(--text-lo); cursor: not-allowed; }

  /* ── Tasks Pane ── */
  .tasks-pane { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .pane-header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .pane-title { font-family: var(--font-ui); font-weight: 700; font-size: 14px; }
  .pane-actions { margin-left: auto; display: flex; gap: 8px; }
  .pane-btn {
    padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border-lit); background: var(--bg-card);
    color: var(--text-mid); cursor: pointer; font-family: var(--font-mono);
    transition: all 0.15s; letter-spacing: 0.3px;
  }
  .pane-btn:hover { border-color: var(--amber-dim); color: var(--amber); background: var(--amber-glow); }
  .pane-btn.primary { background: var(--amber); color: var(--bg-void); border-color: var(--amber); }
  .pane-btn.primary:hover { background: #fbbf24; box-shadow: 0 0 12px var(--amber-glow); }

  .tasks-columns {
    flex: 1; display: flex; gap: 0; overflow: hidden;
  }
  .tasks-col {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid var(--border); overflow: hidden;
  }
  .tasks-col:last-child { border-right: none; }
  .col-header {
    padding: 10px 14px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .col-title { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
  .col-badge {
    font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 10px;
  }
  .col-items { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .col-items::-webkit-scrollbar { width: 3px; }
  .col-items::-webkit-scrollbar-thumb { background: var(--border-lit); }

  .task-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 5px; padding: 10px 12px;
    cursor: pointer; transition: all 0.15s;
    position: relative; overflow: hidden;
  }
  .task-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .task-card:hover { border-color: var(--border-lit); background: var(--bg-hover); }
  .task-card.priority-high::before { background: var(--red); }
  .task-card.priority-mid::before { background: var(--amber); }
  .task-card.priority-low::before { background: var(--green); }
  .task-card.in-queue { border-color: var(--cyan-dim); background: var(--cyan-glow); }
  .task-card.in-queue::before { background: var(--cyan); }

  .task-title { font-size: 12px; font-weight: 500; color: var(--text-hi); margin-bottom: 4px; line-height: 1.4; }
  .task-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .task-tag {
    font-size: 9px; padding: 1px 6px; border-radius: 2px; font-weight: 600; letter-spacing: 0.5px;
  }
  .tag-todo { background: rgba(245,158,11,0.15); color: var(--amber); }
  .tag-stub { background: rgba(167,139,250,0.15); color: var(--purple); }
  .tag-fixme { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag-feat { background: rgba(16,185,129,0.15); color: var(--green); }
  .task-file { font-size: 10px; color: var(--text-lo); font-style: italic; }
  .task-move-btn {
    position: absolute; right: 8px; top: 8px;
    font-size: 14px; opacity: 0; transition: opacity 0.15s; cursor: pointer; background: none; border: none;
    color: var(--cyan);
  }
  .task-card:hover .task-move-btn { opacity: 1; }

  /* ── Queue Pane ── */
  .queue-pane { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .queue-items { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; }

  .queue-item {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.15s;
  }
  .queue-item.running { border-color: var(--cyan-dim); box-shadow: 0 0 12px var(--cyan-glow); }
  .queue-item.done { border-color: var(--green-dim); opacity: 0.7; }
  .queue-item.failed { border-color: var(--red-dim); }

  .queue-num {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    border: 2px solid var(--border-lit); color: var(--text-mid);
  }
  .queue-item.running .queue-num { border-color: var(--cyan); color: var(--cyan); animation: spin-ring 2s linear infinite; }
  .queue-item.done .queue-num { border-color: var(--green); color: var(--green); }
  .queue-item.failed .queue-num { border-color: var(--red); color: var(--red); }
  @keyframes spin-ring {
    0% { box-shadow: 0 0 0 2px transparent, 2px 0 0 2px var(--cyan); }
    25% { box-shadow: 0 2px 0 2px var(--cyan), 0 0 0 2px transparent; }
    50% { box-shadow: 0 0 0 2px transparent, -2px 0 0 2px var(--cyan); }
    100% { box-shadow: 0 -2px 0 2px var(--cyan), 0 0 0 2px transparent; }
  }

  .queue-info { flex: 1; }
  .queue-task-name { font-size: 12px; font-weight: 600; color: var(--text-hi); margin-bottom: 3px; }
  .queue-task-meta { font-size: 10px; color: var(--text-lo); }
  .queue-rounds { display: flex; gap: 4px; }
  .round-pip {
    width: 18px; height: 18px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700;
    border: 1px solid var(--border-lit); color: var(--text-lo);
  }
  .round-pip.done { background: rgba(16,185,129,0.2); border-color: var(--green-dim); color: var(--green); }
  .round-pip.running { background: var(--cyan-glow); border-color: var(--cyan-dim); color: var(--cyan); animation: pip-pulse 1s ease-in-out infinite; }
  .round-pip.target { background: rgba(245,158,11,0.15); border-color: var(--amber-dim); color: var(--amber); }
  @keyframes pip-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .queue-quality { text-align: right; min-width: 50px; }
  .quality-pct { font-size: 18px; font-weight: 700; line-height: 1; }

  .queue-run-controls {
    padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; gap: 12px;
  }
  .run-big-btn {
    padding: 10px 24px; border-radius: 5px; font-size: 12px; font-weight: 700;
    font-family: var(--font-mono); letter-spacing: 0.8px; cursor: pointer;
    border: none; transition: all 0.2s; text-transform: uppercase;
  }
  .run-big-btn.start { background: var(--green); color: var(--bg-void); }
  .run-big-btn.start:hover { box-shadow: 0 0 20px rgba(16,185,129,0.4); }
  .run-big-btn.stop { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-dim); }
  .run-big-btn.stop:hover { background: rgba(239,68,68,0.2); }
  .queue-stats { display: flex; gap: 16px; }
  .qstat { display: flex; flex-direction: column; align-items: center; }
  .qstat-val { font-size: 18px; font-weight: 700; line-height: 1; }
  .qstat-label { font-size: 9px; color: var(--text-lo); letter-spacing: 0.8px; text-transform: uppercase; }

  /* ── PR Pane ── */
  .pr-pane { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .pr-list { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 10px; }
  .pr-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; padding: 14px 16px; transition: all 0.15s; cursor: pointer;
  }
  .pr-card:hover { border-color: var(--border-lit); background: var(--bg-hover); }
  .pr-card.open { border-left: 3px solid var(--green); }
  .pr-card.review { border-left: 3px solid var(--amber); }
  .pr-card.draft { border-left: 3px solid var(--text-lo); }
  .pr-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .pr-num { font-size: 11px; color: var(--text-lo); white-space: nowrap; }
  .pr-title { font-size: 13px; font-weight: 600; color: var(--text-hi); flex: 1; }
  .pr-status-badge {
    font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap;
  }
  .badge-open { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid var(--green-dim); }
  .badge-review { background: var(--amber-glow); color: var(--amber); border: 1px solid var(--amber-dim); }
  .badge-draft { background: rgba(61,79,110,0.3); color: var(--text-lo); border: 1px solid var(--border); }
  .pr-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-lo); }
  .pr-files { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .pr-file-chip {
    font-size: 10px; padding: 1px 7px; border-radius: 3px;
    background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-lo);
  }
  .pr-quality-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .pr-round-badges { display: flex; gap: 4px; }
  .pr-round-badge {
    font-size: 9px; padding: 1px 6px; border-radius: 2px; font-weight: 700;
  }

  /* ── Add Repo Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg-panel); border: 1px solid var(--border-lit);
    border-radius: 8px; padding: 24px; width: 480px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }
  .modal-title {
    font-family: var(--font-ui); font-weight: 700; font-size: 16px;
    margin-bottom: 20px; color: var(--text-hi);
  }
  .modal-field { margin-bottom: 14px; }
  .modal-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-lo); margin-bottom: 5px; display: block; }
  .modal-input {
    width: 100%; background: var(--bg-card); border: 1px solid var(--border-lit);
    border-radius: 5px; padding: 9px 12px; color: var(--text-hi);
    font-family: var(--font-mono); font-size: 12px; outline: none; transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--cyan-dim); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Typing indicator */
  .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 8px 0; }
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--cyan); }
  .typing-dot:nth-child(1) { animation: typing-bounce 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation: typing-bounce 1.2s ease-in-out 0.2s infinite; }
  .typing-dot:nth-child(3) { animation: typing-bounce 1.2s ease-in-out 0.4s infinite; }
  @keyframes typing-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; color: var(--text-lo);
  }
  .empty-icon { font-size: 36px; }
  .empty-text { font-size: 12px; letter-spacing: 0.5px; }

  input[type=checkbox] { accent-color: var(--cyan); }

  .scroll-anchor { height: 1px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Config ───────────────────────────────────────────────────────────────
const API_BASE = window.location.origin; // e.g. http://localhost:3000
const OLLAMA_BASE = 'http://localhost:11434';

// ─── Seed data ────────────────────────────────────────────────────────────
const SEED_REPOS = [
  { id: 'rustassistant', name: 'rustassistant', path: '/repos/rustassistant', color: '#06b6d4', todoCount: 24, branch: 'main', synced: true },
  { id: 'fks-trading', name: 'fks-trading', path: '/repos/fks-trading', color: '#f59e0b', todoCount: 87, branch: 'main', synced: false },
  { id: 'janus-core', name: 'janus-core', path: '/repos/janus-core', color: '#a78bfa', todoCount: 354, branch: 'dev', synced: false },
];

const SEED_TASKS = [
  { id:'t1', title:'Wire real OllamaClient into call_model_stub', kind:'STUB', file:'src/api/repos.rs:L218', priority:'high', col:'staging', repo:'rustassistant' },
  { id:'t2', title:'Add Redis caching layer to chat handler', kind:'TODO', file:'src/api/repos.rs:L195', priority:'high', col:'staging', repo:'rustassistant' },
  { id:'t3', title:'Replace naive line scanner with syn AST parsing', kind:'TODO', file:'src/repo_sync.rs:L201', priority:'mid', col:'staging', repo:'rustassistant' },
  { id:'t4', title:'Persist RepoSyncService.repos to SQLite via sqlx', kind:'TODO', file:'src/repo_sync.rs:L56', priority:'high', col:'queue', repo:'rustassistant' },
  { id:'t5', title:'Add GitHub webhook trigger for push → sync', kind:'TODO', file:'src/sync_scheduler.rs:L8', priority:'mid', col:'queue', repo:'rustassistant' },
  { id:'t6', title:'ModelRouter: replace keyword classifier with ML model', kind:'TODO', file:'src/model_router.rs:L95', priority:'low', col:'staging', repo:'rustassistant' },
  { id:'t7', title:'Implement WebhookEvent retry logic with backoff', kind:'STUB', file:'src/webhooks.rs:L88', priority:'high', col:'done', repo:'rustassistant', quality:82 },
  { id:'t8', title:'JANUS: implement CerebellumModule calibration pass', kind:'STUB', file:'src/cerebellum/mod.rs:L44', priority:'high', col:'staging', repo:'janus-core' },
  { id:'t9', title:'Add regime detection threshold config', kind:'TODO', file:'src/regime/detector.rs:L112', priority:'mid', col:'staging', repo:'janus-core' },
];

const SEED_PRS = [
  { id:'pr1', num:'#12', title:'feat(repo-assistant): add RepoSyncService + ModelRouter', status:'review', repo:'rustassistant', files:['src/repo_sync.rs','src/model_router.rs','src/api/repos.rs'], rounds:[82,88,93], quality:93, branch:'feat/repo-assistant' },
  { id:'pr2', num:'#11', title:'feat(sync): background scheduler + .rustassistant cache spec', status:'open', repo:'rustassistant', files:['src/sync_scheduler.rs','src/repo_sync.rs'], rounds:[80,86], quality:86, branch:'feat/sync-scheduler' },
  { id:'pr3', num:'#10', title:'chore: webhook retry stub with TODO tagging', status:'draft', repo:'rustassistant', files:['src/webhooks.rs'], rounds:[80], quality:80, branch:'feat/webhook-retry' },
];

// ─── Helpers ───────────────────────────────────────────────────────────────
function QualityBar({ pct }) {
  const color = pct >= 90 ? '#10b981' : pct >= 80 ? '#f59e0b' : '#ef4444';
  return (
    <div className="quality-bar">
      <div className="quality-track">
        <div className="quality-fill" style={{ width: pct + '%', background: color }} />
      </div>
      <span className="quality-label" style={{ color }}>{pct}%</span>
    </div>
  );
}

function RingChart({ value, max, color, label }) {
  const r = 18, cx = 22, cy = 22;
  const circ = 2 * Math.PI * r;
  const dash = circ * (value / max);
  return (
    <div className="queue-ring">
      <svg width="44" height="44" className="ring-svg">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--border)" strokeWidth="3"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="3"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}/>
        <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle"
          fill={color} fontSize="10" fontWeight="700" fontFamily="'JetBrains Mono'">{value}</text>
      </svg>
      <span className="ring-label">{label}</span>
    </div>
  );
}

// ─── Chat Pane ─────────────────────────────────────────────────────────────
function ChatPane({ activeRepo, repos }) {
  const [messages, setMessages] = useState([
    { id:1, role:'assistant', content:'RustAssistant online. Select a repo for context-aware code generation, stub scaffolding, and task extraction.\n\nType a prompt or drag a task from the queue.', model:'qwen2.5-coder:7b', time:'now', quality:null },
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [rounds, setRounds] = useState(3);
  const [ctxEnabled, setCtxEnabled] = useState(true);
  const bottomRef = useRef(null);
  const textareaRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages]);

  const autoResize = () => {
    const ta = textareaRef.current;
    if (!ta) return;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
  };

  const send = useCallback(async (overrideText) => {
    const text = overrideText || input.trim();
    if (!text || loading) return;
    setInput('');
    if (textareaRef.current) textareaRef.current.style.height = '42px';

    const userMsg = { id: Date.now(), role:'user', content: text, time: new Date().toLocaleTimeString() };
    setMessages(prev => [...prev, userMsg]);
    setLoading(true);

    try {
      // Try backend first, fall back to simulated response
      let reply = null;
      const repoId = activeRepo && ctxEnabled ? activeRepo.id : null;
      const endpoint = repoId
        ? `${API_BASE}/api/v1/chat/repos/${repoId}`
        : `${API_BASE}/api/v1/chat`;

      try {
        const res = await fetch(endpoint, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ message: text, history: messages.slice(-6).map(m=>({role:m.role,content:m.content})) }),
          signal: AbortSignal.timeout(8000),
        });
        if (res.ok) {
          const data = await res.json();
          reply = { content: data.reply, model: data.model_used, taskKind: data.task_kind, quality: estimateQuality(data.task_kind) };
        }
      } catch(_) { /* backend not up yet — use demo response */ }

      if (!reply) {
        reply = await simulateResponse(text, activeRepo, ctxEnabled);
      }

      const assistantMsg = {
        id: Date.now() + 1,
        role: 'assistant',
        content: reply.content,
        model: reply.model,
        taskKind: reply.taskKind,
        quality: reply.quality,
        time: new Date().toLocaleTimeString(),
        showActions: reply.showActions,
      };
      setMessages(prev => [...prev, assistantMsg]);
    } finally {
      setLoading(false);
    }
  }, [input, loading, messages, activeRepo, ctxEnabled]);

  const onKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  return (
    <div className="chat-pane">
      <div className="chat-header">
        <span className="chat-header-title">Chat</span>
        {activeRepo && (
          <button className={`ctx-pill ${ctxEnabled ? 'active' : ''}`} onClick={() => setCtxEnabled(!ctxEnabled)}>
            {ctxEnabled ? '⬡' : '○'} {activeRepo.name} context
          </button>
        )}
        <div className="rounds-control">
          <span>Rounds</span>
          <button className="round-btn" onClick={() => setRounds(Math.max(1,rounds-1))}>−</button>
          <span style={{color:'var(--amber)',fontWeight:700,minWidth:'14px',textAlign:'center'}}>{rounds}</span>
          <button className="round-btn" onClick={() => setRounds(Math.min(5,rounds+1))}>+</button>
        </div>
      </div>

      <div className="messages">
        {messages.map(msg => (
          <div key={msg.id} className={`msg ${msg.role}`}>
            <div className="msg-avatar">{msg.role === 'assistant' ? 'RA' : 'J'}</div>
            <div className="msg-body">
              <div className="msg-meta">
                <span>{msg.role === 'assistant' ? (msg.model || 'rustassistant') : 'jordan'}</span>
                {msg.taskKind && <span style={{color:'var(--purple)'}}>• {msg.taskKind}</span>}
                <span>{msg.time}</span>
              </div>
              <div className="msg-bubble">
                <MsgContent content={msg.content} />
                {msg.quality && <QualityBar pct={msg.quality} />}
              </div>
              {msg.showActions && (
                <div className="msg-actions">
                  <button className="msg-action-btn green" onClick={() => send('Run another improvement round on the last output')}>▶ Run R{rounds} Pass</button>
                  <button className="msg-action-btn" onClick={() => send('Create a GitHub PR for this code')}>⬡ Create PR</button>
                  <button className="msg-action-btn" onClick={() => send('Add TODO tags to unresolved sections')}>⊕ Tag TODOs</button>
                  <button className="msg-action-btn" onClick={() => send('Extract tasks from this output to queue')}>→ To Queue</button>
                </div>
              )}
            </div>
          </div>
        ))}
        {loading && (
          <div className="msg assistant">
            <div className="msg-avatar">RA</div>
            <div className="msg-body">
              <div className="msg-meta"><span>rustassistant</span></div>
              <div className="msg-bubble">
                <div className="typing-indicator">
                  <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
                </div>
              </div>
            </div>
          </div>
        )}
        <div className="scroll-anchor" ref={bottomRef} />
      </div>

      <div className="chat-input-area">
        <div className="chat-input-row">
          <textarea
            ref={textareaRef}
            className="chat-textarea"
            placeholder={activeRepo && ctxEnabled
              ? `Ask about ${activeRepo.name} — scaffold stubs, extract tasks, generate PRs...`
              : 'Ask RustAssistant anything — select a repo for context injection...'}
            value={input}
            onChange={e => { setInput(e.target.value); autoResize(); }}
            onKeyDown={onKey}
            rows={1}
          />
          <button className="send-btn" onClick={() => send()} disabled={!input.trim() || loading}>
            {loading ? '...' : 'SEND ↵'}
          </button>
        </div>
      </div>
    </div>
  );
}

function MsgContent({ content }) {
  const parts = content.split(/(```[\s\S]*?```)/g);
  return (
    <div>
      {parts.map((part, i) => {
        if (part.startsWith('```')) {
          const lines = part.slice(3).split('\n');
          const lang = lines[0];
          const code = lines.slice(1).join('\n').replace(/```$/, '').trimEnd();
          return <pre key={i}><code>{code}</code></pre>;
        }
        return <span key={i} style={{whiteSpace:'pre-wrap'}}>{part}</span>;
      })}
    </div>
  );
}

function estimateQuality(taskKind) {
  if (!taskKind) return null;
  const map = { ScaffoldStub:80, TodoTagging:85, SymbolExtraction:88, RepoQuestion:75, CodeReview:null };
  return map[taskKind] || null;
}

async function simulateResponse(text, activeRepo, ctxEnabled) {
  await new Promise(r => setTimeout(r, 900 + Math.random() * 600));
  const lower = text.toLowerCase();

  if (lower.includes('stub') || lower.includes('scaffold') || lower.includes('generate')) {
    return {
      content: `// STUB: generated by rustassistant\n// TODO: implement actual logic\n\`\`\`rust\n// STUB: generated by rustassistant\n#[allow(dead_code)]\npub async fn ${lower.includes('retry') ? 'retry_with_backoff' : 'new_handler'}(\n    &self,\n    // TODO: define parameters\n) -> Result<(), crate::error::AppError> {\n    // TODO: implement\n    unimplemented!("stub: generated by rustassistant")\n}\n\`\`\``,
      model: 'qwen2.5-coder:7b', taskKind: 'ScaffoldStub', quality: 80, showActions: true,
    };
  }
  if (lower.includes('pr') || lower.includes('pull request')) {
    return {
      content: `PR draft ready for ${activeRepo?.name || 'repo'}:\n\n**Branch:** feat/rustassistant-${Date.now().toString(36)}\n**Title:** feat: implement ${text.split(' ').slice(0,4).join(' ')}\n\nFiles staged for commit. Round 1 quality: 80%. Run another pass to improve before pushing?`,
      model: 'grok-2-latest', taskKind: 'ArchitecturalReason', quality: null, showActions: true,
    };
  }
  if (lower.includes('todo') || lower.includes('extract') || lower.includes('task')) {
    return {
      content: `Found ${3 + Math.floor(Math.random()*5)} TODO items in ${activeRepo?.name || 'active repo'}:\n\n• \`src/api/repos.rs:218\` — STUB: wire real OllamaClient\n• \`src/repo_sync.rs:201\` — TODO: syn AST parsing\n• \`src/cache_layer.rs:44\` — TODO: Redis cache in chat handler\n\nMove these to the task queue?`,
      model: 'qwen2.5-coder:7b', taskKind: 'TodoTagging', quality: null, showActions: true,
    };
  }
  return {
    content: ctxEnabled && activeRepo
      ? `Context loaded from \`${activeRepo.name}/.rustassistant/\` — ${activeRepo.todoCount} open TODOs, tree snapshot current.\n\nWhat would you like to work on? I can scaffold stubs, extract tasks, run quality improvement passes, or draft a PR.`
      : `RustAssistant ready. Select a repo from the sidebar and enable context injection to get full codebase awareness.\n\nSupported workflows: stub generation → quality rounds → PR creation.`,
    model: 'qwen2.5-coder:7b', taskKind: 'RepoQuestion', quality: null, showActions: false,
  };
}

// ─── Tasks Pane ────────────────────────────────────────────────────────────
function TasksPane({ tasks, setTasks, activeRepo }) {
  const cols = [
    { id:'staging', label:'Staging', color:'var(--text-lo)' },
    { id:'queue',   label:'Queue',   color:'var(--cyan)' },
    { id:'done',    label:'Done',    color:'var(--green)' },
  ];

  const move = (taskId, toCol) => {
    setTasks(prev => prev.map(t => t.id === taskId ? {...t, col: toCol} : t));
  };

  const filtered = activeRepo ? tasks.filter(t => t.repo === activeRepo.id) : tasks;

  const extractFromTodo = () => {
    const newTask = {
      id: 't' + Date.now(),
      title: 'Extracted: implement missing module handler',
      kind: 'TODO', file: 'src/lib.rs:L1', priority: 'mid',
      col: 'staging', repo: activeRepo?.id || 'rustassistant',
    };
    setTasks(prev => [...prev, newTask]);
  };

  return (
    <div className="tasks-pane">
      <div className="pane-header">
        <span className="pane-title">Task Board</span>
        {activeRepo && <span style={{fontSize:11,color:'var(--text-lo)'}}>/ {activeRepo.name}</span>}
        <div className="pane-actions">
          <button className="pane-btn" onClick={extractFromTodo}>⬡ Extract from todo.md</button>
          <button className="pane-btn primary" onClick={() => move(filtered.filter(t=>t.col==='staging')[0]?.id, 'queue')}>
            → Queue Selected
          </button>
        </div>
      </div>
      <div className="tasks-columns">
        {cols.map(col => {
          const items = filtered.filter(t => t.col === col.id);
          return (
            <div key={col.id} className="tasks-col">
              <div className="col-header">
                <span className="col-title" style={{color:col.color}}>{col.label}</span>
                <span className="col-badge" style={{background:`${col.color}22`,color:col.color}}>{items.length}</span>
              </div>
              <div className="col-items">
                {items.length === 0 && (
                  <div style={{padding:'20px 0',textAlign:'center',color:'var(--text-lo)',fontSize:11}}>
                    {col.id === 'queue' ? 'Drop tasks here to queue them' : 'Empty'}
                  </div>
                )}
                {items.map(task => (
                  <div key={task.id} className={`task-card priority-${task.priority} ${task.col==='queue'?'in-queue':''}`}>
                    <div className="task-title">{task.title}</div>
                    <div className="task-meta">
                      <span className={`task-tag tag-${task.kind.toLowerCase()}`}>{task.kind}</span>
                      <span className={`task-tag`} style={{background:`rgba(255,255,255,0.05)`,color:'var(--text-lo)'}}>
                        {task.priority}
                      </span>
                    </div>
                    <div className="task-file">{task.file}</div>
                    {task.quality && <QualityBar pct={task.quality} />}
                    {/* Move buttons */}
                    <div style={{display:'flex',gap:4,marginTop:6}}>
                      {col.id !== 'staging' && (
                        <button className="msg-action-btn" style={{fontSize:9}} onClick={() => move(task.id,'staging')}>← Stage</button>
                      )}
                      {col.id !== 'queue' && col.id !== 'done' && (
                        <button className="msg-action-btn" style={{fontSize:9}} onClick={() => move(task.id,'queue')}>→ Queue</button>
                      )}
                      {col.id !== 'done' && (
                        <button className="msg-action-btn green" style={{fontSize:9}} onClick={() => move(task.id,'done')}>✓ Done</button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Queue Pane ────────────────────────────────────────────────────────────
function QueuePane({ tasks, setTasks }) {
  const [running, setRunning] = useState(false);
  const [activeIdx, setActiveIdx] = useState(-1);
  const [runLog, setRunLog] = useState([]);
  const maxRounds = 3;

  const queued = tasks.filter(t => t.col === 'queue');

  const [jobState, setJobState] = useState(() =>
    Object.fromEntries(SEED_TASKS.filter(t=>t.col==='queue').map(t => [t.id, { rounds:[], running:false }]))
  );

  const runQueue = async () => {
    if (running || queued.length === 0) return;
    setRunning(true);
    setRunLog([]);

    for (let i = 0; i < queued.length; i++) {
      const task = queued[i];
      setActiveIdx(i);
      setRunLog(prev => [...prev, `[${new Date().toLocaleTimeString()}] Starting: ${task.title}`]);

      setJobState(prev => ({...prev, [task.id]: { rounds:[], running:true }}));

      let quality = 72 + Math.floor(Math.random() * 6);

      for (let r = 0; r < maxRounds; r++) {
        await new Promise(res => setTimeout(res, 1200 + Math.random() * 800));
        quality = Math.min(97, quality + 6 + Math.floor(Math.random() * 5));
        const roundQuality = quality;
        setJobState(prev => ({
          ...prev,
          [task.id]: { rounds: [...(prev[task.id]?.rounds||[]), roundQuality], running: r < maxRounds-1 }
        }));
        setRunLog(prev => [...prev, `  Round ${r+1}: quality ${roundQuality}%`]);
        if (quality >= 90 && r >= 1) break;
      }

      setTasks(prev => prev.map(t => t.id === task.id
        ? {...t, col:'done', quality}
        : t
      ));
      setRunLog(prev => [...prev, `  ✓ Complete — final quality: ${quality}%`]);
    }

    setRunning(false);
    setActiveIdx(-1);
  };

  const totalDone = tasks.filter(t=>t.col==='done').length;
  const avgQ = tasks.filter(t=>t.quality).reduce((a,t,_,arr)=>a+t.quality/arr.length,0)|0;

  return (
    <div className="queue-pane">
      <div className="pane-header">
        <span className="pane-title">Processing Queue</span>
        <span style={{fontSize:11,color:'var(--text-lo)'}}>
          {queued.length} tasks · {maxRounds} rounds max
        </span>
      </div>

      <div className="queue-items">
        {queued.length === 0 && (
          <div className="empty-state">
            <div className="empty-icon">⬡</div>
            <div className="empty-text">Queue is empty — move tasks from the staging board</div>
          </div>
        )}
        {queued.map((task, i) => {
          const state = jobState[task.id] || { rounds:[], running:false };
          const isActive = running && i === activeIdx;
          const isDone = !running && state.rounds.length > 0;
          const finalQ = state.rounds[state.rounds.length - 1];
          return (
            <div key={task.id} className={`queue-item ${isActive?'running':isDone?'done':''}`}>
              <div className="queue-num">{isDone ? '✓' : i+1}</div>
              <div className="queue-info">
                <div className="queue-task-name">{task.title}</div>
                <div className="queue-task-meta">{task.file} · {task.kind} · {task.repo}</div>
                {state.rounds.length > 0 && (
                  <div style={{marginTop:6}}>
                    <QualityBar pct={finalQ} />
                  </div>
                )}
              </div>
              <div className="queue-rounds">
                {Array.from({length:maxRounds}).map((_,r) => {
                  const rq = state.rounds[r];
                  const cls = rq ? 'done' : (isActive && r === state.rounds.length) ? 'running' : '';
                  return (
                    <div key={r} className={`round-pip ${cls}`}>
                      {rq ? rq+'%' : `R${r+1}`}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {runLog.length > 0 && (
        <div style={{
          margin:'0 20px 8px', background:'var(--bg-void)', border:'1px solid var(--border)',
          borderRadius:5, padding:'8px 12px', maxHeight:100, overflowY:'auto',
          fontSize:10, color:'var(--text-mid)', fontFamily:'var(--font-mono)', lineHeight:1.7,
        }}>
          {runLog.map((l,i) => <div key={i}>{l}</div>)}
        </div>
      )}

      <div className="queue-run-controls">
        <button
          className={`run-big-btn ${running ? 'stop' : 'start'}`}
          onClick={running ? () => setRunning(false) : runQueue}
        >
          {running ? '■ STOP' : '▶ RUN QUEUE'}
        </button>
        <div className="queue-stats">
          <div className="qstat">
            <span className="qstat-val" style={{color:'var(--amber)'}}>{queued.length}</span>
            <span className="qstat-label">Queued</span>
          </div>
          <div className="qstat">
            <span className="qstat-val" style={{color:'var(--green)'}}>{totalDone}</span>
            <span className="qstat-label">Done</span>
          </div>
          <div className="qstat">
            <span className="qstat-val" style={{color:'var(--cyan)'}}>{avgQ||'—'}%</span>
            <span className="qstat-label">Avg Q</span>
          </div>
          <div className="qstat">
            <span className="qstat-val" style={{color:'var(--purple)'}}>{maxRounds}</span>
            <span className="qstat-label">Max R</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── PR Pane ───────────────────────────────────────────────────────────────
function PRPane({ activeRepo }) {
  const [prs, setPRs] = useState(SEED_PRS);
  const [generating, setGenerating] = useState(false);

  const genPR = async () => {
    setGenerating(true);
    await new Promise(r => setTimeout(r, 1500));
    const newPR = {
      id: 'pr' + Date.now(),
      num: '#' + (prs.length + 13),
      title: `feat(${activeRepo?.name || 'repo'}): auto-generated from queue pass`,
      status: 'draft',
      repo: activeRepo?.id || 'rustassistant',
      files: ['src/generated.rs', 'src/api/mod.rs'],
      rounds: [80],
      quality: 80,
      branch: `feat/ra-${Date.now().toString(36)}`,
    };
    setPRs(prev => [newPR, ...prev]);
    setGenerating(false);
  };

  const pushPR = async (pr) => {
    setPRs(prev => prev.map(p => p.id === pr.id ? {...p, status:'open'} : p));
  };

  const statusColor = { open:'var(--green)', review:'var(--amber)', draft:'var(--text-lo)' };

  return (
    <div className="pr-pane">
      <div className="pane-header">
        <span className="pane-title">Pull Requests</span>
        <div className="pane-actions">
          <button className="pane-btn" onClick={genPR} disabled={generating}>
            {generating ? '...' : '⬡ Generate PR from Queue'}
          </button>
          <button className="pane-btn primary">⬡ Open on GitHub</button>
        </div>
      </div>
      <div className="pr-list">
        {prs.map(pr => (
          <div key={pr.id} className={`pr-card ${pr.status}`}>
            <div className="pr-top">
              <span className="pr-num">{pr.num}</span>
              <span className="pr-title">{pr.title}</span>
              <span className={`pr-status-badge badge-${pr.status}`}>{pr.status}</span>
            </div>
            <div className="pr-meta">
              <span>⬡ {pr.repo}</span>
              <span>⬡ {pr.branch}</span>
              <span>⬡ {pr.files.length} files</span>
            </div>
            <div className="pr-files">
              {pr.files.map(f => <span key={f} className="pr-file-chip">{f}</span>)}
            </div>
            <div className="pr-quality-row">
              <div className="pr-round-badges">
                {pr.rounds.map((q,i) => (
                  <span key={i} className="pr-round-badge" style={{
                    background: q>=90?'rgba(16,185,129,0.15)':q>=85?'rgba(245,158,11,0.12)':'rgba(239,68,68,0.12)',
                    color: q>=90?'var(--green)':q>=85?'var(--amber)':'var(--red)',
                  }}>R{i+1}: {q}%</span>
                ))}
              </div>
              <div style={{marginLeft:'auto',minWidth:120}}>
                <QualityBar pct={pr.quality} />
              </div>
              {pr.status === 'draft' && (
                <button className="pane-btn" style={{marginLeft:8,fontSize:10}} onClick={() => pushPR(pr)}>
                  Push →
                </button>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Add Repo Modal ─────────────────────────────────────────────────────────
function AddRepoModal({ onClose, onAdd }) {
  const [form, setForm] = useState({ name:'', path:'', remote:'', branch:'main' });
  const colors = ['#06b6d4','#f59e0b','#10b981','#a78bfa','#ef4444','#f97316'];
  const [color, setColor] = useState(colors[0]);

  const submit = async () => {
    if (!form.name || !form.path) return;
    try {
      await fetch(`${API_BASE}/api/v1/repos`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:form.name, local_path:form.path, remote_url:form.remote||undefined, branch:form.branch, sync_on_register:true }),
      });
    } catch(_) {}
    onAdd({ id:form.name.toLowerCase().replace(/\s+/g,'-'), name:form.name, path:form.path, color, todoCount:0, branch:form.branch, synced:false });
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">⬡ Add Repository</div>
        {['name','path','remote','branch'].map(field => (
          <div key={field} className="modal-field">
            <label className="modal-label">{field === 'remote' ? 'Remote URL (optional)' : field}</label>
            <input className="modal-input" value={form[field]}
              placeholder={field==='path'?'/home/jordan/repos/myrepo':field==='remote'?'https://github.com/nuniesmith/...':field==='branch'?'main':''}
              onChange={e => setForm(p=>({...p,[field]:e.target.value}))} />
          </div>
        ))}
        <div className="modal-field">
          <label className="modal-label">Color</label>
          <div style={{display:'flex',gap:8}}>
            {colors.map(c => (
              <div key={c} onClick={()=>setColor(c)} style={{
                width:20,height:20,borderRadius:'50%',background:c,cursor:'pointer',
                outline: c===color ? '2px solid white' : 'none', outlineOffset:2,
              }}/>
            ))}
          </div>
        </div>
        <div className="modal-actions">
          <button className="pane-btn" onClick={onClose}>Cancel</button>
          <button className="pane-btn primary" onClick={submit}>Add Repo</button>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('chat');
  const [repos, setRepos] = useState(SEED_REPOS);
  const [activeRepoId, setActiveRepoId] = useState('rustassistant');
  const [tasks, setTasks] = useState(SEED_TASKS);
  const [showAddRepo, setShowAddRepo] = useState(false);
  const [ollamaStatus, setOllamaStatus] = useState('loading');

  const activeRepo = repos.find(r => r.id === activeRepoId);
  const queuedCount = tasks.filter(t=>t.col==='queue').length;
  const stagedCount = tasks.filter(t=>t.col==='staging').length;
  const doneCount = tasks.filter(t=>t.col==='done').length;

  // Check Ollama health
  useEffect(() => {
    const check = async () => {
      try {
        const res = await fetch(`${OLLAMA_BASE}/api/tags`, { signal: AbortSignal.timeout(2000) });
        setOllamaStatus(res.ok ? 'online' : 'offline');
      } catch(_) { setOllamaStatus('offline'); }
    };
    check();
    const t = setInterval(check, 15000);
    return () => clearInterval(t);
  }, []);

  const tabs = [
    { id:'chat',  icon:'⬡', label:'Chat',     badge: null },
    { id:'tasks', icon:'⊕', label:'Tasks',    badge: stagedCount > 0 ? stagedCount : null },
    { id:'queue', icon:'▶', label:'Queue',    badge: queuedCount > 0 ? queuedCount : null },
    { id:'prs',   icon:'⬡', label:'Pull Reqs', badge: null },
  ];

  return (
    <div id="root">
      {/* Top bar */}
      <div className="topbar">
        <div className="topbar-logo">
          <span className="crab">🦀</span>
          RustAssistant
        </div>
        <div className="topbar-sep"/>
        <div className="topbar-status">
          <div className={`status-dot ${ollamaStatus === 'online' ? '' : ollamaStatus === 'loading' ? 'loading' : 'offline'}`}/>
          Ollama {ollamaStatus}
        </div>
        <div className="topbar-sep"/>
        <div className="topbar-status">
          <div className="status-dot"/>
          xAI API
        </div>
        <div className="topbar-right">
          <span className="model-badge local">qwen2.5-coder:7b</span>
          <span className="model-badge remote">grok-2</span>
        </div>
      </div>

      <div className="layout">
        {/* Sidebar */}
        <div className="sidebar">
          {/* Repo list */}
          <div className="sidebar-section">
            <div className="sidebar-label">Monitored Repos</div>
            {repos.map(repo => (
              <div key={repo.id} className={`repo-item ${activeRepoId===repo.id?'active':''}`}
                onClick={() => setActiveRepoId(repo.id)}>
                <div className="repo-dot" style={{background:repo.color, boxShadow:`0 0 6px ${repo.color}66`}}/>
                <span className="repo-name">{repo.name}</span>
                <span className="repo-count">{repo.todoCount}</span>
              </div>
            ))}
            <button className="add-repo-btn" onClick={() => setShowAddRepo(true)}>
              + Add Repository
            </button>
          </div>

          {/* Queue summary rings */}
          <div className="sidebar-section">
            <div className="sidebar-label">Pipeline</div>
            <div className="queue-ring-row">
              <RingChart value={stagedCount} max={Math.max(stagedCount,10)} color="var(--amber)" label="Staged" />
              <RingChart value={queuedCount} max={Math.max(queuedCount,10)} color="var(--cyan)" label="Queue" />
              <RingChart value={doneCount} max={Math.max(doneCount,10)} color="var(--green)" label="Done" />
            </div>
          </div>

          {/* Nav tabs */}
          <div className="nav-tabs" style={{flex:1}}>
            {tabs.map(t => (
              <div key={t.id} className={`nav-tab ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>
                <span className="tab-icon">{t.icon}</span>
                <span>{t.label}</span>
                {t.badge && <span className="tab-badge">{t.badge}</span>}
              </div>
            ))}
          </div>

          {/* Active repo info */}
          {activeRepo && (
            <div style={{padding:'12px',borderTop:'1px solid var(--border)'}}>
              <div className="sidebar-label">Active Repo</div>
              <div style={{fontSize:11,color:'var(--text-mid)',lineHeight:1.8}}>
                <div style={{color:activeRepo.color,fontWeight:600}}>{activeRepo.name}</div>
                <div>branch: {activeRepo.branch}</div>
                <div>todos: <span style={{color:'var(--amber)'}}>{activeRepo.todoCount}</span></div>
                <div>synced: <span style={{color:activeRepo.synced?'var(--green)':'var(--red)'}}>{activeRepo.synced?'yes':'no'}</span></div>
              </div>
            </div>
          )}
        </div>

        {/* Main content */}
        <div className="main">
          {tab === 'chat'  && <ChatPane activeRepo={activeRepo} repos={repos} />}
          {tab === 'tasks' && <TasksPane tasks={tasks} setTasks={setTasks} activeRepo={activeRepo} />}
          {tab === 'queue' && <QueuePane tasks={tasks} setTasks={setTasks} />}
          {tab === 'prs'   && <PRPane activeRepo={activeRepo} />}
        </div>
      </div>

      {showAddRepo && (
        <AddRepoModal
          onClose={() => setShowAddRepo(false)}
          onAdd={(repo) => setRepos(prev => [...prev, repo])}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
