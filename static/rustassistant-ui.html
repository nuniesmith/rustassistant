                                📋 Tasks{" "}
                                {activeRepo ? `— ${activeRepo.name}` : ""}
                            </h2>
                            <div
                                style={{
                                    display: "flex",
                                    gap: 6,
                                    marginLeft: 12,
                                }}
                            >
                                {["all", "high", "TODO", "STUB", "FIXME"].map(
                                    (f) => (
                                        <button
                                            key={f}
                                            className={`btn ${filter === f ? "primary" : ""}`}
                                            style={{
                                                padding: "3px 9px",
                                                fontSize: 11,
                                            }}
                                            onClick={() => setFilter(f)}
                                        >
                                            {f}
                                        </button>
                                    ),
                                )}
                            </div>
                            <div className="toolbar-right">
                                {loading && <div className="loading-spinner" />}
                            </div>
                        </div>
                        <div className="task-summary">
                            <span>
                                <span className="num hi">{counts.high}</span>{" "}
                                high
                            </span>
                            <span>
                                <span className="num mid">{counts.mid}</span>{" "}
                                mid
                            </span>
                            <span>
                                <span className="num lo">{counts.low}</span> low
                            </span>
                            <span style={{ marginLeft: "auto" }}>
                                <span className="num sel">{counts.sel}</span> in
                                queue
                            </span>
                        </div>
                        <div className="tasks-columns">
                            {COLS.map((col) => {
                                const items = filtered
                                    .filter((t) => t.col === col.id)
                                    .sort(
                                        (a, b) =>
                                            (PRIORITY_ORDER[a.priority] ?? 1) -
                                            (PRIORITY_ORDER[b.priority] ?? 1),
                                    );
                                return (
                                    <div key={col.id} className="tasks-col">
                                        <div className="col-header">
                                            <span
                                                className="col-title"
                                                style={{ color: col.color }}
                                            >
                                                {col.label}
                                            </span>
                                            <span className="col-badge">
                                                {items.length}
                                            </span>
                                        </div>
                                        <div className="col-items">
                                            {items.length === 0 && !loading && (
                                                <div
                                                    style={{
                                                        color: "var(--muted)",
                                                        fontSize: 11,
                                                        textAlign: "center",
                                                        padding: 16,
                                                    }}
                                                >
                                                    empty
                                                </div>
                                            )}
                                            {items.map((task) => (
                                                <div
                                                    key={task.id}
                                                    className={`task-card priority-${task.priority}`}
                                                    onClick={() =>
                                                        sendToChat(task)
                                                    }
                                                >
                                                    <div className="task-title">
                                                        {task.title}
                                                    </div>
                                                    <div className="task-meta">
                                                        <span
                                                            className={`task-tag ${KIND_COLOR[task.kind] || "tag-todo"}`}
                                                        >
                                                            {task.kind}
                                                        </span>
                                                        <span className="task-file">
                                                            {task.file}
                                                            {task.line
                                                                ? ":" +
                                                                  task.line
                                                                : ""}
                                                        </span>
                                                    </div>
                                                    <div
                                                        style={{
                                                            display: "flex",
                                                            gap: 5,
                                                            marginTop: 5,
                                                        }}
                                                    >
                                                        {col.id !== "queue" && (
                                                            <button
                                                                className="msg-act-btn"
                                                                style={{
                                                                    fontSize: 10,
                                                                    padding:
                                                                        "2px 7px",
                                                                }}
                                                                onClick={(
                                                                    e,
                                                                ) => {
                                                                    e.stopPropagation();
                                                                    moveTask(
                                                                        task.id,
                                                                        "queue",
                                                                    );
                                                                }}
                                                            >
                                                                → Queue
                                                            </button>
                                                        )}
                                                        {col.id !== "done" && (
                                                            <button
                                                                className="msg-act-btn green"
                                                                style={{
                                                                    fontSize: 10,
                                                                    padding:
                                                                        "2px 7px",
                                                                }}
                                                                onClick={(
                                                                    e,
                                                                ) => {
                                                                    e.stopPropagation();
                                                                    moveTask(
                                                                        task.id,
                                                                        "done",
                                                                    );
                                                                }}
                                                            >
                                                                ✓ Done
                                                            </button>
                                                        )}
                                                        {col.id !==
                                                            "staging" && (
                                                            <button
                                                                className="msg-act-btn"
                                                                style={{
                                                                    fontSize: 10,
                                                                    padding:
                                                                        "2px 7px",
                                                                }}
                                                                onClick={(
                                                                    e,
                                                                ) => {
                                                                    e.stopPropagation();
                                                                    moveTask(
                                                                        task.id,
                                                                        "staging",
                                                                    );
                                                                }}
                                                            >
                                                                ← Back
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            // ─── PR Pane ──────────────────────────────────────────────────────────────
            function PRPane({ activeRepo, toast }) {
                const [prs, setPRs] = useState([]);
                const [loading, setLoading] = useState(false);
                const [generating, setGenerating] = useState(false);

                // Fetch open PRs from GitHub via our API
                useEffect(() => {
                    if (!activeRepo?.remote_url) {
                        setPRs([]);
                        return;
                    }
                    setLoading(true);
                    const repoSlug = activeRepo.remote_url
                        .replace(/.*github\.com\//, "")
                        .replace(/\.git$/, "");
                    fetch(
                        `${API}/api/github/prs?repo=${encodeURIComponent(repoSlug)}&state=open&limit=20`,
                    )
                        .then((r) => (r.ok ? r.json() : { prs: [] }))
                        .then((data) => setPRs(data.prs || data || []))
                        .catch(() => setPRs([]))
                        .finally(() => setLoading(false));
                }, [activeRepo?.id]);

                async function generateGroupedPR() {
                    if (!activeRepo) {
                        toast("Select a repo first", "error");
                        return;
                    }
                    setGenerating(true);
                    try {
                        const res = await fetch(
                            `${API}/api/v1/chat/repos/${activeRepo.id}`,
                            {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    message:
                                        "Based on the repo todos and symbols, suggest 3 grouped pull requests I could create. For each, provide: title, branch name, which files would change, and a one-line description. Format as a numbered list.",
                                    force_remote: true,
                                }),
                            },
                        );
                        if (!res.ok) throw new Error("API error");
                        const data = await res.json();
                        // Add as a synthetic PR suggestion card
                        setPRs((prev) => [
                            {
                                id: `suggest-${Date.now()}`,
                                number: "?",
                                title: "✨ AI PR Suggestions",
                                state: "draft",
                                body: data.reply,
                                isSuggestion: true,
                                created_at: new Date().toISOString(),
                            },
                            ...prev,
                        ]);
                        toast("PR suggestions generated", "success");
                    } catch (e) {
                        toast("Failed: " + e.message, "error");
                    } finally {
                        setGenerating(false);
                    }
                }

                const statusColor = {
                    open: "badge-open",
                    closed: "badge-merged",
                    draft: "badge-draft",
                    review: "badge-review",
                };

                return (
                    <div className="pr-wrap">
                        <div className="pane-toolbar">
                            <h2>
                                🔀 Pull Requests{" "}
                                {activeRepo ? `— ${activeRepo.name}` : ""}
                            </h2>
                            <div className="toolbar-right">
                                <button
                                    className="btn"
                                    onClick={generateGroupedPR}
                                    disabled={generating || !activeRepo}
                                >
                                    {generating ? (
                                        <>
                                            <div
                                                className="loading-spinner"
                                                style={{
                                                    width: 12,
                                                    height: 12,
                                                }}
                                            />{" "}
                                            Generating…
                                        </>
                                    ) : (
                                        "✨ Suggest PRs"
                                    )}
                                </button>
                                {activeRepo?.remote_url && (
                                    <a
                                        href={activeRepo.remote_url + "/pulls"}
                                        target="_blank"
                                        rel="noreferrer"
                                        className="btn"
                                    >
                                        ↗ GitHub
                                    </a>
                                )}
                                {loading && <div className="loading-spinner" />}
                            </div>
                        </div>
                        <div className="pr-list">
                            {prs.length === 0 && !loading && (
                                <div className="empty-state">
                                    <div className="empty-icon">🔀</div>
                                    <div className="empty-text">
                                        {activeRepo
                                            ? "No open PRs"
                                            : "Select a repo"}
                                    </div>
                                    {activeRepo && (
                                        <button
                                            className="btn"
                                            style={{ marginTop: 8 }}
                                            onClick={generateGroupedPR}
                                        >
                                            ✨ Suggest PRs from TODOs
                                        </button>
                                    )}
                                </div>
                            )}
                            {prs.map((pr) => (
                                <div key={pr.id} className="pr-card">
                                    {pr.isSuggestion ? (
                                        <>
                                            <div className="pr-top">
                                                <span className="pr-num">
                                                    AI
                                                </span>
                                                <span className="pr-title">
                                                    {pr.title}
                                                </span>
                                                <span
                                                    className={`pr-badge ${statusColor[pr.state] || "badge-draft"}`}
                                                >
                                                    {pr.state}
                                                </span>
                                            </div>
                                            <div
                                                className="msg-bubble"
                                                style={{
                                                    margin: "8px 0",
                                                    background:
                                                        "var(--surface2)",
                                                    border: "1px solid var(--border2)",
                                                }}
                                            >
                                                <MsgContent text={pr.body} />
                                            </div>
                                        </>
                                    ) : (
                                        <>
                                            <div className="pr-top">
                                                <span className="pr-num">
                                                    #{pr.number}
                                                </span>
                                                <span className="pr-title">
                                                    {pr.title}
                                                </span>
                                                <span
                                                    className={`pr-badge ${statusColor[pr.state] || "badge-open"}`}
                                                >
                                                    {pr.state || "open"}
                                                </span>
                                            </div>
                                            <div className="pr-meta">
                                                {pr.user?.login && (
                                                    <span>
                                                        👤 {pr.user.login}
                                                    </span>
                                                )}
                                                {pr.created_at && (
                                                    <span>
                                                        🕐{" "}
                                                        {fmtAgo(pr.created_at)}
                                                    </span>
                                                )}
                                                {pr.head?.ref && (
                                                    <span className="pr-file-chip">
                                                        {pr.head.ref}
                                                    </span>
                                                )}
                                                {pr.changed_files > 0 && (
                                                    <span>
                                                        {pr.changed_files} files
                                                    </span>
                                                )}
                                            </div>
                                            {pr.body && (
                                                <div
                                                    style={{
                                                        marginTop: 8,
                                                        fontSize: 12,
                                                        color: "var(--muted)",
                                                        maxHeight: 60,
                                                        overflow: "hidden",
                                                        maskImage:
                                                            "linear-gradient(180deg,#000 60%,transparent)",
                                                    }}
                                                >
                                                    {pr.body.slice(0, 200)}
                                                </div>
                                            )}
                                            <div className="pr-actions">
                                                {pr.html_url && (
                                                    <a
                                                        href={pr.html_url}
                                                        target="_blank"
                                                        rel="noreferrer"
                                                        className="btn"
                                                        style={{ fontSize: 11 }}
                                                    >
                                                        ↗ View PR
                                                    </a>
                                                )}
                                            </div>
                                        </>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // ─── Repo Detail Panel ────────────────────────────────────────────────────
            function RepoDetailPanel({ repo, onClose }) {
                const DETAIL_TABS = ["tree", "todos", "symbols", "context"];
                const [activeTab, setActiveTab] = useState("tree");
                const [cache, setCache] = useState({});
                const [loading, setLoading] = useState(false);

                // Load data for a tab, cache results so switching tabs is instant
                async function loadTab(tab) {
                    if (cache[tab] !== undefined) return;
                    setLoading(true);
                    try {
                        const url =
                            tab === "context"
                                ? `${API}/api/v1/repos/${repo.id}/context`
                                : `${API}/api/v1/repos/${repo.id}/${tab}`;
                        const res = await fetch(url);
                        if (!res.ok)
                            throw new Error(`${res.status} ${res.statusText}`);
                        const text = await res.text();
                        // Try to parse as JSON for structured rendering
                        let parsed = null;
                        try {
                            parsed = JSON.parse(text);
                        } catch (_) {}
                        setCache((c) => ({
                            ...c,
                            [tab]: parsed !== null ? parsed : text,
                        }));
                    } catch (e) {
                        setCache((c) => ({
                            ...c,
                            [tab]: `Error: ${e.message}`,
                        }));
                    } finally {
                        setLoading(false);
                    }
                }

                // Load the initial tab on mount and whenever the tab changes
                useEffect(() => {
                    loadTab(activeTab);
                }, [activeTab, repo.id]);

                function switchTab(tab) {
                    setActiveTab(tab);
                }

                function renderContent() {
                    if (loading && cache[activeTab] === undefined) {
                        return React.createElement(
                            "div",
                            { className: "detail-body loading" },
                            "⏳ Loading…",
                        );
                    }
                    const data = cache[activeTab];
                    if (data === undefined)
                        return React.createElement(
                            "div",
                            { className: "detail-body loading" },
                            "⏳ Loading…",
                        );

                    // Todos — array of { kind, message, file, line }
                    if (activeTab === "todos" && Array.isArray(data)) {
                        if (data.length === 0)
                            return React.createElement(
                                "div",
                                { className: "detail-body" },
                                "No TODOs found — run a sync first.",
                            );
                        return React.createElement(
                            "div",
                            {
                                className: "detail-body",
                                style: { fontFamily: "var(--font-mono)" },
                            },
                            data.map((t, i) =>
                                React.createElement(
                                    "div",
                                    { key: i, className: "todo-row" },
                                    React.createElement(
                                        "span",
                                        { className: `todo-kind ${t.kind}` },
                                        t.kind || "TODO",
                                    ),
                                    React.createElement(
                                        "span",
                                        {
                                            style: {
                                                flex: 1,
                                                overflow: "hidden",
                                                textOverflow: "ellipsis",
                                                whiteSpace: "nowrap",
                                            },
                                        },
                                        t.message,
                                    ),
                                    React.createElement(
                                        "span",
                                        {
                                            style: {
                                                color: "var(--muted)",
                                                fontSize: 10,
                                                minWidth: 120,
                                                textAlign: "right",
                                            },
                                        },
                                        `${t.file}:${t.line}`,
                                    ),
                                ),
                            ),
                        );
                    }

                    // Symbols — array of { kind, name, file, line, is_pub, is_async }
                    if (activeTab === "symbols" && Array.isArray(data)) {
                        if (data.length === 0)
                            return React.createElement(
                                "div",
                                { className: "detail-body" },
                                "No symbols found — run a sync first.",
                            );
                        return React.createElement(
                            "div",
                            {
                                className: "detail-body",
                                style: { fontFamily: "var(--font-mono)" },
                            },
                            data.map((s, i) =>
                                React.createElement(
                                    "div",
                                    { key: i, className: "sym-row" },
                                    React.createElement(
                                        "span",
                                        { className: "sym-kind" },
                                        s.kind || "fn",
                                    ),
                                    s.is_pub &&
                                        React.createElement(
                                            "span",
                                            { className: "sym-pub" },
                                            "pub ",
                                        ),
                                    s.is_async &&
                                        React.createElement(
                                            "span",
                                            {
                                                style: {
                                                    color: "var(--amber)",
                                                },
                                            },
                                            "async ",
                                        ),
                                    React.createElement(
                                        "span",
                                        { className: "sym-name" },
                                        s.name,
                                    ),
                                    React.createElement(
                                        "span",
                                        { className: "sym-file" },
                                        `${s.file}:${s.line}`,
                                    ),
                                ),
                            ),
                        );
                    }

                    // Tree / context / raw string fallback
                    const text =
                        typeof data === "string"
                            ? data
                            : JSON.stringify(data, null, 2);
                    return React.createElement(
                        "div",
                        { className: "detail-body" },
                        text,
                    );
                }

                const tabLabels = {
                    tree: "🌲 Tree",
                    todos: "📋 TODOs",
                    symbols: "⚙ Symbols",
                    context: "📝 Context",
                };

                return React.createElement(
                    "div",
                    { className: "repo-detail-panel" },
                    // Tab bar
                    React.createElement(
                        "div",
                        { className: "detail-tabs" },
                        DETAIL_TABS.map((t) =>
                            React.createElement(
                                "button",
                                {
                                    key: t,
                                    className: `detail-tab ${activeTab === t ? "active" : ""}`,
                                    onClick: () => switchTab(t),
                                },
                                tabLabels[t],
                            ),
                        ),
                        React.createElement(
                            "button",
                            {
                                className: "detail-close",
                                onClick: onClose,
                                title: "Close",
                            },
                            "✕",
                        ),
                    ),
                    // Content
                    renderContent(),
                );
            }

            // ─── Repos Pane ───────────────────────────────────────────────────────────
            function ReposPane({
                repos,
                setRepos,
                activeRepoId,
                setActiveRepoId,
                onAdd,
                toast,
                setTab,
                setQueuedTasks,
            }) {
                const [syncing, setSyncing] = useState({});
                const [pulling, setPulling] = useState({});
                const [scanning, setScanning] = useState({});
                // null = no panel open; string = repo.id whose panel is open
                const [detailOpen, setDetailOpen] = useState(null);

                function toggleDetail(repo) {
                    setDetailOpen((prev) =>
                        prev === repo.id ? null : repo.id,
                    );
                }

                async function pullRepo(repo) {
                    setPulling((s) => ({ ...s, [repo.id]: true }));
                    try {
                        const res = await fetch(
                            `${API}/api/web/repos/${repo.id}/pull`,
                            { method: "POST" },
                        );
                        if (!res.ok) throw new Error(await res.text());
                        const data = await res.json();
                        toast(
                            `Pulled ${repo.name}: HEAD ${data.head.slice(0, 8)}`,
                            "success",
                        );
                    } catch (e) {
                        toast("Pull failed: " + e.message, "error");
                    } finally {
                        setPulling((s) => ({ ...s, [repo.id]: false }));
                    }
                }

                async function scanRepo(repo) {
                    setScanning((s) => ({ ...s, [repo.id]: true }));
                    try {
                        const res = await fetch(
                            `${API}/api/web/repos/${repo.id}/scan`,
                        );
                        if (!res.ok) throw new Error(await res.text());
                        const data = await res.json();
                        const items = Array.isArray(data.items)
                            ? data.items
                            : [];
                        // Surface scan results in the Tasks pane as queued items.
                        if (setQueuedTasks) setQueuedTasks(items);
                        // Make the active repo the scanned one so Tasks pane loads
                        // the right todos, then auto-switch to Tasks.
                        setActiveRepoId(repo.id);
                        if (setTab) setTab("tasks");
                        toast(
                            `Scan complete: ${items.length} items found in ${repo.name}`,
                            "success",
                        );
                    } catch (e) {
                        toast("Scan failed: " + e.message, "error");
                    } finally {
                        setScanning((s) => ({ ...s, [repo.id]: false }));
                    }
                }

                async function syncRepo(repo) {
                    setSyncing((s) => ({ ...s, [repo.id]: true }));
                    try {
                        const res = await fetch(
                            `${API}/api/v1/repos/${repo.id}/sync`,
                            { method: "POST" },
                        );
                        if (!res.ok) throw new Error(await res.text());
                        const data = await res.json();
                        setRepos((prev) =>
                            prev.map((r) =>
                                r.id === repo.id
                                    ? {
                                          ...r,
                                          last_synced: Date.now() / 1000,
                                          files: data.files_walked,
                                          todos: data.todos_found,
                                          symbols: data.symbols_found,
                                      }
                                    : r,
                            ),
                        );
                        toast(
                            `Synced ${repo.name}: ${data.todos_found} todos, ${data.symbols_found} symbols`,
                            "success",
                        );
                    } catch (e) {
                        toast("Sync failed: " + e.message, "error");
                    } finally {
                        setSyncing((s) => ({ ...s, [repo.id]: false }));
                    }
                }

                async function deleteRepo(repo) {
                    if (!confirm(`Remove "${repo.name}" from RustAssistant?`))
                        return;
                    try {
                        const res = await fetch(
                            `${API}/api/v1/repos/${repo.id}`,
                            { method: "DELETE" },
                        );
                        if (!res.ok) throw new Error(await res.text());
                        setRepos((prev) =>
                            prev.filter((r) => r.id !== repo.id),
                        );
                        if (activeRepoId === repo.id) setActiveRepoId(null);
                        toast(`Removed ${repo.name}`, "info");
                    } catch (e) {
                        toast("Delete failed: " + e.message, "error");
                    }
                }

                return (
                    <div className="repos-wrap">
                        <div className="pane-toolbar">
                            <h2>📦 Repositories</h2>
                            <div className="toolbar-right">
                                <button className="btn primary" onClick={onAdd}>
                                    ➕ Add Repo
                                </button>
                            </div>
                        </div>
                        <div className="repo-grid">
                            {repos.length === 0 && (
                                <div style={{ gridColumn: "1/-1" }}>
                                    <div
                                        className="empty-state"
                                        style={{ padding: 40 }}
                                    >
                                        <div className="empty-icon">📦</div>
                                        <div className="empty-text">
                                            No repos yet
                                        </div>
                                        <button
                                            className="btn primary"
                                            style={{ marginTop: 12 }}
                                            onClick={onAdd}
                                        >
                                            ➕ Add your first repo
                                        </button>
                                    </div>
                                </div>
                            )}
                            {repos.map((r, i) => (
                                <React.Fragment key={r.id}>
                                    <div
                                        className={`repo-card ${r.id === activeRepoId ? "active-repo" : ""}`}
                                        onClick={() => setActiveRepoId(r.id)}
                                    >
                                        <div className="repo-card-top">
                                            <div
                                                className="repo-dot"
                                                style={{
                                                    width: 10,
                                                    height: 10,
                                                    borderRadius: "50%",
                                                    background: colorFor(i),
                                                }}
                                            />
                                            <div className="repo-card-name">
                                                {r.name}
                                            </div>
                                            {r.branch && (
                                                <span
                                                    style={{
                                                        fontSize: 10,
                                                        color: "var(--muted)",
                                                        fontFamily:
                                                            "var(--font-mono)",
                                                    }}
                                                >
                                                    {r.branch}
                                                </span>
                                            )}
                                        </div>
                                        <div className="repo-stats">
                                            <div className="repo-stat">
                                                <span className="val">
                                                    {r.todos ?? "—"}
                                                </span>{" "}
                                                todos
                                            </div>
                                            <div className="repo-stat">
                                                <span className="val">
                                                    {r.symbols ?? "—"}
                                                </span>{" "}
                                                symbols
                                            </div>
                                            <div className="repo-stat">
                                                <span className="val">
                                                    {r.files ?? "—"}
                                                </span>{" "}
                                                files
                                            </div>
                                            <div
                                                style={{
                                                    marginLeft: "auto",
                                                    fontSize: 10,
                                                    color: "var(--muted)",
                                                }}
                                            >
                                                synced {fmtAgo(r.last_synced)}
                                            </div>
                                        </div>
                                        {r.local_path && (
                                            <div
                                                style={{
                                                    fontSize: 10,
                                                    color: "var(--muted)",
                                                    fontFamily:
                                                        "var(--font-mono)",
                                                    marginBottom: 8,
                                                    overflow: "hidden",
                                                    textOverflow: "ellipsis",
                                                    whiteSpace: "nowrap",
                                                }}
                                            >
                                                {r.local_path}
                                            </div>
                                        )}
                                        <div
                                            className="repo-actions"
                                            onClick={(e) => e.stopPropagation()}
                                        >
                                            <button
                                                className="btn"
                                                style={{ fontSize: 11 }}
                                                onClick={() =>
                                                    setActiveRepoId(r.id)
                                                }
                                            >
                                                {r.id === activeRepoId
                                                    ? "✓ Active"
                                                    : "Set Active"}
                                            </button>
                                            <button
                                                className="btn"
                                                style={{ fontSize: 11 }}
                                                onClick={() => scanRepo(r)}
                                                disabled={
                                                    scanning[r.id] ||
                                                    syncing[r.id] ||
                                                    pulling[r.id]
                                                }
                                                title="Run TODO scan and switch to Tasks"
                                            >
                                                {scanning[r.id]
                                                    ? "⏳ Scanning…"
                                                    : "🔍 Scan"}
                                            </button>
                                            <button
                                                className={`btn ${detailOpen === r.id ? "primary" : ""}`}
                                                style={{ fontSize: 11 }}
                                                onClick={(e) => {
                                                    e.stopPropagation();
                                                    toggleDetail(r);
                                                }}
                                                title="View tree / TODOs / symbols / context"
                                            >
                                                📂 Details
                                            </button>
                                            <button
                                                className="btn"
                                                style={{ fontSize: 11 }}
                                                onClick={() => pullRepo(r)}
                                                disabled={
                                                    pulling[r.id] ||
                                                    syncing[r.id]
                                                }
                                                title="Run git pull on this repo"
                                            >
                                                {pulling[r.id]
                                                    ? "⏳ Pulling…"
                                                    : "⬆ Pull"}
                                            </button>
                                            <button
                                                className="btn"
                                                style={{ fontSize: 11 }}
                                                onClick={() => syncRepo(r)}
                                                disabled={
                                                    syncing[r.id] ||
                                                    pulling[r.id] ||
                                                    scanning[r.id]
                                                }
                                            >
                                                {syncing[r.id]
                                                    ? "⏳ Syncing…"
                                                    : "🔄 Sync"}
                                            </button>
                                            <button
                                                className="btn"
                                                style={{
                                                    fontSize: 11,
                                                    color: "var(--red)",
                                                    borderColor:
                                                        "rgba(239,68,68,.3)",
                                                }}
                                                onClick={() => deleteRepo(r)}
                                            >
                                                🗑
                                            </button>
                                        </div>
                                        {(syncing[r.id] ||
                                            pulling[r.id] ||
                                            scanning[r.id]) && (
                                            <div className="repo-sync-bar">
                                                <div className="repo-sync-bar-fill" />
                                            </div>
                                        )}
                                    </div>
                                    {detailOpen === r.id && (
                                        <RepoDetailPanel
                                            repo={r}
                                            onClose={() => setDetailOpen(null)}
                                        />
                                    )}
                                </React.Fragment>
                            ))}
                        </div>
                    </div>
                );
            }

            // ─── App ──────────────────────────────────────────────────────────────────
            function App() {
                const [tab, setTab] = useState("chat");
                const [repos, setRepos] = useState([]);
                const [activeRepoId, setActiveRepoId] = useState(null);
                const [showAddRepo, setShowAddRepo] = useState(false);
                const [showReview, setShowReview] = useState(false);
                const [reviewTodos, setReviewTodos] = useState([]);
                const [queuedTasks, setQueuedTasks] = useState([]);
                const [ollamaOk, setOllamaOk] = useState(null); // null=loading, true=ok, false=offline
                const { toasts, push: toast } = useToast();

                const activeRepo = useMemo(
                    () => repos.find((r) => r.id === activeRepoId) || null,
                    [repos, activeRepoId],
                );

                // Load repos on mount
                useEffect(() => {
                    fetch(`${API}/api/v1/repos`)
                        .then((r) => r.json())
                        .then((data) => {
                            const arr = Array.isArray(data) ? data : [];
                            setRepos(
                                arr.map((r, i) => ({
                                    ...r,
                                    color: colorFor(i),
                                })),
                            );
                            if (arr.length > 0 && !activeRepoId)
                                setActiveRepoId(arr[0].id);
                        })
                        .catch(() => {});
                }, []);

                // Poll Ollama health
                useEffect(() => {
                    const check = () =>
                        fetch(`${API}/api/v1/ollama/health`, {
                            signal: AbortSignal.timeout(3000),
                        })
                            .then((r) => r.json())
                            .then((d) => setOllamaOk(d.reachable))
                            .catch(() => setOllamaOk(false));
                    check();
                    const t = setInterval(check, 15000);
                    return () => clearInterval(t);
                }, []);

                function onRepoAdded(data) {
                    const newRepo = {
                        id: data.id,
                        name: data.name,
                        local_path: data.local_path,
                        remote_url: data.remote_url,
                        branch: data.branch,
                        color: colorFor(repos.length),
                    };
                    setRepos((prev) => [...prev, newRepo]);
                    setActiveRepoId(newRepo.id);
                    setTab("repos");
                }

                async function openReview() {
                    if (!activeRepo) {
                        toast("Select a repo first", "error");
                        return;
                    }
                    try {
                        const res = await fetch(
                            `${API}/api/v1/repos/${activeRepo.id}/todos`,
                        );
                        const data = await res.json();
                        setReviewTodos(Array.isArray(data) ? data : []);
                    } catch {
                        setReviewTodos([]);
                    }
                    setShowReview(true);
                }

                const tabs = [
                    { id: "chat", icon: "💬", label: "Chat", badge: null },
                    {
                        id: "tasks",
                        icon: "📋",
                        label: "Tasks",
                        badge: queuedTasks.length || null,
                    },
                    { id: "prs", icon: "🔀", label: "PRs", badge: null },
                    {
                        id: "repos",
                        icon: "📦",
                        label: "Repos",
                        badge: repos.length || null,
                    },
                ];

                return (
                    <div className="layout">
                        {/* Sidebar */}
                        <div className="sidebar">
                            <div className="sidebar-logo">
                                <span className="crab">🦀</span>
                                <span className="name">RustAssistant</span>
                                <span className="ver">v0.1</span>
                            </div>

                            <div className="sidebar-section">
                                <div className="sidebar-label">Repos</div>
                                {repos.map((r, i) => (
                                    <div
                                        key={r.id}
                                        className={`repo-item ${r.id === activeRepoId ? "active" : ""}`}
                                        onClick={() => {
                                            setActiveRepoId(r.id);
                                            setTab("chat");
                                        }}
                                    >
                                        <div
                                            className="repo-dot"
                                            style={{ background: colorFor(i) }}
                                        />
                                        <span className="repo-name">
                                            {r.name}
                                        </span>
                                        {r.todos != null && (
                                            <span className="repo-count">
                                                {r.todos}
                                            </span>
                                        )}
                                    </div>
                                ))}
                                <button
                                    className="add-repo-btn"
                                    onClick={() => setShowAddRepo(true)}
                                >
                                    + Add Repo
                                </button>
                            </div>

                            <div className="sidebar-nav">
                                {activeRepo && (
                                    <div
                                        className="nav-item"
                                        onClick={openReview}
                                    >
                                        <span>🔍</span> Review TODOs
                                    </div>
                                )}
                                <div
                                    className="nav-item"
                                    style={{ fontSize: 11 }}
                                >
                                    <div
                                        className={`status-dot ${ollamaOk === null ? "loading" : ollamaOk ? "" : "offline"}`}
                                    />
                                    {ollamaOk === null
                                        ? "Checking Ollama…"
                                        : ollamaOk
                                          ? "Ollama online"
                                          : "Ollama offline"}
                                </div>
                            </div>
                        </div>

                        {/* Main */}
                        <div className="main">
                            {/* Topbar */}
                            <div className="topbar">
                                <span className="topbar-title">
                                    {tabs.find((t) => t.id === tab)?.icon}{" "}
                                    {tabs.find((t) => t.id === tab)?.label}
                                </span>
                                {activeRepo && (
                                    <div
                                        className="topbar-repo-pill"
                                        onClick={() => setTab("repos")}
                                    >
                                        <div
                                            className="dot"
                                            style={{
                                                background:
                                                    activeRepo.color ||
                                                    "var(--cyan)",
                                            }}
                                        />
                                        {activeRepo.name}
                                    </div>
                                )}
                                <div className="topbar-right">
                                    <div
                                        className={`model-chip ${ollamaOk ? "local" : "offline"}`}
                                    >
                                        {ollamaOk
                                            ? "⚡ qwen2.5-coder:7b"
                                            : "🔴 offline"}
                                    </div>
                                    <div className="model-chip remote">
                                        🌐 grok
                                    </div>
                                </div>
                            </div>

                            {/* Tab bar */}
                            <div className="tab-bar">
                                {tabs.map((t) => (
                                    <button
                                        key={t.id}
                                        className={`tab-btn ${tab === t.id ? "active" : ""}`}
                                        onClick={() => setTab(t.id)}
                                    >
                                        {t.icon} {t.label}
                                        {t.badge != null && (
                                            <span className="cnt">
                                                {t.badge}
                                            </span>
                                        )}
                                    </button>
                                ))}
                            </div>

                            {/* Tab content */}
                            <div className="tab-content">
                                {tab === "chat" && (
                                    <ChatPane
                                        activeRepo={activeRepo}
                                        repos={repos}
                                    />
                                )}
                                {tab === "tasks" && (
                                    <TasksPane
                                        activeRepo={activeRepo}
                                        queuedTasks={queuedTasks}
                                        setQueuedTasks={setQueuedTasks}
                                        toast={toast}
                                    />
                                )}
                                {tab === "prs" && (
                                    <PRPane
                                        activeRepo={activeRepo}
                                        toast={toast}
                                    />
                                )}
                                {tab === "repos" && (
                                    <ReposPane
                                        repos={repos}
                                        setRepos={setRepos}
                                        activeRepoId={activeRepoId}
                                        setActiveRepoId={setActiveRepoId}
                                        onAdd={() => setShowAddRepo(true)}
                                        toast={toast}
                                        setTab={setTab}
                                        setQueuedTasks={setQueuedTasks}
                                    />
                                )}
                            </div>
                        </div>

                        {/* Modals */}
                        {showAddRepo && (
                            <AddRepoModal
                                onClose={() => setShowAddRepo(false)}
                                onAdded={onRepoAdded}
                                toast={toast}
                            />
                        )}
                        {showReview && (
                            <ReviewModal
                                repo={activeRepo}
                                todos={reviewTodos}
                                onClose={() => setShowReview(false)}
                                onQueue={(tasks) => setQueuedTasks(tasks)}
                                toast={toast}
                            />
                        )}

                        {/* Toasts */}
                        <div className="toast-container">
                            {toasts.map((t) => (
                                <div key={t.id} className={`toast ${t.type}`}>
                                    {t.type === "success"
                                        ? "✓"
                                        : t.type === "error"
                                          ? "✕"
                                          : "ℹ"}{" "}
                                    {t.msg}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>
