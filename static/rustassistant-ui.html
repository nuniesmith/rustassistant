<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RustAssistant</title>
        <script
            src="https://unpkg.com/react@18/umd/react.development.js"
            crossorigin
        ></script>
        <script
            src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
            crossorigin
        ></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #0d1117;
                --surface: #161b22;
                --surface2: #1e2430;
                --border: #30363d;
                --border2: #21262d;
                --text: #e6edf3;
                --muted: #7d8590;
                --cyan: #06b6d4;
                --cyan-dim: #0e7490;
                --green: #10b981;
                --amber: #f59e0b;
                --red: #ef4444;
                --purple: #a78bfa;
                --blue: #3b82f6;
                --radius: 8px;
                --font-mono: "JetBrains Mono", monospace;
                --font-sans: "Inter", sans-serif;
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body,
            #root {
                height: 100%;
                overflow: hidden;
            }
            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--font-sans);
                font-size: 14px;
                line-height: 1.5;
            }

            /* ─── Layout ─────────────────────────────────────────────── */
            .layout {
                display: flex;
                height: 100vh;
                overflow: hidden;
            }

            /* ─── Sidebar ─────────────────────────────────────────────── */
            .sidebar {
                width: 220px;
                min-width: 220px;
                background: var(--surface);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .sidebar-logo {
                padding: 14px 16px 10px;
                display: flex;
                align-items: center;
                gap: 8px;
                border-bottom: 1px solid var(--border2);
            }
            .sidebar-logo .crab {
                font-size: 20px;
            }
            .sidebar-logo .name {
                font-family: var(--font-mono);
                font-weight: 700;
                font-size: 13px;
                color: var(--cyan);
                letter-spacing: 0.5px;
            }
            .sidebar-logo .ver {
                font-size: 10px;
                color: var(--muted);
                margin-left: auto;
            }

            .sidebar-section {
                padding: 10px 0 4px;
            }
            .sidebar-label {
                padding: 0 12px 6px;
                font-size: 10px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: var(--muted);
            }
            .repo-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                cursor: pointer;
                transition: background 0.15s;
                border-radius: 0;
            }
            .repo-item:hover {
                background: var(--surface2);
            }
            .repo-item.active {
                background: rgba(6, 182, 212, 0.08);
                border-right: 2px solid var(--cyan);
            }
            .repo-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }
            .repo-name {
                font-size: 12px;
                font-weight: 500;
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .repo-count {
                font-size: 10px;
                color: var(--muted);
                font-family: var(--font-mono);
            }
            .repo-syncing {
                font-size: 10px;
                color: var(--amber);
                animation: pulse 1.2s infinite;
            }

            .add-repo-btn {
                margin: 6px 12px 10px;
                padding: 6px 10px;
                background: transparent;
                border: 1px dashed var(--border);
                color: var(--muted);
                border-radius: var(--radius);
                cursor: pointer;
                font-size: 11px;
                width: calc(100% - 24px);
                text-align: left;
                transition: all 0.15s;
            }
            .add-repo-btn:hover {
                border-color: var(--cyan);
                color: var(--cyan);
            }

            .sidebar-nav {
                margin-top: auto;
                border-top: 1px solid var(--border2);
            }
            .nav-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 14px;
                cursor: pointer;
                color: var(--muted);
                font-size: 12px;
                transition: all 0.15s;
            }
            .nav-item:hover {
                color: var(--text);
                background: var(--surface2);
            }
            .nav-item.active {
                color: var(--cyan);
            }
            .nav-item .badge {
                margin-left: auto;
                background: var(--cyan-dim);
                color: var(--cyan);
                border-radius: 10px;
                padding: 1px 6px;
                font-size: 10px;
                font-family: var(--font-mono);
            }

            /* ─── Topbar ──────────────────────────────────────────────── */
            .topbar {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 0 16px;
                height: 44px;
                min-height: 44px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
            }
            .topbar-title {
                font-weight: 600;
                font-size: 13px;
            }
            .topbar-repo-pill {
                display: flex;
                align-items: center;
                gap: 5px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 2px 10px;
                font-size: 11px;
                cursor: pointer;
            }
            .topbar-repo-pill .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
            }
            .topbar-right {
                margin-left: auto;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .model-chip {
                display: flex;
                align-items: center;
                gap: 4px;
                padding: 3px 9px;
                border-radius: 20px;
                font-size: 10px;
                font-family: var(--font-mono);
                font-weight: 600;
            }
            .model-chip.local {
                background: rgba(16, 185, 129, 0.12);
                color: var(--green);
                border: 1px solid rgba(16, 185, 129, 0.25);
            }
            .model-chip.remote {
                background: rgba(6, 182, 212, 0.12);
                color: var(--cyan);
                border: 1px solid rgba(6, 182, 212, 0.25);
            }
            .model-chip.offline {
                background: rgba(239, 68, 68, 0.1);
                color: var(--red);
                border: 1px solid rgba(239, 68, 68, 0.2);
            }
            .status-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--green);
            }
            .status-dot.offline {
                background: var(--red);
            }
            .status-dot.loading {
                background: var(--amber);
                animation: pulse 1s infinite;
            }

            /* ─── Main ────────────────────────────────────────────────── */
            .main {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .tab-content {
                flex: 1;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }

            /* ─── Tab bar ─────────────────────────────────────────────── */
            .tab-bar {
                display: flex;
                gap: 0;
                border-bottom: 1px solid var(--border);
                background: var(--surface);
                padding: 0 16px;
            }
            .tab-btn {
                padding: 10px 16px;
                background: none;
                border: none;
                border-bottom: 2px solid transparent;
                color: var(--muted);
                cursor: pointer;
                font-size: 12px;
                font-weight: 500;
                display: flex;
                align-items: center;
                gap: 5px;
                transition: all 0.15s;
                margin-bottom: -1px;
            }
            .tab-btn:hover {
                color: var(--text);
            }
            .tab-btn.active {
                color: var(--cyan);
                border-bottom-color: var(--cyan);
            }
            .tab-btn .cnt {
                background: var(--surface2);
                border-radius: 10px;
                padding: 1px 6px;
                font-size: 10px;
                font-family: var(--font-mono);
            }
            .tab-btn.active .cnt {
                background: rgba(6, 182, 212, 0.15);
                color: var(--cyan);
            }

            /* ─── Chat ────────────────────────────────────────────────── */
            .chat-wrap {
                display: flex;
                flex-direction: column;
                height: 100%;
                overflow: hidden;
            }
            .messages {
                flex: 1;
                overflow-y: auto;
                padding: 16px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .messages::-webkit-scrollbar {
                width: 4px;
            }
            .messages::-webkit-scrollbar-track {
                background: transparent;
            }
            .messages::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 4px;
            }

            .msg {
                display: flex;
                gap: 10px;
                max-width: 100%;
            }
            .msg.user {
                flex-direction: row-reverse;
            }
            .msg-avatar {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
                flex-shrink: 0;
            }
            .msg.user .msg-avatar {
                background: rgba(6, 182, 212, 0.2);
            }
            .msg.assistant .msg-avatar {
                background: rgba(167, 139, 250, 0.2);
            }
            .msg-body {
                display: flex;
                flex-direction: column;
                gap: 4px;
                max-width: calc(100% - 44px);
            }
            .msg.user .msg-body {
                align-items: flex-end;
            }
            .msg-meta {
                font-size: 10px;
                color: var(--muted);
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .msg-bubble {
                padding: 10px 14px;
                border-radius: var(--radius);
                font-size: 13px;
                line-height: 1.6;
                max-width: 760px;
            }
            .msg.assistant .msg-bubble {
                background: var(--surface);
                border: 1px solid var(--border2);
                border-radius: 2px var(--radius) var(--radius) var(--radius);
            }
            .msg.user .msg-bubble {
                background: rgba(6, 182, 212, 0.12);
                border: 1px solid rgba(6, 182, 212, 0.2);
                border-radius: var(--radius) 2px var(--radius) var(--radius);
            }
            .msg-bubble pre {
                background: #0d1117;
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 10px 12px;
                overflow-x: auto;
                margin: 8px 0;
                font-family: var(--font-mono);
                font-size: 12px;
                line-height: 1.5;
            }
            .msg-bubble code {
                font-family: var(--font-mono);
                font-size: 12px;
            }
            .msg-bubble p + p {
                margin-top: 6px;
            }
            .msg-actions {
                display: flex;
                gap: 6px;
                margin-top: 4px;
            }
            .msg-act-btn {
                padding: 3px 9px;
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--muted);
                border-radius: 4px;
                font-size: 11px;
                cursor: pointer;
                transition: all 0.15s;
            }
            .msg-act-btn:hover {
                color: var(--text);
                border-color: var(--cyan);
            }
            .msg-act-btn.green:hover {
                color: var(--green);
                border-color: var(--green);
            }
            .typing-indicator {
                display: flex;
                align-items: center;
                gap: 4px;
                padding: 10px 14px;
            }
            .typing-dot {
                width: 6px;
                height: 6px;
                background: var(--muted);
                border-radius: 50%;
                animation: typingBounce 1.2s infinite;
            }
            .typing-dot:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing-dot:nth-child(3) {
                animation-delay: 0.4s;
            }

            .chat-input-area {
                padding: 10px 16px 14px;
                border-top: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .chat-options {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .chat-toggle {
                display: flex;
                align-items: center;
                gap: 5px;
                font-size: 11px;
                color: var(--muted);
                cursor: pointer;
                padding: 3px 8px;
                border: 1px solid var(--border2);
                border-radius: 20px;
                transition: all 0.15s;
                user-select: none;
            }
            .chat-toggle.on {
                color: var(--cyan);
                border-color: rgba(6, 182, 212, 0.3);
                background: rgba(6, 182, 212, 0.08);
            }
            .chat-toggle .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: currentColor;
            }
            .rag-badge {
                font-size: 10px;
                padding: 2px 7px;
                border-radius: 10px;
                background: rgba(167, 139, 250, 0.12);
                color: var(--purple);
                border: 1px solid rgba(167, 139, 250, 0.2);
            }
            .rounds-row {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 11px;
                color: var(--muted);
                margin-left: auto;
            }
            .rounds-btn {
                width: 22px;
                height: 22px;
                border-radius: 4px;
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text);
                cursor: pointer;
                font-size: 13px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s;
            }
            .rounds-btn:hover {
                background: var(--border);
            }
            .input-row {
                display: flex;
                gap: 8px;
                align-items: flex-end;
            }
            .chat-textarea {
                flex: 1;
                background: var(--surface);
                border: 1px solid var(--border);
                color: var(--text);
                border-radius: var(--radius);
                padding: 9px 12px;
                font-family: var(--font-sans);
                font-size: 13px;
                resize: none;
                height: 42px;
                max-height: 160px;
                overflow-y: auto;
                outline: none;
                transition: border-color 0.15s;
                line-height: 1.5;
            }
            .chat-textarea:focus {
                border-color: var(--cyan-dim);
            }
            .chat-textarea::placeholder {
                color: var(--muted);
            }
            .send-btn {
                width: 40px;
                height: 42px;
                background: var(--cyan);
                border: none;
                border-radius: var(--radius);
                color: #fff;
                font-size: 18px;
                cursor: pointer;
                flex-shrink: 0;
                transition: background 0.15s;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .send-btn:hover:not(:disabled) {
                background: #0891b2;
            }
            .send-btn:disabled {
                background: var(--border);
                cursor: not-allowed;
            }

            /* ─── Quality bar ─────────────────────────────────────────── */
            .qbar {
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .qbar-track {
                flex: 1;
                height: 4px;
                background: var(--border);
                border-radius: 2px;
                min-width: 60px;
            }
            .qbar-fill {
                height: 4px;
                border-radius: 2px;
                transition: width 0.4s;
            }
            .qbar-label {
                font-size: 10px;
                font-family: var(--font-mono);
                min-width: 28px;
            }

            /* ─── Tasks / TODO pane ───────────────────────────────────── */
            .tasks-wrap {
                display: flex;
                flex-direction: column;
                height: 100%;
                overflow: hidden;
            }
            .pane-toolbar {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 16px;
                border-bottom: 1px solid var(--border);
                background: var(--surface);
            }
            .pane-toolbar h2 {
                font-size: 13px;
                font-weight: 600;
            }
            .toolbar-right {
                margin-left: auto;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .btn {
                padding: 5px 12px;
                border-radius: var(--radius);
                border: 1px solid var(--border);
                background: var(--surface2);
                color: var(--text);
                font-size: 12px;
                cursor: pointer;
                transition: all 0.15s;
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .btn:hover {
                border-color: var(--cyan);
                color: var(--cyan);
            }
            .btn.primary {
                background: var(--cyan);
                border-color: var(--cyan);
                color: #fff;
            }
            .btn.primary:hover {
                background: #0891b2;
            }
            .btn.green {
                background: var(--green);
                border-color: var(--green);
                color: #fff;
            }
            .btn.green:hover {
                background: #059669;
            }
            .btn.amber {
                background: rgba(245, 158, 11, 0.15);
                border-color: var(--amber);
                color: var(--amber);
            }
            .btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .task-summary {
                padding: 8px 16px;
                display: flex;
                align-items: center;
                gap: 12px;
                border-bottom: 1px solid var(--border2);
                font-size: 11px;
                color: var(--muted);
                background: var(--surface);
                flex-shrink: 0;
            }
            .task-summary span {
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .task-summary .num {
                font-family: var(--font-mono);
                font-weight: 700;
            }
            .task-summary .num.hi {
                color: var(--red);
            }
            .task-summary .num.mid {
                color: var(--amber);
            }
            .task-summary .num.lo {
                color: var(--muted);
            }
            .task-summary .num.sel {
                color: var(--cyan);
            }

            .tasks-columns {
                flex: 1;
                display: flex;
                gap: 0;
                overflow: hidden;
            }
            .tasks-col {
                flex: 1;
                display: flex;
                flex-direction: column;
                border-right: 1px solid var(--border2);
                overflow: hidden;
            }
            .tasks-col:last-child {
                border-right: none;
            }
            .col-header {
                padding: 8px 12px;
                display: flex;
                align-items: center;
                gap: 6px;
                background: var(--surface);
                border-bottom: 1px solid var(--border2);
                flex-shrink: 0;
            }
            .col-title {
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .col-badge {
                margin-left: auto;
                font-size: 10px;
                font-family: var(--font-mono);
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 1px 7px;
            }
            .col-items {
                flex: 1;
                overflow-y: auto;
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .col-items::-webkit-scrollbar {
                width: 3px;
            }
            .col-items::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }

            .task-card {
                background: var(--surface);
                border: 1px solid var(--border2);
                border-radius: var(--radius);
                padding: 8px 10px;
                cursor: pointer;
                transition: all 0.15s;
                position: relative;
                border-left: 3px solid transparent;
            }
            .task-card:hover {
                border-color: var(--border);
                transform: translateY(-1px);
            }
            .task-card.priority-high {
                border-left-color: var(--red);
            }
            .task-card.priority-mid {
                border-left-color: var(--amber);
            }
            .task-card.priority-low {
                border-left-color: var(--muted);
            }
            .task-card.selected {
                border-color: var(--cyan);
                background: rgba(6, 182, 212, 0.05);
            }
            .task-title {
                font-size: 12px;
                font-weight: 500;
                line-height: 1.4;
                margin-bottom: 5px;
            }
            .task-meta {
                display: flex;
                align-items: center;
                gap: 5px;
                flex-wrap: wrap;
            }
            .task-tag {
                font-size: 9px;
                font-weight: 600;
                text-transform: uppercase;
                padding: 1px 5px;
                border-radius: 3px;
            }
            .tag-todo {
                background: rgba(59, 130, 246, 0.2);
                color: #60a5fa;
            }
            .tag-stub {
                background: rgba(245, 158, 11, 0.2);
                color: var(--amber);
            }
            .tag-fixme {
                background: rgba(239, 68, 68, 0.2);
                color: #f87171;
            }
            .tag-hack {
                background: rgba(167, 139, 250, 0.2);
                color: var(--purple);
            }
            .tag-feat {
                background: rgba(16, 185, 129, 0.2);
                color: var(--green);
            }
            .task-file {
                font-size: 10px;
                color: var(--muted);
                font-family: var(--font-mono);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                max-width: 180px;
            }
            .task-checkbox {
                position: absolute;
                top: 8px;
                right: 8px;
                width: 16px;
                height: 16px;
                border: 1px solid var(--border);
                border-radius: 3px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 11px;
                transition: all 0.15s;
            }
            .task-card.selected .task-checkbox {
                background: var(--cyan);
                border-color: var(--cyan);
                color: #fff;
            }
            .group-header {
                padding: 4px 10px;
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: var(--muted);
                background: var(--surface2);
                border-radius: 4px;
                margin-top: 4px;
            }

            /* ─── PR pane ─────────────────────────────────────────────── */
            .pr-wrap {
                display: flex;
                flex-direction: column;
                height: 100%;
                overflow: hidden;
            }
            .pr-list {
                flex: 1;
                overflow-y: auto;
                padding: 12px 16px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .pr-card {
                background: var(--surface);

    <body>
        <div id="root"></div>

        <script type="text/babel">
            const { useState, useEffect, useRef, useCallback, useMemo } = React;

            // ─── Constants ────────────────────────────────────────────────────────────
            const API = window.location.origin;

            const PRIORITY_ORDER = { high: 0, mid: 1, low: 2 };
            const KIND_COLOR = {
                TODO: "tag-todo",
                STUB: "tag-stub",
                FIXME: "tag-fixme",
                HACK: "tag-hack",
                FEAT: "tag-feat",
            };
            const REPO_COLORS = [
                "#06b6d4",
                "#a78bfa",
                "#f59e0b",
                "#10b981",
                "#3b82f6",
                "#ef4444",
                "#ec4899",
            ];

            // ─── Helpers ──────────────────────────────────────────────────────────────
            function colorFor(idx) {
                return REPO_COLORS[idx % REPO_COLORS.length];
            }
            function qColor(pct) {
                return pct >= 90
                    ? "#10b981"
                    : pct >= 75
                      ? "#f59e0b"
                      : "#ef4444";
            }
            function fmtTime(ts) {
                if (!ts) return "";
                const d = new Date(typeof ts === "number" ? ts * 1000 : ts);
                return d.toLocaleTimeString([], {
                    hour: "2-digit",
                    minute: "2-digit",
                });
            }
            function fmtAgo(ts) {
                if (!ts) return "never";
                const now = Date.now();
                const t =
                    typeof ts === "number" ? ts * 1000 : new Date(ts).getTime();
                const s = Math.floor((now - t) / 1000);
                if (s < 60) return `${s}s ago`;
                if (s < 3600) return `${Math.floor(s / 60)}m ago`;
                if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
                return `${Math.floor(s / 86400)}d ago`;
            }
            function estimateQuality(taskKind) {
                const m = {
                    ScaffoldStub: 78,
                    TodoTagging: 72,
                    SymbolExtraction: 80,
                    RepoQuestion: 85,
                    ArchitecturalReason: 88,
                    CodeReview: 90,
                };
                return m[taskKind] ?? 75;
            }

            // ─── Toast system ─────────────────────────────────────────────────────────
            function useToast() {
                const [toasts, setToasts] = useState([]);
                const push = useCallback((msg, type = "info") => {
                    const id = Date.now();
                    setToasts((t) => [...t, { id, msg, type }]);
                    setTimeout(
                        () => setToasts((t) => t.filter((x) => x.id !== id)),
                        3500,
                    );
                }, []);
                return { toasts, push };
            }

            // ─── Quality Bar ──────────────────────────────────────────────────────────
            function QBar({ pct }) {
                const c = qColor(pct);
                return (
                    <div className="qbar">
                        <div className="qbar-track">
                            <div
                                className="qbar-fill"
                                style={{ width: pct + "%", background: c }}
                            />
                        </div>
                        <span className="qbar-label" style={{ color: c }}>
                            {pct}%
                        </span>
                    </div>
                );
            }

            // ─── Msg content renderer (handles code blocks) ──────────────────────────
            function MsgContent({ text }) {
                if (!text) return null;
                const parts = [];
                const codeRe = /```(\w*)\n?([\s\S]*?)```/g;
                let last = 0,
                    m;
                while ((m = codeRe.exec(text)) !== null) {
                    if (m.index > last)
                        parts.push(
                            <p key={last} style={{ whiteSpace: "pre-wrap" }}>
                                {text.slice(last, m.index)}
                            </p>,
                        );
                    parts.push(
                        <pre key={m.index}>
                            <code>{m[2]}</code>
                        </pre>,
                    );
                    last = codeRe.lastIndex;
                }
                if (last < text.length)
                    parts.push(
                        <p key={last} style={{ whiteSpace: "pre-wrap" }}>
                            {text.slice(last)}
                        </p>,
                    );
                return <>{parts}</>;
            }

            // ─── Add Repo Modal ───────────────────────────────────────────────────────
            function AddRepoModal({ onClose, onAdded, toast }) {
                const [form, setForm] = useState({
                    name: "",
                    local_path: "",
                    remote_url: "",
                    branch: "main",
                });
                const [loading, setLoading] = useState(false);

                const set = (k) => (e) =>
                    setForm((f) => ({ ...f, [k]: e.target.value }));

                async function submit(e) {
                    e.preventDefault();
                    if (!form.name || !form.local_path) return;
                    setLoading(true);
                    try {
                        const res = await fetch(`${API}/api/v1/repos`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                ...form,
                                sync_on_register: true,
                            }),
                        });
                        if (!res.ok) throw new Error(await res.text());
                        const data = await res.json();
                        toast("Repo added successfully", "success");
                        onAdded(data);
                        onClose();
                    } catch (e) {
                        toast("Failed to add repo: " + e.message, "error");
                    } finally {
                        setLoading(false);
                    }
                }

                return (
                    <div
                        className="modal-overlay"
                        onClick={(e) =>
                            e.target === e.currentTarget && onClose()
                        }
                    >
                        <div className="modal">
                            <div className="modal-title">➕ Add Repository</div>
                            <form onSubmit={submit}>
                                <div className="modal-field">
                                    <div className="modal-label">Name</div>
                                    <input
                                        className="modal-input"
                                        value={form.name}
                                        onChange={set("name")}
                                        placeholder="my-project"
                                        required
                                    />
                                </div>
                                <div className="modal-field">
                                    <div className="modal-label">
                                        Local Path
                                    </div>
                                    <input
                                        className="modal-input"
                                        value={form.local_path}
                                        onChange={set("local_path")}
                                        placeholder="/home/jordan/github/my-project"
                                        required
                                    />
                                </div>
                                <div className="modal-field">
                                    <div className="modal-label">
                                        Remote URL (optional)
                                    </div>
                                    <input
                                        className="modal-input"
                                        value={form.remote_url}
                                        onChange={set("remote_url")}
                                        placeholder="https://github.com/you/my-project"
                                    />
                                </div>
                                <div className="modal-field">
                                    <div className="modal-label">Branch</div>
                                    <input
                                        className="modal-input"
                                        value={form.branch}
                                        onChange={set("branch")}
                                        placeholder="main"
                                    />
                                </div>
                                <div className="modal-actions">
                                    <button
                                        type="button"
                                        className="btn"
                                        onClick={onClose}
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        type="submit"
                                        className="btn primary"
                                        disabled={loading}
                                    >
                                        {loading
                                            ? "⏳ Adding…"
                                            : "✚ Add & Sync"}
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            // ─── Review Modal (todo → task selection → PR grouping) ───────────────────
            function ReviewModal({ repo, todos, onClose, onQueue, toast }) {
                const [groups, setGroups] = useState(null);
                const [checked, setChecked] = useState({});
                const [loading, setLoading] = useState(false);
                const [generating, setGenerating] = useState(false);

                // Auto-group todos by file prefix or kind on open
                useEffect(() => {
                    if (!todos?.length) {
                        setGroups([]);
                        return;
                    }
                    // Group by directory prefix (first two path segments)
                    const gmap = {};
                    todos.forEach((t) => {
                        const parts = (t.file || "other").split("/");
                        const key =
                            parts.length > 2
                                ? parts.slice(0, 2).join("/")
                                : parts[0] || "other";
                        if (!gmap[key])
                            gmap[key] = { key, title: key, items: [] };
                        gmap[key].items.push(t);
                    });
                    // Sort groups by number of high-priority items
                    const sorted = Object.values(gmap).sort((a, b) => {
                        const aHi = a.items.filter(
                            (x) => x.priority === "high" || x.kind === "FIXME",
                        ).length;
                        const bHi = b.items.filter(
                            (x) => x.priority === "high" || x.kind === "FIXME",
                        ).length;
                        return bHi - aHi;
                    });
                    setGroups(sorted);
                }, [todos]);

                async function generateWithGrok() {
                    if (!repo) return;
                    setGenerating(true);
                    try {
                        const todoText = (todos || [])
                            .slice(0, 60)
                            .map(
                                (t) =>
                                    `[${t.kind}] ${t.file}:${t.line} — ${t.text}`,
                            )
                            .join("\n");
                        const prompt = `You are reviewing the TODO items from the "${repo.name}" repository.\n\nGroup these items into 4-7 logical groups suitable for individual pull requests. Each group should have a clear title and contain related tasks.\n\nTODO items:\n${todoText}\n\nReturn JSON: [{\"title\":\"...\",\"items\":[{\"file\":\"...\",\"line\":0,\"text\":\"...\",\"kind\":\"TODO\",\"priority\":\"mid\"}]}]`;
                        const res = await fetch(
                            `${API}/api/v1/chat/repos/${repo.id}`,
                            {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    message: prompt,
                                    force_remote: true,
                                }),
                            },
                        );
                        if (!res.ok) throw new Error("API error");
                        const data = await res.json();
                        // Try to parse JSON from reply
                        const match = data.reply.match(/\[[\s\S]*\]/);
                        if (match) {
                            const parsed = JSON.parse(match[0]);
                            const mapped = parsed.map((g, i) => ({
                                key: `g${i}`,
                                title: g.title || `Group ${i + 1}`,
                                items: (g.items || []).map((it, j) => ({
                                    ...it,
                                    id: `${i}-${j}`,
                                })),
                            }));
                            setGroups(mapped);
                            toast("Grok grouped your tasks", "success");
                        } else {
                            toast(
                                "Could not parse Grok response — using auto-groups",
                                "error",
                            );
                        }
                    } catch (e) {
                        toast("Grok grouping failed: " + e.message, "error");
                    } finally {
                        setGenerating(false);
                    }
                }

                function toggleItem(gkey, idx) {
                    const k = `${gkey}:${idx}`;
                    setChecked((c) => ({ ...c, [k]: !c[k] }));
                }
                function toggleGroup(gkey, items) {
                    const allOn = items.every(
                        (_, i) => checked[`${gkey}:${i}`],
                    );
                    const next = {};
                    items.forEach((_, i) => {
                        next[`${gkey}:${i}`] = !allOn;
                    });
                    setChecked((c) => ({ ...c, ...next }));
                }
                function selectAll() {
                    const next = {};
                    (groups || []).forEach((g) =>
                        g.items.forEach((_, i) => {
                            next[`${g.key}:${i}`] = true;
                        }),
                    );
                    setChecked(next);
                }
                function clearAll() {
                    setChecked({});
                }

                const selectedCount =
                    Object.values(checked).filter(Boolean).length;

                function queueSelected() {
                    const tasks = [];
                    (groups || []).forEach((g) => {
                        g.items.forEach((item, i) => {
                            if (checked[`${g.key}:${i}`]) {
                                tasks.push({
                                    ...item,
                                    group: g.title,
                                    repo: repo?.id,
                                });
                            }
                        });
                    });
                    if (!tasks.length) {
                        toast("Select at least one task", "error");
                        return;
                    }
                    onQueue(tasks);
                    onClose();
                    toast(`${tasks.length} tasks queued`, "success");
                }

                return (
                    <div
                        className="modal-overlay"
                        onClick={(e) =>
                            e.target === e.currentTarget && onClose()
                        }
                    >
                        <div className="modal review-modal">
                            <div className="modal-title">
                                🔍 Review TODOs — {repo?.name}
                                <span
                                    style={{
                                        marginLeft: 8,
                                        fontSize: 11,
                                        color: "var(--muted)",
                                        fontWeight: 400,
                                    }}
                                >
                                    {todos?.length ?? 0} items
                                </span>
                            </div>
                            <div
                                style={{
                                    display: "flex",
                                    gap: 8,
                                    marginBottom: 12,
                                }}
                            >
                                <button
                                    className="btn"
                                    onClick={generateWithGrok}
                                    disabled={generating || !repo}
                                >
                                    {generating ? (
                                        <>
                                            <span
                                                className="loading-spinner"
                                                style={{
                                                    width: 12,
                                                    height: 12,
                                                }}
                                            />{" "}
                                            Grouping…
                                        </>
                                    ) : (
                                        "✨ Group with Grok"
                                    )}
                                </button>
                                <button className="btn" onClick={selectAll}>
                                    Select All
                                </button>
                                <button className="btn" onClick={clearAll}>
                                    Clear
                                </button>
                                <div
                                    style={{
                                        marginLeft: "auto",
                                        fontSize: 12,
                                        color: "var(--cyan)",
                                        fontWeight: 600,
                                    }}
                                >
                                    {selectedCount} selected
                                </div>
                            </div>
                            <div
                                className="modal-body"
                                style={{ maxHeight: "55vh", overflowY: "auto" }}
                            >
                                {!groups ? (
                                    <div
                                        style={{
                                            display: "flex",
                                            justifyContent: "center",
                                            padding: 20,
                                        }}
                                    >
                                        <div className="loading-spinner" />
                                    </div>
                                ) : groups.length === 0 ? (
                                    <div className="empty-state">
                                        <div className="empty-icon">📭</div>
                                        <div>No TODOs found</div>
                                    </div>
                                ) : (
                                    groups.map((g) => (
                                        <div
                                            key={g.key}
                                            className="review-group"
                                        >
                                            <div
                                                className="review-group-header"
                                                onClick={() =>
                                                    toggleGroup(g.key, g.items)
                                                }
                                            >
                                                <span style={{ fontSize: 13 }}>
                                                    {g.items.every(
                                                        (_, i) =>
                                                            checked[
                                                                `${g.key}:${i}`
                                                            ],
                                                    )
                                                        ? "☑"
                                                        : "☐"}
                                                </span>
                                                <span className="review-group-title">
                                                    {g.title}
                                                </span>
                                                <span className="review-group-meta">
                                                    {g.items.length} items
                                                </span>
                                            </div>
                                            <div className="review-group-body">
                                                {g.items.map((item, i) => (
                                                    <div
                                                        key={i}
                                                        className="review-task-row"
                                                        onClick={() =>
                                                            toggleItem(g.key, i)
                                                        }
                                                    >
                                                        <div
                                                            className={`review-task-check ${checked[`${g.key}:${i}`] ? "checked" : ""}`}
                                                        >
                                                            {checked[
                                                                `${g.key}:${i}`
                                                            ]
                                                                ? "✓"
                                                                : ""}
                                                        </div>
                                                        <span
                                                            className={`review-priority ${item.priority || "low"}`}
                                                        >
                                                            {item.priority ||
                                                                "low"}
                                                        </span>
                                                        <span className="review-task-text">
                                                            {item.text ||
                                                                item.title ||
                                                                "(no text)"}
                                                        </span>
                                                        <span className="review-task-file">
                                                            {item.file}
                                                            {item.line
                                                                ? ":" +
                                                                  item.line
                                                                : ""}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                            <div
                                className="modal-actions"
                                style={{ marginTop: 14 }}
                            >
                                <button className="btn" onClick={onClose}>
                                    Cancel
                                </button>
                                <button
                                    className="btn green"
                                    onClick={queueSelected}
                                    disabled={!selectedCount}
                                >
                                    ▶ Queue {selectedCount} Task
                                    {selectedCount !== 1 ? "s" : ""}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ─── Chat Pane ────────────────────────────────────────────────────────────
            function ChatPane({ activeRepo, repos }) {
                const [messages, setMessages] = useState([
                    {
                        id: 1,
                        role: "assistant",
                        time: Date.now(),
                        content:
                            'RustAssistant online. Select a repo from the sidebar then ask anything — I\'ll use the live tree, TODOs, and symbols as context.\n\nTry: *"Review this repo and list the top tasks"* or *"Implement the RAG search stub"*',
                        model: "system",
                        quality: null,
                    },
                ]);
                const [input, setInput] = useState("");
                const [loading, setLoading] = useState(false);
                const [rounds, setRounds] = useState(1);
                const [ctxEnabled, setCtxEnabled] = useState(true);
                const [ragEnabled, setRagEnabled] = useState(true);
                const [forceRemote, setForceRemote] = useState(false);
                const bottomRef = useRef(null);
                const taRef = useRef(null);

                useEffect(() => {
                    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
                }, [messages]);

                function autoResize() {
                    const ta = taRef.current;
                    if (!ta) return;
                    ta.style.height = "auto";
                    ta.style.height = Math.min(ta.scrollHeight, 160) + "px";
                }

                const sendMessage = useCallback(
                    async (overrideText) => {
                        const text = (overrideText || input).trim();
                        if (!text || loading) return;
                        setInput("");
                        if (taRef.current) taRef.current.style.height = "42px";

                        const userMsg = {
                            id: Date.now(),
                            role: "user",
                            content: text,
                            time: Date.now(),
                        };
                        setMessages((prev) => [...prev, userMsg]);
                        setLoading(true);

                        const repoId =
                            activeRepo && ctxEnabled ? activeRepo.id : null;
                        const endpoint = repoId
                            ? `${API}/api/v1/chat/repos/${repoId}`
                            : `${API}/api/v1/chat`;

                        try {
                            const history = messages.slice(-8).map((m) => ({
                                role: m.role,
                                content: m.content,
                            }));
                            const body = {
                                message: text,
                                history,
                                force_remote: forceRemote,
                            };
                            if (!ragEnabled) body.no_cache = true; // re-use flag to signal no RAG for now

                            const res = await fetch(endpoint, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify(body),
                                signal: AbortSignal.timeout(60000),
                            });

                            if (!res.ok)
                                throw new Error(
                                    `${res.status} ${res.statusText}`,
                                );
                            const data = await res.json();

                            const assistantMsg = {
                                id: Date.now() + 1,
                                role: "assistant",
                                content: data.reply,
                                model: data.model_used,
                                taskKind: data.task_kind,
                                quality: estimateQuality(data.task_kind),
                                tokens: data.tokens_used,
                                cached: data.cached,
                                ctxInjected: data.repo_context_injected,
                                time: Date.now(),
                                showActions: true,
                            };
                            setMessages((prev) => [...prev, assistantMsg]);
                        } catch (e) {
                            setMessages((prev) => [
                                ...prev,
                                {
                                    id: Date.now() + 1,
                                    role: "assistant",
                                    time: Date.now(),
                                    content: `⚠️ Request failed: ${e.message}`,
                                    model: "error",
                                    quality: null,
                                },
                            ]);
                        } finally {
                            setLoading(false);
                        }
                    },
                    [
                        input,
                        loading,
                        messages,
                        activeRepo,
                        ctxEnabled,
                        ragEnabled,
                        forceRemote,
                    ],
                );

                const onKey = (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                };

                // Expose sendMessage for task drag-to-chat
                useEffect(() => {
                    window.__chatSend = sendMessage;
                }, [sendMessage]);

                return (
                    <div className="chat-wrap">
                        <div className="messages">
                            {messages.map((m) => (
                                <div key={m.id} className={`msg ${m.role}`}>
                                    <div className="msg-avatar">
                                        {m.role === "user" ? "👤" : "🦀"}
                                    </div>
                                    <div className="msg-body">
                                        <div className="msg-meta">
                                            {m.role === "assistant" &&
                                                m.model &&
                                                m.model !== "system" && (
                                                    <span
                                                        className={`model-chip ${m.model?.includes("qwen") || m.model?.includes("llama") ? "local" : "remote"}`}
                                                    >
                                                        {m.model?.includes(
                                                            "qwen",
                                                        )
                                                            ? "⚡"
                                                            : "🌐"}{" "}
                                                        {m.model}
                                                    </span>
                                                )}
                                            {m.taskKind && (
                                                <span
                                                    style={{
                                                        fontSize: 10,
                                                        color: "var(--muted)",
                                                    }}
                                                >
                                                    {m.taskKind}
                                                </span>
                                            )}
                                            {m.cached && (
                                                <span
                                                    style={{
                                                        fontSize: 9,
                                                        background:
                                                            "rgba(16,185,129,.15)",
                                                        color: "var(--green)",
                                                        padding: "1px 5px",
                                                        borderRadius: 4,
                                                    }}
                                                >
                                                    CACHED
                                                </span>
                                            )}
                                            {m.ctxInjected && (
                                                <span
                                                    style={{
                                                        fontSize: 9,
                                                        background:
                                                            "rgba(167,139,250,.15)",
                                                        color: "var(--purple)",
                                                        padding: "1px 5px",
                                                        borderRadius: 4,
                                                    }}
                                                >
                                                    CTX
                                                </span>
                                            )}
                                            {m.tokens && (
                                                <span
                                                    style={{
                                                        fontSize: 9,
                                                        color: "var(--muted)",
                                                    }}
                                                >
                                                    {m.tokens}t
                                                </span>
                                            )}
                                            <span
                                                style={{
                                                    fontSize: 10,
                                                    color: "var(--muted)",
                                                }}
                                            >
                                                {fmtTime(m.time)}
                                            </span>
                                        </div>
                                        <div className="msg-bubble">
                                            <MsgContent text={m.content} />
                                        </div>
                                        {m.quality && <QBar pct={m.quality} />}
                                        {m.showActions && (
                                            <div className="msg-actions">
                                                <button
                                                    className="msg-act-btn"
                                                    onClick={() =>
                                                        navigator.clipboard.writeText(
                                                            m.content,
                                                        )
                                                    }
                                                >
                                                    Copy
                                                </button>
                                                <button
                                                    className="msg-act-btn green"
                                                    onClick={() =>
                                                        sendMessage(
                                                            "Refine this: " +
                                                                m.content.slice(
                                                                    0,
                                                                    200,
                                                                ),
                                                        )
                                                    }
                                                >
                                                    Refine
                                                </button>
                                                <button
                                                    className="msg-act-btn"
                                                    onClick={() =>
                                                        sendMessage(
                                                            "Explain the approach used above in detail.",
                                                        )
                                                    }
                                                >
                                                    Explain
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {loading && (
                                <div className="msg assistant">
                                    <div className="msg-avatar">🦀</div>
                                    <div className="msg-body">
                                        <div
                                            className="msg-bubble"
                                            style={{ padding: "10px 14px" }}
                                        >
                                            <div className="typing-indicator">
                                                <div className="typing-dot" />
                                                <div className="typing-dot" />
                                                <div className="typing-dot" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div className="scroll-anchor" ref={bottomRef} />
                        </div>

                        <div className="chat-input-area">
                            <div className="chat-options">
                                <div
                                    className={`chat-toggle ${ctxEnabled ? "on" : ""}`}
                                    onClick={() => setCtxEnabled((v) => !v)}
                                >
                                    <div className="dot" />{" "}
                                    {activeRepo
                                        ? `ctx: ${activeRepo.name}`
                                        : "no repo"}
                                </div>
                                <div
                                    className={`chat-toggle ${ragEnabled ? "on" : ""}`}
                                    onClick={() => setRagEnabled((v) => !v)}
                                >
                                    <div className="dot" /> RAG
                                </div>
                                <div
                                    className={`chat-toggle ${forceRemote ? "on" : ""}`}
                                    onClick={() => setForceRemote((v) => !v)}
                                >
                                    <div className="dot" /> force Grok
                                </div>
                                <div className="rounds-row">
                                    <button
                                        className="rounds-btn"
                                        onClick={() =>
                                            setRounds((r) => Math.max(1, r - 1))
                                        }
                                    >
                                        −
                                    </button>
                                    <span>×{rounds}</span>
                                    <button
                                        className="rounds-btn"
                                        onClick={() =>
                                            setRounds((r) => Math.min(5, r + 1))
                                        }
                                    >
                                        +
                                    </button>
                                </div>
                            </div>
                            <div className="input-row">
                                <textarea
                                    ref={taRef}
                                    className="chat-textarea"
                                    value={input}
                                    onChange={(e) => {
                                        setInput(e.target.value);
                                        autoResize();
                                    }}
                                    onKeyDown={onKey}
                                    placeholder={
                                        activeRepo && ctxEnabled
                                            ? `Ask about ${activeRepo.name}… (tree + todos + symbols injected)`
                                            : "Ask RustAssistant anything…"
                                    }
                                    disabled={loading}
                                />
                                <button
                                    className="send-btn"
                                    onClick={() => sendMessage()}
                                    disabled={loading || !input.trim()}
                                >
                                    {loading ? (
                                        <div
                                            className="loading-spinner"
                                            style={{ width: 16, height: 16 }}
                                        />
                                    ) : (
                                        "↑"
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ─── Tasks Pane ───────────────────────────────────────────────────────────
            function TasksPane({
                activeRepo,
                queuedTasks,
                setQueuedTasks,
                toast,
            }) {
                const COLS = [
                    { id: "staging", label: "Staging", color: "var(--cyan)" },
                    { id: "queue", label: "Queue", color: "var(--amber)" },
                    { id: "done", label: "Done", color: "var(--green)" },
                ];
                const [tasks, setTasks] = useState([]);
                const [loading, setLoading] = useState(false);
                const [filter, setFilter] = useState("all");

                // Load todos for active repo
                useEffect(() => {
                    if (!activeRepo) {
                        setTasks([]);
                        return;
                    }
                    setLoading(true);
                    fetch(`${API}/api/v1/repos/${activeRepo.id}/todos`)
                        .then((r) => r.json())
                        .then((data) => {
                            const arr = Array.isArray(data) ? data : [];
                            const mapped = arr.map((t, i) => ({
                                id: `todo-${i}`,
                                title: t.text || t.content || "(no text)",
                                kind: (t.kind || "TODO").toUpperCase(),
                                file: t.file || "",
                                line: t.line || 0,
                                priority:
                                    t.priority ||
                                    (t.kind === "FIXME" ? "high" : "mid"),
                                col: "staging",
                                repo: activeRepo.id,
                            }));
                            setTasks(mapped);
                        })
                        .catch(() => setTasks([]))
                        .finally(() => setLoading(false));
                }, [activeRepo?.id]);

                // Merge queued tasks into state
                useEffect(() => {
                    if (queuedTasks.length) {
                        setTasks((prev) => {
                            const ids = new Set(prev.map((t) => t.id));
                            const newOnes = queuedTasks
                                .filter(
                                    (t) =>
                                        !ids.has(
                                            t.id || `q-${t.file}-${t.line}`,
                                        ),
                                )
                                .map((t, i) => ({
                                    id: t.id || `q-${i}-${Date.now()}`,
                                    title: t.text || t.title || "(no text)",
                                    kind: (t.kind || "TODO").toUpperCase(),
                                    file: t.file || "",
                                    line: t.line || 0,
                                    priority: t.priority || "mid",
                                    col: "queue",
                                    repo: t.repo || activeRepo?.id,
                                }));
                            return [...prev, ...newOnes];
                        });
                        setQueuedTasks([]);
                    }
                }, [queuedTasks]);

                function moveTask(id, col) {
                    setTasks((prev) =>
                        prev.map((t) => (t.id === id ? { ...t, col } : t)),
                    );
                    if (col === "done") toast("Task marked done", "success");
                }

                function sendToChat(task) {
                    const msg = `[${task.kind}] ${task.file}:${task.line} — ${task.title}`;
                    if (window.__chatSend) window.__chatSend(msg);
                    toast("Task sent to chat", "info");
                }

                const filtered = useMemo(() => {
                    if (filter === "all") return tasks;
                    if (filter === "high")
                        return tasks.filter((t) => t.priority === "high");
                    return tasks.filter((t) => t.kind === filter);
                }, [tasks, filter]);

                const counts = useMemo(
                    () => ({
                        high: tasks.filter((t) => t.priority === "high").length,
                        mid: tasks.filter((t) => t.priority === "mid").length,
                        low: tasks.filter((t) => t.priority === "low").length,
                        sel: tasks.filter((t) => t.col === "queue").length,
                    }),
                    [tasks],
                );

                return (
                    <div className="tasks-wrap">
                        <div className="pane-toolbar">
                            <h2>
