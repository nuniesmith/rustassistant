<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>🦀 RustAssistant</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
        />
        <style>
            :root {
                --bg: #0d1117;
                --surface: #161b22;
                --surface2: #21262d;
                --surface3: #2d333b;
                --border: #30363d;
                --border2: #444c56;
                --accent: #f78166;
                --accent2: #58a6ff;
                --green: #3fb950;
                --yellow: #d29922;
                --red: #f85149;
                --purple: #bc8cff;
                --orange: #e3b341;
                --text: #e6edf3;
                --text2: #c9d1d9;
                --muted: #8b949e;
                --radius: 8px;
                --radius-sm: 5px;
                --sidebar-w: 260px;
                --topbar-h: 52px;
                --font-mono: "JetBrains Mono", "Cascadia Code", monospace;
                --shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                font-size: 14px;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background:
                    radial-gradient(
                        ellipse 60% 40% at 20% 0%,
                        rgba(247, 129, 102, 0.06) 0%,
                        transparent 70%
                    ),
                    radial-gradient(
                        ellipse 50% 30% at 80% 100%,
                        rgba(88, 166, 255, 0.05) 0%,
                        transparent 70%
                    );
                pointer-events: none;
                z-index: 0;
            }

            body::after {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: var(--topbar-h);
                background: linear-gradient(
                    90deg,
                    rgba(247, 129, 102, 0.08) 0%,
                    transparent 40%,
                    rgba(88, 166, 255, 0.06) 100%
                );
                pointer-events: none;
                z-index: 0;
            }

            #root {
                display: contents;
            }

            /* ── Topbar ───────────────────────────────────────────────── */
            .topbar {
                height: var(--topbar-h);
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                padding: 0 18px;
                gap: 14px;
                flex-shrink: 0;
                z-index: 20;
                position: relative;
            }
            .topbar-logo {
                font-size: 18px;
                font-weight: 700;
                letter-spacing: -0.5px;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .topbar-logo .crab {
                font-size: 22px;
            }
            .topbar-sep {
                flex: 1;
            }
            .topbar-status {
                display: flex;
                align-items: center;
                gap: 7px;
                font-size: 12px;
                color: var(--muted);
            }
            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--green);
                box-shadow: 0 0 6px var(--green);
                flex-shrink: 0;
            }
            .status-dot.offline {
                background: var(--red);
                box-shadow: 0 0 6px var(--red);
            }
            .status-dot.loading {
                background: var(--yellow);
                box-shadow: 0 0 6px var(--yellow);
                animation: blink 1s infinite;
            }
            @keyframes blink {
                50% {
                    opacity: 0.3;
                }
            }
            .topbar-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .model-badge {
                font-size: 11px;
                font-weight: 600;
                padding: 3px 9px;
                border-radius: 20px;
                border: 1px solid var(--border);
                font-family: var(--font-mono);
            }
            .model-badge.local {
                color: var(--green);
                border-color: var(--green);
                background: rgba(63, 185, 80, 0.08);
            }
            .model-badge.remote {
                color: var(--accent2);
                border-color: var(--accent2);
                background: rgba(88, 166, 255, 0.08);
            }

            /* ── Layout ───────────────────────────────────────────────── */
            .layout {
                flex: 1;
                display: flex;
                overflow: hidden;
                position: relative;
                z-index: 1;
            }

            /* ── Sidebar ──────────────────────────────────────────────── */
            .sidebar {
                width: var(--sidebar-w);
                background: var(--surface);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                flex-shrink: 0;
                padding: 12px 0;
            }
            .sidebar-section {
                margin-bottom: 8px;
            }
            .sidebar-label {
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.8px;
                color: var(--muted);
                padding: 4px 14px 6px;
            }
            .repo-item {
                display: flex;
                align-items: center;
                gap: 9px;
                padding: 7px 14px;
                cursor: pointer;
                border-radius: 0;
                transition: background 0.15s;
            }
            .repo-item:hover {
                background: var(--surface2);
            }
            .repo-item.active {
                background: var(--surface3);
            }
            .repo-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }
            .repo-name {
                flex: 1;
                font-size: 13px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .repo-count {
                font-size: 11px;
                font-family: var(--font-mono);
                background: var(--surface3);
                padding: 1px 6px;
                border-radius: 10px;
                color: var(--muted);
            }
            .add-repo-btn {
                margin: 4px 10px;
                padding: 7px 12px;
                background: transparent;
                border: 1px dashed var(--border2);
                border-radius: var(--radius-sm);
                color: var(--muted);
                cursor: pointer;
                font-size: 12px;
                width: calc(100% - 20px);
                text-align: left;
                transition: all 0.15s;
            }
            .add-repo-btn:hover {
                border-color: var(--accent2);
                color: var(--accent2);
                background: rgba(88, 166, 255, 0.04);
            }

            .queue-summary {
                padding: 10px 14px 4px;
            }
            .queue-ring-row {
                display: flex;
                gap: 14px;
                align-items: center;
            }
            .queue-ring {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 3px;
            }
            .ring-svg {
                width: 44px;
                height: 44px;
            }
            .ring-label {
                font-size: 10px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .ring-value {
                font-size: 13px;
                font-weight: 700;
                font-family: var(--font-mono);
            }

            .nav-tabs {
                display: flex;
                flex-direction: column;
                gap: 2px;
                padding: 6px 8px;
            }
            .nav-tab {
                display: flex;
                align-items: center;
                gap: 9px;
                padding: 8px 10px;
                border-radius: var(--radius-sm);
                cursor: pointer;
                color: var(--muted);
                transition: all 0.15s;
                font-size: 13px;
            }
            .nav-tab:hover {
                background: var(--surface2);
                color: var(--text2);
            }
            .nav-tab.active {
                background: var(--surface3);
                color: var(--text);
                font-weight: 500;
            }
            .nav-tab .tab-icon {
                font-size: 16px;
                flex-shrink: 0;
            }
            .nav-tab .tab-badge {
                margin-left: auto;
                font-size: 11px;
                font-family: var(--font-mono);
                background: var(--surface3);
                padding: 1px 6px;
                border-radius: 10px;
                color: var(--muted);
            }
            .nav-tab.active .tab-badge {
                background: var(--accent);
                color: #fff;
            }

            /* ── Main area ────────────────────────────────────────────── */
            .main {
                flex: 1;
                overflow: hidden;
                display: flex;
            }

            /* ── Chat pane ────────────────────────────────────────────── */
            .chat-pane {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .chat-header {
                padding: 12px 18px 10px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 10px;
                flex-shrink: 0;
            }
            .chat-header-title {
                font-weight: 600;
                font-size: 14px;
            }
            .ctx-pill {
                font-size: 11px;
                padding: 2px 9px;
                border-radius: 12px;
                border: 1px solid var(--border2);
                color: var(--muted);
                cursor: pointer;
                transition: all 0.15s;
            }
            .ctx-pill.active {
                border-color: var(--green);
                color: var(--green);
                background: rgba(63, 185, 80, 0.08);
            }
            .rounds-control {
                display: flex;
                align-items: center;
                gap: 5px;
                margin-left: auto;
                font-size: 12px;
                color: var(--muted);
            }
            .round-btn {
                width: 26px;
                height: 26px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
                cursor: pointer;
                font-size: 14px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.15s;
            }
            .round-btn:hover {
                background: var(--surface3);
                border-color: var(--border2);
            }

            .messages {
                flex: 1;
                overflow-y: auto;
                padding: 16px 18px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .messages::-webkit-scrollbar {
                width: 5px;
            }
            .messages::-webkit-scrollbar-track {
                background: transparent;
            }
            .messages::-webkit-scrollbar-thumb {
                background: var(--border2);
                border-radius: 3px;
            }

            .msg {
                display: flex;
                gap: 10px;
                max-width: 100%;
            }
            .msg.user {
                flex-direction: row-reverse;
            }
            .msg-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                font-size: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                border: 1px solid var(--border);
            }
            .msg.assistant .msg-avatar {
                background: rgba(247, 129, 102, 0.12);
            }
            .msg.user .msg-avatar {
                background: rgba(88, 166, 255, 0.12);
            }
            .msg-body {
                max-width: 80%;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .msg-meta {
                font-size: 11px;
                color: var(--muted);
            }
            .msg.user .msg-meta {
                text-align: right;
            }
            .msg-bubble {
                padding: 10px 14px;
                border-radius: var(--radius);
                line-height: 1.55;
                font-size: 13.5px;
            }
            .msg.assistant .msg-bubble {
                background: var(--surface);
                border: 1px solid var(--border);
                border-top-left-radius: 2px;
            }
            .msg.user .msg-bubble {
                background: rgba(88, 166, 255, 0.1);
                border: 1px solid rgba(88, 166, 255, 0.25);
                border-top-right-radius: 2px;
            }
            .msg-bubble pre {
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 12px;
                margin: 8px 0;
                overflow-x: auto;
                font-family: var(--font-mono);
                font-size: 12.5px;
            }
            .msg-bubble code {
                font-family: var(--font-mono);
                font-size: 12.5px;
            }
            .msg-actions {
                display: flex;
                gap: 6px;
                margin-top: 4px;
            }
            .msg-action-btn {
                font-size: 11px;
                padding: 3px 9px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                cursor: pointer;
                color: var(--muted);
                transition: all 0.15s;
            }
            .msg-action-btn:hover {
                color: var(--text2);
                border-color: var(--border2);
            }
            .msg-action-btn.green:hover {
                color: var(--green);
                border-color: var(--green);
            }

            .quality-bar {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-top: 5px;
            }
            .quality-track {
                height: 4px;
                flex: 1;
                background: var(--surface3);
                border-radius: 2px;
                overflow: hidden;
            }
            .quality-fill {
                height: 100%;
                border-radius: 2px;
                transition: width 0.6s;
            }
            .quality-label {
                font-size: 11px;
                font-family: var(--font-mono);
                color: var(--muted);
                min-width: 32px;
            }

            .chat-input-area {
                padding: 12px 18px 14px;
                border-top: 1px solid var(--border);
                flex-shrink: 0;
            }
            .chat-input-row {
                display: flex;
                gap: 8px;
                align-items: flex-end;
            }
            .chat-textarea {
                flex: 1;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--text);
                padding: 10px 14px;
                font-size: 13.5px;
                font-family: inherit;
                resize: none;
                min-height: 42px;
                max-height: 160px;
                transition: border-color 0.15s;
                line-height: 1.5;
            }
            .chat-textarea:focus {
                outline: none;
                border-color: var(--accent2);
            }
            .chat-textarea::placeholder {
                color: var(--muted);
            }
            .send-btn {
                width: 42px;
                height: 42px;
                background: var(--accent);
                border: none;
                border-radius: var(--radius);
                color: #fff;
                font-size: 18px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.15s;
                flex-shrink: 0;
            }
            .send-btn:hover {
                background: #ff9580;
            }
            .send-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            /* ── Tasks pane ───────────────────────────────────────────── */
            .tasks-pane {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .pane-header {
                padding: 12px 18px 10px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 10px;
                flex-shrink: 0;
            }
            .pane-title {
                font-weight: 600;
                font-size: 14px;
            }
            .pane-actions {
                margin-left: auto;
                display: flex;
                gap: 8px;
            }
            .pane-btn {
                font-size: 12px;
                padding: 5px 12px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                cursor: pointer;
                color: var(--text2);
                transition: all 0.15s;
            }
            .pane-btn:hover {
                border-color: var(--border2);
                background: var(--surface3);
            }
            .pane-btn.primary {
                background: var(--accent);
                border-color: var(--accent);
                color: #fff;
            }
            .pane-btn.primary:hover {
                background: #ff9580;
            }

            .tasks-columns {
                flex: 1;
                display: flex;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 16px;
                gap: 14px;
            }
            .tasks-col {
                min-width: 260px;
                flex: 1;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .tasks-col:last-child {
                min-width: 280px;
            }
            .col-header {
                padding: 10px 14px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .col-title {
                font-size: 13px;
                font-weight: 600;
            }
            .col-badge {
                font-size: 11px;
                font-family: var(--font-mono);
                padding: 1px 7px;
                border-radius: 10px;
                background: var(--surface3);
                color: var(--muted);
            }
            .col-items {
                flex: 1;
                overflow-y: auto;
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .col-items::-webkit-scrollbar {
                width: 4px;
            }
            .col-items::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 2px;
            }

            .task-card {
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 11px;
                cursor: pointer;
                position: relative;
                transition: all 0.15s;
                padding-left: 16px;
            }
            .task-card::before {
                content: "";
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 3px;
                border-radius: 3px 0 0 3px;
                background: var(--border2);
            }
            .task-card:hover {
                border-color: var(--border2);
                background: var(--surface3);
            }
            .task-card.priority-high::before {
                background: var(--red);
            }
            .task-card.priority-mid::before {
                background: var(--yellow);
            }
            .task-card.priority-low::before {
                background: var(--green);
            }
            .task-card.in-queue {
                border-color: rgba(88, 166, 255, 0.4);
            }
            .task-card.in-queue::before {
                background: var(--accent2);
            }

            .task-title {
                font-size: 12.5px;
                line-height: 1.45;
                margin-bottom: 6px;
                color: var(--text2);
            }
            .task-meta {
                display: flex;
                align-items: center;
                gap: 5px;
                flex-wrap: wrap;
            }
            .task-tag {
                font-size: 10.5px;
                padding: 1px 6px;
                border-radius: 3px;
                font-family: var(--font-mono);
            }
            .tag-todo {
                background: rgba(88, 166, 255, 0.15);
                color: var(--accent2);
            }
            .tag-stub {
                background: rgba(188, 140, 255, 0.15);
                color: var(--purple);
            }
            .tag-fixme {
                background: rgba(248, 81, 73, 0.15);
                color: var(--red);
            }
            .tag-feat {
                background: rgba(63, 185, 80, 0.15);
                color: var(--green);
            }
            .task-file {
                font-size: 10.5px;
                color: var(--muted);
                font-family: var(--font-mono);
                margin-left: auto;
            }
            .task-move-btn {
                display: none;
                position: absolute;
                right: 7px;
                top: 7px;
                font-size: 11px;
                padding: 2px 7px;
                background: var(--accent2);
                color: #fff;
                border: none;
                border-radius: 3px;
                cursor: pointer;
            }
            .task-card:hover .task-move-btn {
                display: block;
            }

            /* ── Queue pane ───────────────────────────────────────────── */
            .queue-pane {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .queue-items {
                flex: 1;
                overflow-y: auto;
                padding: 12px 16px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .queue-item {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 12px 14px;
                display: flex;
                gap: 12px;
                align-items: flex-start;
                transition: border-color 0.2s;
            }
            .queue-item.running {
                border-color: var(--accent2);
                background: rgba(88, 166, 255, 0.04);
            }
            .queue-item.done {
                border-color: var(--green);
                background: rgba(63, 185, 80, 0.04);
                opacity: 0.8;
            }
            .queue-item.failed {
                border-color: var(--red);
                background: rgba(248, 81, 73, 0.04);
            }

            .queue-num {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                border: 2px solid var(--border2);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                font-weight: 700;
                font-family: var(--font-mono);
                color: var(--muted);
                flex-shrink: 0;
            }
            .queue-item.running .queue-num {
                border-color: var(--accent2);
                color: var(--accent2);
                animation: spin 1.5s linear infinite;
            }
            .queue-item.done .queue-num {
                border-color: var(--green);
                color: var(--green);
            }
            .queue-item.failed .queue-num {
                border-color: var(--red);
                color: var(--red);
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .queue-info {
                flex: 1;
                min-width: 0;
            }
            .queue-task-name {
                font-size: 13px;
                font-weight: 500;
                margin-bottom: 4px;
            }
            .queue-task-meta {
                font-size: 11px;
                color: var(--muted);
                display: flex;
                gap: 10px;
                align-items: center;
                flex-wrap: wrap;
                margin-bottom: 6px;
            }
            .queue-rounds {
                display: flex;
                gap: 3px;
                margin-bottom: 6px;
            }
            .round-pip {
                width: 16px;
                height: 5px;
                border-radius: 3px;
                background: var(--surface3);
            }
            .round-pip.done {
                background: var(--green);
            }
            .round-pip.running {
                background: var(--accent2);
                animation: blink 0.8s infinite;
            }
            .round-pip.target {
                background: var(--border2);
            }

            .queue-quality {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .quality-pct {
                font-size: 11px;
                font-family: var(--font-mono);
                color: var(--muted);
                min-width: 34px;

            .queue-run-controls {

                font-weight: 600;

            .run-big-btn.start {
                background: var(--green);
                color: #0d1117;
            }
            .run-big-btn.start:hover {
                background: #52d16a;
            }
            .run-big-btn.stop {
                background: var(--red);
                color: #fff;
            }
            .run-big-btn.stop:hover {

            .qstat {

            .qstat-val {
                font-size: 18px;

            .qstat-label {
                font-size: 10px;
                color: var(--muted);

            /* ── PR pane ──────────────────────────────────────────────── */
            .pr-pane {
                flex: 1;
                display: flex;
                flex-direction: column;

            }
            .pr-list {
                flex: 1;
                overflow-y: auto;
                padding: 12px 16px;

            .pr-card {
                background: var(--surface);

            }

            /* ── Modal ────────────────────────────────────────────────── */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.65);
                z-index: 100;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .modal {
                background: var(--surface);
                border: 1px solid var(--border2);
                border-radius: 12px;
                padding: 24px;
                width: 420px;
                max-width: 95vw;
                box-shadow: var(--shadow);

            .modal-title {
                font-size: 16px;
                font-weight: 700;
                margin-bottom: 18px;
            }
            .modal-field {

            }
            .modal-label {

            }
            .modal-input {

                border-radius: var(--radius-sm);

            /* ── Typing indicator ─────────────────────────────────────── */
            .typing-indicator {
                display: flex;

                border-radius: 50%;

            }
            .typing-dot:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing-dot:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes bounce {
                0%,
                60%,
                100% {
                    transform: translateY(0);

            /* ── Empty state ──────────────────────────────────────────── */

            input[type="checkbox"] {

            }

            }
        </style>

            const SEED_PRS = [
                {

                    files: ["src/repo_sync.rs", "src/model_router.rs"],

                {

            ];

            // ── Quality bar ──────────────────────────────────────────────────────────
            function QualityBar({ pct = 0 }) {
                const color =
                    pct >= 80
                        ? "var(--green)"
                        : pct >= 60
                          ? "var(--yellow)"
                          : "var(--red)";
                return (
                    <div className="quality-bar">
                        <div className="quality-track">
                            <div
                                className="quality-fill"
                                style={{ width: `${pct}%`, background: color }}
                            />
                        </div>
                        <span className="quality-label">{pct}%</span>
                    </div>
                );
            }

            // ── Ring chart (SVG) ─────────────────────────────────────────────────────
            function RingChart({ value, max, color, label }) {
                const r = 16,
                    cx = 22,
                    cy = 22;
                const circ = 2 * Math.PI * r;
                const dash = max > 0 ? (value / max) * circ : 0;
                return (
                    <div className="queue-ring">
                        <svg className="ring-svg" viewBox="0 0 44 44">
                            <circle
                                cx={cx}
                                cy={cy}
                                r={r}
                                fill="none"
                                stroke="var(--surface3)"
                                strokeWidth="4"
                            />
                            <circle
                                cx={cx}
                                cy={cy}
                                r={r}
                                fill="none"
                                stroke={color}
                                strokeWidth="4"
                                strokeDasharray={`${dash} ${circ}`}
                                strokeLinecap="round"
                                transform="rotate(-90 22 22)"
                            />
                            <text
                                x={cx}
                                y={cy + 1}
                                textAnchor="middle"
                                dominantBaseline="middle"
                                fill={color}
                                fontSize="9"
                                fontFamily="var(--font-mono)"
                                fontWeight="700"
                            >
                                {value}
                            </text>
                        </svg>
                        <span className="ring-label">{label}</span>
                    </div>
                );
            }

            // ── Chat pane ────────────────────────────────────────────────────────────
            function ChatPane({ activeRepo }) {
                const [messages, setMessages] = useState([
                    {
                        id: 1,
                        role: "assistant",
                        content:
                            "Hey! I'm wired to **Grok** (remote) and **Qwen2.5-Coder** (local). Ask me anything about your repo — I'll route scaffold/stub tasks to the local model and complex reasoning to Grok.",
                        model: "grok-4-1-fast-reasoning",
                        time: "now",
                        quality: null,
                    },
                ]);
                const [input, setInput] = useState("");
                const [loading, setLoading] = useState(false);
                const [rounds, setRounds] = useState(3);
                const [ctxEnabled, setCtxEnabled] = useState(true);
                const bottomRef = useRef(null);
                const textareaRef = useRef(null);

                useEffect(() => {
                    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
                }, [messages]);

                const autoResize = useCallback(() => {
                    const ta = textareaRef.current;
                    if (!ta) return;
                    ta.style.height = "auto";
                    ta.style.height = Math.min(ta.scrollHeight, 160) + "px";
                }, []);

                const send = useCallback(async () => {
                    const text = input.trim();
                    if (!text || loading) return;
                    setInput("");
                    if (textareaRef.current)
                        textareaRef.current.style.height = "auto";

                    const userMsg = {
                        id: Date.now(),
                        role: "user",
                        content: text,
                        time: new Date().toLocaleTimeString(),
                    };
                    setMessages((prev) => [...prev, userMsg]);
                    setLoading(true);

                    let reply = null;
                    try {
                        const repoId =
                            ctxEnabled && activeRepo ? activeRepo.id : null;
                        const endpoint = repoId
                            ? `${OLLAMA_BASE}/chat/repos/${repoId}`
                            : `${OLLAMA_BASE}/chat`;

                        const res = await fetch(endpoint, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                message: text,
                                history: messages
                                    .slice(-10)
                                    .map((m) => ({
                                        role: m.role,
                                        content: m.content,
                                    })),
                            }),
                            signal: AbortSignal.timeout(30000),
                        });
                        const data = await res.json();
                        reply = {
                            content:
                                data.reply || data.content || "(no response)",
                            model: data.model_used || "unknown",
                            taskKind: data.task_kind || "Unknown",
                            quality: data.tokens_used
                                ? Math.min(
                                      95,
                                      60 + Math.floor(data.tokens_used / 50),
                                  )
                                : null,
                        };
                    } catch (err) {
                        // Fallback: simulate response locally when backend isn't up
                        reply = await simulateResponse(text);
                    }

                    const assistantMsg = {
                        id: Date.now() + 1,
                        role: "assistant",
                        content: reply.content,
                        model: reply.model,
                        taskKind: reply.taskKind,
                        quality: reply.quality,
                        time: new Date().toLocaleTimeString(),
                        showActions: true,
                    };
                    setMessages((prev) => [...prev, assistantMsg]);
                    setLoading(false);
                }, [input, loading, messages, ctxEnabled, activeRepo]);

                const onKey = (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        send();
                    }
                };

                return (
                    <div className="chat-pane">
                        <div className="chat-header">
                            <span className="chat-header-title">💬 Chat</span>
                            {activeRepo && (
                                <span
                                    className={`ctx-pill${ctxEnabled ? " active" : ""}`}
                                    onClick={() => setCtxEnabled((v) => !v)}
                                    title="Toggle repo context injection"
                                >
                                    {ctxEnabled ? "🔗" : "⛓️"} {activeRepo.name}
                                </span>
                            )}
                            <div className="rounds-control">
                                <button
                                    className="round-btn"
                                    onClick={() =>
                                        setRounds((r) => Math.max(1, r - 1))
                                    }
                                >
                                    −
                                </button>
                                <span
                                    style={{
                                        color: "var(--text2)",
                                        fontFamily: "var(--font-mono)",
                                        minWidth: 60,
                                        textAlign: "center",
                                    }}
                                >
                                    {rounds} rounds
                                </span>
                                <button
                                    className="round-btn"
                                    onClick={() =>
                                        setRounds((r) => Math.min(10, r + 1))
                                    }
                                >
                                    +
                                </button>
                            </div>
                        </div>

                        <div className="messages">
                            {messages.map((msg) => (
                                <div key={msg.id} className={`msg ${msg.role}`}>
                                    <div className="msg-avatar">
                                        {msg.role === "assistant" ? "🦀" : "👤"}
                                    </div>
                                    <div className="msg-body">
                                        <div className="msg-meta">
                                            {msg.role === "assistant" ? (
                                                <>
                                                    <span
                                                        style={{
                                                            color: "var(--accent)",
                                                            fontWeight: 600,
                                                        }}
                                                    >
                                                        rustassistant
                                                    </span>{" "}
                                                    ·{" "}
                                                    <span
                                                        style={{
                                                            fontFamily:
                                                                "var(--font-mono)",
                                                            fontSize: 11,
                                                        }}
                                                    >
                                                        {msg.model}
                                                    </span>{" "}
                                                    · {msg.time}
                                                </>
                                            ) : (
                                                <>
                                                    <span
                                                        style={{
                                                            color: "var(--accent2)",
                                                        }}
                                                    >
                                                        you
                                                    </span>{" "}
                                                    · {msg.time}
                                                </>
                                            )}
                                        </div>
                                        <div className="msg-bubble">
                                            <MsgContent content={msg.content} />
                                        </div>
                                        {msg.quality !== null &&
                                            msg.quality !== undefined && (
                                                <QualityBar pct={msg.quality} />
                                            )}
                                        {msg.showActions && (
                                            <div className="msg-actions">
                                                <button
                                                    className="msg-action-btn"
                                                    onClick={() =>
                                                        navigator.clipboard?.writeText(
                                                            msg.content,
                                                        )
                                                    }
                                                >
                                                    📋 copy
                                                </button>
                                                <button className="msg-action-btn green">
                                                    ✅ apply
                                                </button>
                                                <button className="msg-action-btn">
                                                    🔁 retry
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {loading && (
                                <div className="msg assistant">
                                    <div className="msg-avatar">🦀</div>
                                    <div className="msg-body">
                                        <div className="msg-bubble">
                                            <div className="typing-indicator">
                                                <div className="typing-dot" />
                                                <div className="typing-dot" />

                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div ref={bottomRef} className="scroll-anchor" />

                        <div className="chat-input-area">
                            <div className="chat-input-row">
                                <textarea
                                    ref={textareaRef}
                                    className="chat-textarea"
                                    placeholder={`Ask about ${activeRepo ? activeRepo.name : "your repos"}, request a scaffold, review code…`}
                                    value={input}
                                    onChange={(e) => {
                                        setInput(e.target.value);
                                        autoResize();
                                    }}
                                    onKeyDown={onKey}
                                    rows={1}
                                />
                                <button
                                    className="send-btn"
                                    onClick={send}
                                    disabled={loading || !input.trim()}
                                >
                                    ➤
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            function MsgContent({ content }) {
                const parts = [];
                const lines = content.split("\n");
                let inCode = false,
                    lang = "",
                    code = [];
                lines.forEach((line, i) => {
                    if (line.startsWith("```")) {
                        if (!inCode) {
                            inCode = true;
                            lang = line.slice(3);
                            code = [];
                        } else {
                            parts.push(
                                <pre key={i}>
                                    <code style={{ whiteSpace: "pre-wrap" }}>
                                        {code.join("\n")}
                                    </code>
                                </pre>,
                            );
                            inCode = false;
                        }
                    } else if (inCode) {
                        code.push(line);
                    } else {
                        parts.push(
                            <span key={i}>
                                {line}
                                <br />
                            </span>,
                        );
                    }
                });
                return <>{parts}</>;
            }

            function estimateQuality(taskKind) {
                const map = {
                    ScaffoldStub: 80,
                    TodoTagging: 75,
                    SymbolExtraction: 70,
                    RepoQuestion: 65,
                    CodeReview: 88,
                };
                return map[taskKind] || 60;
            }

            async function simulateResponse(prompt) {
                const lower = prompt.toLowerCase();
                await new Promise((r) =>
                    setTimeout(r, 900 + Math.random() * 800),
                );

                if (
                    lower.includes("stub") ||
                    lower.includes("scaffold") ||
                    lower.includes("generate")
                ) {
                    return {
                        content:
                            '// STUB: generated by rustassistant\n// TODO: implement actual logic\npub async fn example_handler(\n    State(state): State<AppState>,\n    Json(req): Json<Request>,\n) -> impl IntoResponse {\n    unimplemented!("stub: replace with real implementation")\n}',
                        model: "qwen2.5-coder:7b",
                        taskKind: "ScaffoldStub",
                        quality: 80,
                        showActions: true,
                    };
                }
                if (lower.includes("todo") || lower.includes("fixme")) {
                    return {
                        content:
                            "I found several TODOs in `src/api/repos.rs`:\n- L42: `// TODO: wire real Ollama client`\n- L67: `// TODO: add Redis cache check`\n- L95: `// TODO: populate token count`\n\nWant me to generate stubs for any of these?",
                        model: "qwen2.5-coder:7b",
                        taskKind: "TodoTagging",
                        quality: 75,
                        showActions: true,
                    };
                }
                if (
                    lower.includes("review") ||
                    lower.includes("correct") ||
                    lower.includes("check")
                ) {
                    return {
                        content:
                            "**Code Review** (via Grok)\n\nThe `handle_chat` fn looks solid. A few notes:\n1. The `call_model_stub` should be replaced with real dispatch — it currently just returns a placeholder string.\n2. Consider adding a Redis cache key as `hash(repo_id + prompt)` before calling the model.\n3. Error handling in `serve_cache_file` could propagate the IO error more specifically.",
                        model: "grok-4-1-fast-reasoning",
                        taskKind: "CodeReview",
                        quality: 88,
                        showActions: true,
                    };
                }
                return {

            // ── Queue pane ───────────────────────────────────────────────────────────
            function QueuePane({ tasks }) {
                const [running, setRunning] = useState(false);
                const [activeIdx, setActiveIdx] = useState(-1);
                const [runLog, setRunLog] = useState([]);
                const [maxRounds] = useState(3);

                const queued = tasks.filter((t) => t.col === "staged");
                const [jobState, setJobState] = useState(() => {
                    const s = {};
                    queued.forEach((t) => {
                        s[t.id] = { rounds: 0, running: false };
                    });
                    return s;
                });

                const runQueue = useCallback(async () => {
                    if (running || queued.length === 0) return;
                    setRunning(true);
                    setRunLog([]);

                    for (let i = 0; i < queued.length; i++) {
                        setActiveIdx(i);
                        const task = queued[i];
                        setRunLog((l) => [
                            ...l,
                            `[${new Date().toLocaleTimeString()}] Starting: ${task.title}`,
                        ]);

                        setJobState((s) => ({
                            ...s,
                            [task.id]: { rounds: 0, running: true },
                        }));

                        let quality = 0;
                        for (let r = 0; r < maxRounds; r++) {
                            await new Promise((res) =>
                                setTimeout(res, 600 + Math.random() * 400),
                            );
                            const roundQuality =
                                50 + Math.floor(Math.random() * 40) + r * 4;
                            quality = Math.min(95, roundQuality);

                            setJobState((s) => ({
                                ...s,
                                [task.id]: {
                                    rounds: r + 1,
                                    running: r < maxRounds - 1,
                                },
                            }));
                            setRunLog((l) => [
                                ...l,
                                `  round ${r + 1}/${maxRounds} → quality: ${quality}%`,
                            ]);
                        }

                        setRunLog((l) => [
                            ...l,
                            `✅ Done: ${task.title} (final quality: ${quality}%)`,
                        ]);
                    }

                    setActiveIdx(-1);
                    setRunning(false);
                    setRunLog((l) => [...l, "--- Queue complete ---"]);
                }, [running, queued, maxRounds]);

                const totalDone = Object.values(jobState).filter(
                    (s) => !s.running && s.rounds === maxRounds,
                ).length;
                const avgQ = 74;

                return (
                    <div className="queue-pane">
                        <div className="pane-header">
                            <span className="pane-title">⚙️ Work Queue</span>
                            <span
                                style={{ fontSize: 12, color: "var(--muted)" }}
                            >
                                {queued.length} staged · {maxRounds} rounds
                            </span>
                        </div>

                        <div className="queue-items">
                            {queued.length === 0 && (
                                <div className="empty-state">
                                    <div className="empty-icon">⚙️</div>
                                    <div className="empty-text">
                                        No tasks staged.
                                        <br />
                                        Move tasks to <strong>Staged</strong> in
                                        the Tasks tab to queue them.
                                    </div>
                                </div>
                            )}
                            {queued.map((task, i) => {
                                const state = jobState[task.id] || {
                                    rounds: 0,
                                    running: false,
                                };
                                const isActive = i === activeIdx;
                                const isDone =
                                    !state.running &&
                                    state.rounds === maxRounds;
                                const finalQ = isDone
                                    ? ((50 + i * 12) % 45) + 55
                                    : null;

                                return (
                                    <div
                                        key={task.id}
                                        className={`queue-item${isActive ? " running" : isDone ? " done" : ""}`}
                                    >
                                        <div className="queue-num">
                                            {isActive
                                                ? "⟳"
                                                : isDone
                                                  ? "✓"
                                                  : i + 1}
                                        </div>
                                        <div className="queue-info">
                                            <div className="queue-task-name">
                                                {task.title}
                                            </div>
                                            <div className="queue-task-meta">
                                                <span>{task.file}</span>
                                                <span
                                                    style={{
                                                        color: "var(--muted)",
                                                    }}
                                                >
                                                    ·
                                                </span>
                                                <span>{task.repo}</span>
                                            </div>
                                            <div className="queue-rounds">
                                                {Array.from({
                                                    length: maxRounds,
                                                }).map((_, r) => (
                                                    <div
                                                        key={r}
                                                        className={`round-pip${r < state.rounds ? " done" : r === state.rounds && isActive ? " running" : ""}`}
                                                    />
                                                ))}
                                            </div>
                                            {isDone && finalQ !== null && (
                                                <div className="queue-quality">
                                                    <span className="quality-pct">
                                                        {finalQ}%
                                                    </span>
                                                    <div
                                                        className="quality-track"
                                                        style={{ flex: 1 }}
                                                    >
                                                        <div
                                                            className="quality-fill"
                                                            style={{
                                                                width: `${finalQ}%`,
                                                                background:
                                                                    finalQ >= 80
                                                                        ? "var(--green)"
                                                                        : finalQ >=
                                                                            60
                                                                          ? "var(--yellow)"
                                                                          : "var(--red)",
                                                            }}
                                                        />
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}

                            {runLog.length > 0 && (
                                <div
                                    style={{
                                        marginTop: 8,
                                        background: "var(--surface)",
                                        border: "1px solid var(--border)",
                                        borderRadius: "var(--radius)",
                                        padding: "10px 12px",
                                        maxHeight: 180,
                                        overflowY: "auto",
                                        fontSize: 11.5,
                                        color: "var(--text2)",
                                        fontFamily: "var(--font-mono)",
                                        lineHeight: 1.6,
                                    }}
                                >
                                    {runLog.map((line, i) => {
                                        let color = "var(--text2)";
                                        if (line.startsWith("✅"))
                                            color = "var(--green)";
                                        if (line.startsWith("❌"))
                                            color = "var(--red)";
                                        if (line.startsWith("---"))
                                            color = "var(--muted)";
                                        if (line.includes("round"))
                                            color = "var(--muted)";
                                        return (
                                            <div key={i} style={{ color }}>
                                                {line}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>

                        <div className="queue-run-controls">
                            <button
                                className={`run-big-btn ${running ? "stop" : "start"}`}
                                onClick={() =>
                                    running ? setRunning(false) : runQueue()
                                }
                            >
                                {running ? "⏹ Stop" : "▶ Run Queue"}
                            </button>
                            <div className="queue-stats">
                                <div className="qstat">
                                    <span
                                        className="qstat-val"
                                        style={{ color: "var(--accent2)" }}
                                    >
                                        {queued.length}
                                    </span>
                                    <span className="qstat-label">queued</span>
                                </div>
                                <div className="qstat">
                                    <span
                                        className="qstat-val"
                                        style={{ color: "var(--green)" }}
                                    >
                                        {totalDone}
                                    </span>
                                    <span className="qstat-label">done</span>
                                </div>
                                <div className="qstat">
                                    <span
                                        className="qstat-val"
                                        style={{ color: "var(--yellow)" }}
                                    >
                                        {avgQ}%
                                    </span>
                                    <span className="qstat-label">avg Q</span>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ── Add repo modal ────────────────────────────────────────────────────────
            function AddRepoModal({ onAdd, onClose }) {
                const [form, setForm] = useState({
                    name: "",
                    path: "",
                    remote: "",
                    branch: "main",
                });
                const colors = [
                    "#f78166",
                    "#58a6ff",
                    "#3fb950",
                    "#d29922",
                    "#bc8cff",
                    "#e3b341",
                ];
                const [color, setColor] = useState(
                    colors[Math.floor(Math.random() * colors.length)],
                );

                const submit = async (e) => {
                    e.preventDefault();
                    try {
                        await fetch(`${OLLAMA_BASE}/repos`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                name: form.name,
                                local_path: form.path,
                                remote_url: form.remote || null,
                                branch: form.branch,
                                sync_on_register: true,
                            }),
                        });
                    } catch (_) {}
                    onAdd({
                        id: form.name.toLowerCase().replace(/\s+/g, "-"),
                        name: form.name,
                        path: form.path,
                        color,
                        todoCount: 0,
                        branch: form.branch,
                        synced: false,
                    });
                    onClose();
                };

                return (
                    <div className="modal-overlay" onClick={onClose}>
                        <div
                            className="modal"
                            onClick={(e) => e.stopPropagation()}
                        >
                            <div className="modal-title">➕ Register Repo</div>

                                {["name", "path", "remote", "branch"].map(
                                    (field) => (
                                        <div
                                            key={field}
                                            className="modal-field"
                                        >
                                            <div className="modal-label">
                                                {field === "path"
                                                    ? "Local Path"
                                                    : field === "remote"
                                                      ? "Remote URL (optional)"
                                                      : field
                                                            .charAt(0)
                                                            .toUpperCase() +
                                                        field.slice(1)}
                                            </div>
                                            <input
                                                className="modal-input"
                                                required={field !== "remote"}
                                                placeholder={
                                                    field === "path"
                                                        ? "/home/jordan/repos/myproject"
                                                        : field === "remote"
                                                          ? "https://github.com/user/repo"
                                                          : field
                                                }
                                                value={form[field]}
                                                onChange={(e) =>
                                                    setForm((f) => ({
                                                        ...f,
                                                        [field]: e.target.value,
                                                    }))
                                                }
                                            />
                                        </div>
                                    ),
                                )}
                                <div className="modal-field">
                                    <div className="modal-label">Color</div>
                                    <div style={{ display: "flex", gap: 8 }}>
                                        {colors.map((c) => (
                                            <div
                                                key={c}
                                                onClick={() => setColor(c)}

                                                    width: 22,
                                                    height: 22,
                                                    borderRadius: "50%",

                                                            : "none",
                                                    outlineOffset: 2,
                                                }}

                                        ))}

                                </div>
                                <div className="modal-actions">
                                    <button
                                        type="button"
                                        className="pane-btn"
                                        onClick={onClose}

                                        Cancel
                                    </button>
                                    <button
                                        type="submit"
                                        className="pane-btn primary"
                                    >
                                        Register
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

                                            }
                                            max={tasks.length}
                                            color="var(--accent2)"
                                            label="todo"
                                        />
                                        <RingChart
                                            value={stagedCount}
                                            max={tasks.length}
                                            color="var(--yellow)"
                                            label="staged"
                                        />
                                        <RingChart
                                            value={doneCount}
                                            max={tasks.length}
                                            color="var(--green)"
                                            label="done"
                                        />
                                    </div>
                                </div>

                                <div
                                    className="nav-tabs"
                                    style={{ marginTop: 12 }}
                                >
                                    {tabs.map((t) => (
                                        <div
                                            key={t.id}
                                            className={`nav-tab${tab === t.id ? " active" : ""}`}
                                            onClick={() => setTab(t.id)}
                                        >
                                            <span className="tab-icon">
                                                {t.icon}
                                            </span>
                                            {t.label}
                                            {t.badge > 0 && (
                                                <span className="tab-badge">
                                                    {t.badge}
                                                </span>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                {/* Footer info */}
                                <div
                                    style={{
                                        marginTop: "auto",
                                        padding: "12px 14px",
                                        borderTop: "1px solid var(--border)",
                                    }}
                                >
                                    <div
                                        style={{
                                            fontSize: 11,
                                            color: "var(--muted)",
                                            lineHeight: 1.6,
                                        }}
                                    >
                                        <div
                                            style={{
                                                color: "var(--text2)",
                                                fontWeight: 500,
                                            }}
                                        >
                                            {activeRepo
                                                ? activeRepo.name
                                                : "No repo selected"}
                                        </div>
                                        {activeRepo && (
                                            <>
                                                <div
                                                    style={{
                                                        color: "var(--muted)",
                                                    }}
                                                >
                                                    {activeRepo.branch}
                                                </div>
                                                <div
                                                    style={{
                                                        color: activeRepo.synced
                                                            ? "var(--green)"
                                                            : "var(--yellow)",
                                                    }}
                                                >
                                                    {activeRepo.synced
                                                        ? "✓ synced"
                                                        : "○ not synced"}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Main */}
                            <div className="main">
                                {tab === "chat" && (
                                    <ChatPane activeRepo={activeRepo} />
                                )}
                                {tab === "tasks" && (
                                    <TasksPane
                                        tasks={tasks}
                                        setTasks={setTasks}
                                        activeRepo={activeRepo}
                                    />
                                )}
                                {tab === "queue" && <QueuePane tasks={tasks} />}
                                {tab === "prs" && (
                                    <PRPane activeRepo={activeRepo} />
                                )}
                            </div>
                        </div>

                        {/* Add repo modal */}
                        {showAddRepo && (
                            <AddRepoModal
                                onAdd={(repo) =>
                                    setRepos((prev) => [...prev, repo])
                                }
                                onClose={() => setShowAddRepo(false)}
                            />
                        )}
                    </>
                );
            }

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>
